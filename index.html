<li><div><strong>The stranger test:</strong> Give the SOP to someone who has never seen the process. Can they follow it without asking any questions? If they get stuck, the SOP has a gap.</div></li>
<li><div><strong>Completeness:</strong> Does the SOP cover the entire process — from the trigger to the final output? Nothing should be assumed as "obvious."</div></li>
<li><div><strong>Accuracy:</strong> Do the system steps match the client's actual ERP/software version? Navigation paths that are slightly wrong are worse than no navigation path.</div></li>
<li><div><strong>Consistency:</strong> Are role names, system names, and terminology used consistently across all SOPs? (e.g., don't call it "Finance Team" in one SOP and "Accounts Team" in another)</div></li>
<li><div><strong>Screenshots:</strong> Are all screenshots current? Are arrows/highlights pointing to the correct fields?</div></li>
<li><div><strong>Cross-references:</strong> Every SOP that references another SOP, template, or form — is the link working and pointing to the right document?</div></li>
<li><div><strong>Exceptions:</strong> Are the top 3 most common exceptions handled explicitly?</div></li>
</ol>

<div class="divider"></div>
<h2>Task 3.3 — Client Review & Sign-off</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Get the process owners and client management to review each SOP, confirm it is accurate and implementable, and give formal sign-off.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All SOPs signed off in writing by the authorised client representative.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Client Management</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Share SOPs in batches by department — do not share all SOPs at once. Review one department at a time.</div></li>
<li><div>Give process owners 3 working days to review each SOP. Follow up if no response on Day 3.</div></li>
<li><div>Conduct a review call for each department — walk through the SOPs screen-by-screen. Do not just wait for written comments.</div></li>
<li><div>Track all feedback in a review log: SOP name, Reviewer, Comment, Action taken, Status.</div></li>
<li><div>For every comment that changes a process step — re-check that the change doesn't conflict with another SOP or a compliance requirement.</div></li>
<li><div>Incorporate all feedback. Re-share only the changed sections for a final round of review — do not ask reviewers to re-read the entire SOP.</div></li>
<li><div>Obtain written sign-off (email or signed PDF) from the authorised client representative for each batch of SOPs.</div></li>
</ol>`},

sop_prep_phase4:{icon:"4️⃣",label:"Phase 4: Training & Handover",parent:"sop_prep",render:()=>`
<div class="back-btn" onclick="nav('sop_prep')">← SOP Preparation SOP</div>
<div class="section-tag">Phase 4 · SOP Preparation</div>
<div class="page-icon">4️⃣</div>
<h1 class="page-title">Phase 4: Training & Handover</h1>
<p>An SOP that no one reads is worthless. This phase ensures the SOPs are actually adopted — through structured training, an accessible repository, and a governance process to keep them current.</p>

<h2>Task 4.1 — SOP Walkthrough & Training</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Walk every person who will use a SOP through it — ensuring they understand it, can execute it, and know where to find it.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All relevant team members trained on their respective SOPs, attendance recorded.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Conduct department-wise SOP walkthrough sessions — not a single all-hands session. Each session covers only the SOPs relevant to that department's team.</div></li>
<li><div>Structure each session:<ul class="sub-steps">
<li>Why these SOPs were created (context — what problem was being solved)</li>
<li>Walk through each SOP step by step on screen</li>
<li>Highlight the key changes from how it was done before</li>
<li>Show where the SOP is stored (the repository)</li>
<li>Q&A — address every question, no matter how basic</li>
</ul></div></li>
<li><div>After the walkthrough — have each attendee execute one task from the SOP themselves, while you observe. This confirms they can follow it, not just understand it.</div></li>
<li><div>Record the session and save to the client's OneDrive. Future joiners can watch the recording as part of their onboarding.</div></li>
<li><div>Collect attendance sign-off from all attendees.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.2 — SOP Repository Setup</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Set up an organised, accessible SOP library so team members can find the right SOP in under 30 seconds — anytime, from anywhere.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Repository Structure</h3>
<table class="raci-table"><thead><tr><th>Folder</th><th>Sub-folder</th><th>Contents</th></tr></thead><tbody>
<tr><td><strong>SOP Library</strong></td><td>Finance</td><td>All Finance SOPs (payments, month-end, reconciliation, etc.)</td></tr>
<tr><td></td><td>HR</td><td>All HR SOPs (onboarding, payroll, exit, leave)</td></tr>
<tr><td></td><td>Operations</td><td>All Ops SOPs (procurement, inventory, dispatch)</td></tr>
<tr><td></td><td>Sales</td><td>All Sales SOPs (lead, quote, order, collection)</td></tr>
<tr><td></td><td>IT / Admin</td><td>System access, IT setup, general admin SOPs</td></tr>
<tr><td><strong>Templates</strong></td><td>—</td><td>All templates referenced by the SOPs</td></tr>
<tr><td><strong>Archived</strong></td><td>—</td><td>Old versions of SOPs (never delete — move here)</td></tr>
<tr><td><strong>Index</strong></td><td>—</td><td>Master index file: SOP name, department, owner, version, last reviewed</td></tr>
</tbody></table>
<h3>SOP Index (Master File)</h3>
<p>Every SOP library must have a single index file. Every SOP entry must have:</p>
<table class="raci-table"><thead><tr><th>Field</th><th>Description</th></tr></thead><tbody>
<tr><td><strong>SOP Name</strong></td><td>Process name</td></tr>
<tr><td><strong>Department</strong></td><td>Which function owns it</td></tr>
<tr><td><strong>Process Owner</strong></td><td>Named individual responsible for keeping it current</td></tr>
<tr><td><strong>Version</strong></td><td>Current version number (v1.0, v1.1, v2.0)</td></tr>
<tr><td><strong>Last Reviewed</strong></td><td>Date of last review</td></tr>
<tr><td><strong>Next Review Due</strong></td><td>Scheduled next review date (recommend annual)</td></tr>
<tr><td><strong>Status</strong></td><td>Active / Under Review / Archived</td></tr>
<tr><td><strong>Link</strong></td><td>Direct link to the SOP file</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Create the folder structure on the client's OneDrive or internal wiki (SharePoint, Notion, Confluence — wherever their team actually works).</div></li>
<li><div>Upload all signed-off SOPs in the correct department folders using a consistent naming convention: <code>[Department]_[Process Name]_v[Version]_[YYYYMMDD]</code></div></li>
<li><div>Create the SOP Index file and populate it for all SOPs delivered.</div></li>
<li><div>Set access permissions: all relevant team members should have at least read access. Process owners should have edit access.</div></li>
<li><div>Brief the nominated SOP custodian on their responsibility for maintaining the library going forward.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.3 — SOP Governance Handover</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Hand over the ongoing responsibility for SOP maintenance to the client — with a clear governance framework so the SOPs don't go stale within 6 months.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div>SOPs decay fast. A system change, a process improvement, a new regulation, a team restructure — any of these can make an SOP outdated. Without a governance owner and a review schedule, the SOP library becomes a graveyard within a year.</div></div>
<h3>Governance Framework to Hand Over</h3>
<ol class="steps">
<li><div><strong>Appoint a SOP Custodian</strong> — one named person (typically the Quality Manager, Head of Operations, or Finance Controller) responsible for the health of the SOP library. Not a committee — one person, clear accountability.</div></li>
<li><div><strong>Annual review cycle</strong> — every SOP must be reviewed at least once a year. The SOP custodian schedules this and is responsible for completing it. Add to the SOP Index as "Next Review Due."</div></li>
<li><div><strong>Trigger-based updates</strong> — any of these events must trigger an immediate SOP update:<ul class="sub-steps">
<li>System change or ERP upgrade</li>
<li>Regulatory / tax law change</li>
<li>Organisational restructure (role changes, new departments)</li>
<li>Process failure or significant error that was caused by a gap in the SOP</li>
<li>New tool or automation introduced</li>
</ul></div></li>
<li><div><strong>Version control</strong> — every change to an SOP must increment the version number. Old versions move to the Archive folder — never deleted.</div></li>
<li><div><strong>New joiner protocol</strong> — every new team member must read and sign off on the SOPs for their role within their first week.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.4 — Project Closure</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Formally close the project with a complete record of what was delivered and documented learnings for future SOP projects.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare the Project Closure Report:<ul class="sub-steps">
<li>Total SOPs delivered vs. originally scoped</li>
<li>SOPs deferred and reasons</li>
<li>Summary of key gaps fixed across all processes</li>
<li>Key challenges and how they were resolved</li>
<li>Automation candidates identified during the project (flag for follow-up)</li>
<li>Governance recommendations handed over</li>
<li>Timesheet summary — hours per department / per SOP</li>
<li>Team learnings and recommendations for future SOP projects</li>
</ul></div></li>
<li><div>Conduct a closure call with the client. Walk through the report and collect feedback.</div></li>
<li><div>Get the client to fill the <span class="ilink" onclick="nav('templates')">Feedback Form →</span></div></li>
<li><div>Archive all project files in OneDrive: recordings, MoMs, as-is docs, to-be designs, gap analysis, draft SOPs, review logs, sign-off emails, final SOPs, training recordings, closure report.</div></li>
<li><div>File the closure report internally with: industry, number of SOPs delivered, departments covered, key learnings — for future reference on similar projects.</div></li>
</ol>`},

</tbody></table>`}

const tree=[{id:"hub",ch:[{id:"welcome"},{id:"about"},{id:"in_detail"},{id:"sop_library",ch:[{id:"erp_impl",ch:[{id:"erp_impl_phase0"},{id:"erp_impl_phase1"},{id:"erp_impl_phase2"},{id:"erp_impl_phase3"},{id:"erp_impl_phase4"},{id:"erp_impl_phase5"},{id:"erp_impl_phase6"}]},{id:"automation",ch:[{id:"auto_phase0"},{id:"auto_phase1"},{id:"auto_phase2"},{id:"auto_phase3"},{id:"auto_phase4"}]},{id:"master_data",ch:[{id:"mdc_phase0"},{id:"mdc_phase1"},{id:"mdc_phase2"},{id:"mdc_phase3"},{id:"mdc_customer"},{id:"mdc_vendor"},{id:"mdc_item"},{id:"mdc_coa"},{id:"mdc_employee"},{id:"mdc_other"}]},{id:"sop_prep",ch:[{id:"sop_prep_phase0"},{id:"sop_prep_phase1"},{id:"sop_prep_phase2"},{id:"sop_prep_phase3"},{id:"sop_prep_phase4"}]},{id:"sop_erp_diag",ch:[{id:"phase0"},{id:"phase1",ch:[{id:"understanding_prep"}]},{id:"phase2"},{id:"phase3"},{id:"approach"}]}]},{id:"templates",ch:[{id:"kickoff_email"},{id:"project_plan_email"},{id:"cadence_slot_email"},{id:"cadence_ppt_email"},{id:"cadence_format"},{id:"prompts"},{id:"credentials"}]},{id:"laptop_checklist"},{id:"ground_rules"},{id:"foldering"}]}];
let open=new Set(["hub","sop_library","templates"]);
let cur="hub";

function findNode(id,nodes){for(const n of nodes){if(n.id===id)return n;if(n.ch){const f=findNode(id,n.ch);if(f)return f;}}return null;}

function renderTree(nodes,d=0){
  return nodes.map(n=>{
    const p=pages[n.id];if(!p)return"";
    const hasC=n.ch&&n.ch.length>0;
    const isO=open.has(n.id);
    const cls="nav-item"+(d===1?" d1":d===2?" d2":d===3?" d3":"")+(n.id===cur?" active":"");
    let h=`<div class="${cls}" data-id="${n.id}" onclick="handleClick('${n.id}',event)">`;
    h+=hasC?`<div class="nav-toggle${isO?" open":""}">▶</div>`:`<div style="width:16px;flex-shrink:0"></div>`;
    h+=`<div class="nav-emoji">${p.icon}</div><div class="nav-label">${p.label}</div></div>`;
    if(hasC)h+=`<div class="nav-children${isO?" open":""}">${renderTree(n.ch,d+1)}</div>`;
    return h;
  }).join("");
}

function handleClick(id,e){
  const n=findNode(id,tree);
  if(n&&n.ch){
    const wasOpen=open.has(id);
    if(wasOpen){open.delete(id);}
    else{open.add(id);}
    nav(id);
    // After nav (which re-opens parents), if user was collapsing, re-collapse this node
    if(wasOpen){open.delete(id);}
    document.getElementById("navTree").innerHTML=renderTree(tree);
    return;
  }
  nav(id);
}

function nav(id){
  if(!pages[id])return;
  cur=id;
  // Only open parent chain, don't force-open the node itself (handleClick controls that)
  let pid=pages[id].parent;
  while(pid){open.add(pid);pid=pages[pid]?pages[pid].parent:null;}
  document.getElementById("navTree").innerHTML=renderTree(tree);
  document.getElementById("content").innerHTML=pages[id].render();
  document.getElementById("content").parentElement.scrollTop=0;
  const crumbs=[];let c=id;
  while(c){crumbs.unshift(c);c=pages[c]?pages[c].parent:null;}
  document.getElementById("breadcrumb").innerHTML=crumbs.map((c,i)=>
    i===crumbs.length-1?`<span class="bc-cur">${pages[c].label}</span>`
    :`<span class="bc-link" onclick="nav('${c}')">${pages[c].label}</span><span class="bc-sep"> / </span>`
  ).join("");
}

nav("hub");

function toggleTheme(){
  const r=document.documentElement;
  const isLight=r.classList.contains('light');
  r.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
}

function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const tb=document.getElementById('topbar');
  const btn=document.getElementById('sidebarToggle');
  const collapsed=sb.classList.toggle('collapsed');
  tb.classList.toggle('sidebar-open',!collapsed);
  btn.style.left = collapsed ? '10px' : '248px';
}
// set initial toggle button position
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('sidebarToggle').style.left='248px';
});

// ── Search ──────────────────────────────────────────────────────────────────
function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),50);
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='<div class="search-empty">Start typing to search all pages...</div>';
}
function closeSearchIfBg(e){if(e.target===document.getElementById('searchOverlay'))closeSearch();}

function getPageText(id){
  try{
    const p=pages[id];
    if(!p)return'';
    const tmp=document.createElement('div');
    tmp.innerHTML=p.render();
    return tmp.innerText||tmp.textContent||'';
  }catch(e){return'';}
}

function getPagePath(id){
  const crumbs=[];let c=id;
  while(c&&pages[c]){crumbs.unshift(pages[c].label);c=pages[c].parent;}
  return crumbs.join(' › ');
}

function highlight(text,q){
  if(!q)return text;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}

function doSearch(q){
  const res=document.getElementById('searchResults');
  if(!q||q.length<2){
    res.innerHTML='<div class="search-empty">Start typing to search all pages...</div>';
    return;
  }
  const ql=q.toLowerCase();
  const matches=[];
  Object.keys(pages).forEach(id=>{
    const p=pages[id];
    if(!p)return;
    const labelMatch=p.label.toLowerCase().includes(ql);
    let snippet='';
    let bodyMatch=false;
    const bodyText=getPageText(id);
    const bodyLow=bodyText.toLowerCase();
    const idx=bodyLow.indexOf(ql);
    if(idx>=0){
      bodyMatch=true;
      const start=Math.max(0,idx-40);
      const end=Math.min(bodyText.length,idx+q.length+60);
      snippet='...'+bodyText.slice(start,end).replace(/\s+/g,' ')+'...';
    }
    if(labelMatch||bodyMatch){
      matches.push({id,label:p.label,path:getPagePath(id),snippet,score:labelMatch?0:1});
    }
  });
  matches.sort((a,b)=>a.score-b.score);
  if(matches.length===0){
    res.innerHTML='<div class="search-empty">No results for "'+q+'"</div>';
    return;
  }
  res.innerHTML=matches.slice(0,15).map((m,i)=>`
    <div class="search-result-item" onclick="searchNav('${m.id}')" data-idx="${i}">
      <div class="sr-icon">${pages[m.id]?pages[m.id].icon:''}</div>
      <div class="sr-content">
        <div class="sr-label">${highlight(m.label,q)}</div>
        <div class="sr-path">${m.path}</div>
        ${m.snippet?`<div class="sr-match">${highlight(m.snippet,q)}</div>`:''}
      </div>
    </div>`).join('');
}

function searchNav(id){
  closeSearch();
  nav(id);
}

// Keyboard shortcuts
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape'){closeSearch();}
  if(document.getElementById('searchOverlay').classList.contains('open')){
    const items=document.querySelectorAll('.search-result-item');
    let active=[...items].findIndex(el=>el.classList.contains('active'));
    if(e.key==='ArrowDown'){
      e.preventDefault();
      if(active>=0)items[active].classList.remove('active');
      active=Math.min(active+1,items.length-1);
      if(items[active]){items[active].classList.add('active');items[active].scrollIntoView({block:'nearest'});}
    }
    if(e.key==='ArrowUp'){
      e.preventDefault();
      if(active>=0)items[active].classList.remove('active');
      active=Math.max(active-1,0);
      if(items[active]){items[active].classList.add('active');items[active].scrollIntoView({block:'nearest'});}
    }
    if(e.key==='Enter'){
      const activeEl=document.querySelector('.search-result-item.active');
      if(activeEl)activeEl.click();
    }
  }
});

// ── Search ────────────────────────────────────────────────────────────────────
let searchIdx = -1;

function openSearch(){
  const ov=document.getElementById('searchOverlay');
  ov.style.display='flex';
  setTimeout(()=>document.getElementById('searchInput').focus(),50);
  doSearch('');
}

function closeSearch(){
  document.getElementById('searchOverlay').style.display='none';
  document.getElementById('searchInput').value='';
  searchIdx=-1;
}

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape'&&document.getElementById('searchOverlay').style.display!=='none'){closeSearch();}
});

function buildSearchIndex(){
  const idx=[];
  Object.entries(pages).forEach(([id,p])=>{
    if(!p.render)return;
    // Get plain text from render
    const html=p.render();
    const text=html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    idx.push({id,label:p.label,icon:p.icon,text:text.toLowerCase(),parent:p.parent});
  });
  return idx;
}

let _searchIndex=null;
function getSearchIndex(){
  if(!_searchIndex)_searchIndex=buildSearchIndex();
  return _searchIndex;
}

function doSearch(q){
  const res=document.getElementById('searchResults');
  const idx=getSearchIndex();
  searchIdx=-1;
  q=q.trim().toLowerCase();
  
  let matches;
  if(!q){
    // Show all top-level pages when empty
    matches=idx.filter(p=>!p.parent||p.parent==='hub'||p.parent==='sop_library'||p.parent==='templates').slice(0,12);
  } else {
    matches=idx.filter(p=>{
      return p.label.toLowerCase().includes(q)||p.text.includes(q);
    }).slice(0,15);
  }

  if(!matches.length){
    res.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px">No results found</div>';
    return;
  }

  res.innerHTML=matches.map((m,i)=>{
    const parentLabel=m.parent&&pages[m.parent]?` <span style="color:var(--text-tertiary)">· ${pages[m.parent].label}</span>`:'';
    // Highlight match in label
    let label=m.label;
    if(q){
      const qi=label.toLowerCase().indexOf(q);
      if(qi>=0)label=label.slice(0,qi)+'<mark style="background:rgba(255,200,0,0.3);border-radius:2px">'+label.slice(qi,qi+q.length)+'</mark>'+label.slice(qi+q.length);
    }
    return '<div class="sr-item" data-id="'+m.id+'" onclick="searchNav(\"'+m.id+'\")" style="display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;transition:background 0.1s" onmouseenter="setSearchIdx('+i+')">'
      +'<span style="font-size:16px;flex-shrink:0">'+m.icon+'</span>'
      +'<span style="flex:1">'+label+parentLabel+'</span>'
      +'<span style="color:var(--text-tertiary);font-size:11px">→</span>'
      +'</div>';
  }).join('');
}

function setSearchIdx(i){
  searchIdx=i;
  highlightSearchResult();
}

function highlightSearchResult(){
  document.querySelectorAll('.sr-item').forEach((el,i)=>{
    el.style.background=i===searchIdx?'var(--bg-tertiary)':'';
  });
}

function searchKeydown(e){
  const items=document.querySelectorAll('.sr-item');
  if(e.key==='ArrowDown'){e.preventDefault();searchIdx=Math.min(searchIdx+1,items.length-1);highlightSearchResult();}
  else if(e.key==='ArrowUp'){e.preventDefault();searchIdx=Math.max(searchIdx-1,0);highlightSearchResult();}
  else if(e.key==='Enter'){
    if(searchIdx>=0&&items[searchIdx]){
      const id=items[searchIdx].dataset.id;
      searchNav(id);
    }
  }
}

function searchNav(id){
  closeSearch();
  nav(id);
}

</script>
