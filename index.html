<table class="raci-table"><thead><tr><th>Area</th><th>Scenarios to Cover</th></tr></thead><tbody>
<tr><td><strong>Sales</strong></td><td>Sales invoices, credit notes, types of customers, GST rates, billing calculations, inter-company, local/export</td></tr>
<tr><td><strong>Purchase</strong></td><td>Purchase invoices, debit notes, dimension selection, project selection, ITC eligibility, inter-company, local/import</td></tr>
<tr><td><strong>Banking</strong></td><td>Payments, receipts, bank reconciliation</td></tr>
<tr><td><strong>Journals</strong></td><td>Category of journals, provisions, prepaids, TDS adjustments, month closure entries</td></tr>
<tr><td><strong>Reporting</strong></td><td>P&L by dimension, AR ageing, AP ageing, inventory valuation, GST returns</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Task 4.2 — Data Migration in UAT Environment</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Upload opening balances and master data into UAT first — validate, then replicate in Production.</div></div>
<h3>Migration Approach</h3>
<ol class="steps">
<li><div>Clean up COA, master data, and prepare final balance list in old ERP.</div></li>
<li><div>Select a cut-off date (e.g., 31.12.2025). Create 4 standard migration GLs:<ul class="sub-steps">
<li>AR Migration Control Account</li>
<li>AP Migration Control Account</li>
<li>GL Migration Control Account</li>
<li>Inventory Migration Control Account</li>
</ul></div></li>
<li><div>Upload in order: Open AR (invoice-wise) → Open AP → Inventory (item-wise) → Fixed Assets → Other Sub-GLs → Trial Balance.</div></li>
<li><div>Sub-GL upload checklist:<ul class="sub-steps">
<li>Original document number must be captured</li>
<li>No GST or TDS element in the upload</li>
<li>Total must match corresponding TB balance</li>
<li>Invoice-wise balance (not net balance)</li>
<li>On-account advances uploaded as negative with unique code</li>
<li>No item lines needed in open balances</li>
<li>Net balances only — after TDS deduction</li>
<li>Smaller-value invoices can be cleaned up pre-migration</li>
</ul></div></li>
<li><div>TB upload checklist:<ul class="sub-steps">
<li>Debit/Credit total must match</li>
<li>Sub-GL balances must match uploaded data</li>
<li>Use cleaned COA for upload</li>
<li>Client SPOC sign-off required before upload</li>
<li>Upload in UAT first — check — then replicate in Production</li>
</ul></div></li>
<li><div>After all uploads: each migration GL may carry a balance, but net of all migration accounts must equal zero.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.3 — UAT Execution & Sign-off</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Client users execute all UAT scenarios and sign off that the system is ready for Go-live.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All scenarios passed, all issues resolved, written UAT sign-off received.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Client Users (supported by Exec + PM)</td><td>Project Manager</td><td>Client Management</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Share UAT scenario list with client. Each scenario must have: ID, Description, Steps, Expected result, Actual result, Pass/Fail, Remarks.</div></li>
<li><div>Client users execute each scenario with our team on standby.</div></li>
<li><div>Log all issues: Bug / Configuration gap / Training gap / Expectation mismatch.</div></li>
<li><div>Resolve with technical partner. Re-test affected scenarios.</div></li>
<li><div>No open critical or high issues at UAT sign-off.</div></li>
<li><div>Obtain written UAT sign-off from authorised client representative — mandatory prerequisite for Go-live.</div></li>
</ol>`},

erp_impl_phase5:{icon:"5️⃣",label:"Phase 5: Go-live",parent:"erp_impl",render:()=>`
<div class="back-btn" onclick="nav('erp_impl')">← ERP Implementation SOP</div>
<div class="section-tag">Phase 5 · ERP Implementation</div>
<div class="page-icon">5️⃣</div>
<h1 class="page-title">Phase 5: Go-live</h1>
<p>Go-live is the point at which the client switches to the new ERP for live business transactions. The most critical phase — no issues should be left open going in.</p>

<h2>Task 5.1 — Go-live Checklist Sign-off</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Ensure every prerequisite is in place before going live. No exceptions.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Important:</strong> Do not proceed with Go-live if any item is not cleared. Escalate to Vertical Head if client pushes for Go-live without completing prerequisites.</div></div>
<h3>Go-live Checklist</h3>
<table class="raci-table"><thead><tr><th>#</th><th>Item</th><th>Status</th></tr></thead><tbody>
<tr><td>1</td><td>System configuration and setup complete</td><td>☐ Clear</td></tr>
<tr><td>2</td><td>Complete master data uploaded (customers, vendors, items)</td><td>☐ Clear</td></tr>
<tr><td>3</td><td>Important approval workflows configured</td><td>☐ Clear</td></tr>
<tr><td>4</td><td>UAT sign-off received from client</td><td>☐ Clear</td></tr>
<tr><td>5</td><td>COA uploaded and GL determination logics defined</td><td>☐ Clear</td></tr>
<tr><td>6</td><td>All UAT scenarios tested and results as expected</td><td>☐ Clear</td></tr>
<tr><td>7</td><td>External layouts configured (invoices, POs, delivery notes)</td><td>☐ Clear</td></tr>
<tr><td>8</td><td>Sales billing scenarios and E-Invoice tested</td><td>☐ Clear</td></tr>
<tr><td>9</td><td>Roles and authorisations configured — relevant access given to each user</td><td>☐ Clear</td></tr>
<tr><td>10</td><td>Open AR and Open AP data uploaded + Open Inventory</td><td>☐ Clear</td></tr>
<tr><td>11</td><td>Trial Balance upload scheduled (not later than 15 days from Go-live)</td><td>☐ Clear</td></tr>
<tr><td>12</td><td>Key integration touchpoints working — GST, Forex, operational systems</td><td>☐ Clear</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Task 5.2 — Production Data Migration</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Replicate the validated UAT migration into the Production environment.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + Tech Partner</td><td>Project Manager</td><td>Client SPOC</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Use the same data files validated in UAT. No new or unvalidated data in Production.</div></li>
<li><div>Upload in same order as UAT: Open AR → Open AP → Inventory → Fixed Assets → Other Sub-GLs → Trial Balance.</div></li>
<li><div>Validate all totals match between Production and signed-off UAT data.</div></li>
<li><div>Net of all migration control accounts must equal zero.</div></li>
<li><div>Get client SPOC sign-off on Production data before declaring Go-live.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 5.3 — Go-live Declaration</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Officially declare the system live and transition client to the new ERP.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Confirm all Go-live checklist items are cleared and signed off.</div></li>
<li><div>Send a formal Go-live confirmation email to all client stakeholders.</div></li>
<li><div>Ensure all users know who to contact for support (our team on standby).</div></li>
<li><div>Transition immediately into Phase 6 — Hypercare & Support.</div></li>
</ol>`},

erp_impl_phase6:{icon:"6️⃣",label:"Phase 6: Hypercare & Support",parent:"erp_impl",render:()=>`
<div class="back-btn" onclick="nav('erp_impl')">← ERP Implementation SOP</div>
<div class="section-tag">Phase 6 · ERP Implementation</div>
<div class="page-icon">6️⃣</div>
<h1 class="page-title">Phase 6: Hypercare & Support</h1>
<p>Hypercare is the intensive 30-day support period immediately after Go-live — when users are adapting and issues are most likely to surface.</p>

<h2>What is Hypercare?</h2>
<div class="callout"><div class="callout-icon">💡</div><div><strong>Hypercare</strong> is a dedicated, high-priority support period right after Go-live. Our team is on elevated availability to resolve issues quickly — preventing business disruption during the most vulnerable period of the transition.</div></div>

<div class="divider"></div>
<h2>Task 6.1 — Hypercare Support (30 days)</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Provide fast, structured support to resolve all post-Go-live issues and ensure the client can operate independently.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All critical/high issues resolved, client operating independently, 30-day period completed.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Support SLAs</h3>
<table class="raci-table"><thead><tr><th>Priority</th><th>Response Time</th><th>Example</th></tr></thead><tbody>
<tr><td><strong>High</strong></td><td>4 hours</td><td>System down, cannot create invoices, critical data mismatch</td></tr>
<tr><td><strong>Medium</strong></td><td>16 hours</td><td>Report not showing correct data, approval flow not working</td></tr>
<tr><td><strong>Low</strong></td><td>24 hours</td><td>Layout change, minor label issue, training query</td></tr>
</tbody></table>
<h3>Issue Categories</h3>
<p>All issues must be categorised as one of: <strong>Training gap · System bug · Configuration issue · Integration failure · Expectation mismatch · Other</strong></p>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Set up the Support Tracker on Day 1 of Go-live and share with all client SPOCs and our team. Fields: Date, Description, Category, Priority, Reported by, Assigned to, Status, Resolution, Resolved date.</div></li>
<li><div>All issues must be logged in the tracker — no verbal-only resolutions.</div></li>
<li><div>Conduct a 15-minute daily standup for the first 2 weeks to triage open issues.</div></li>
<li><div>Escalate any unresolved High issues beyond SLA immediately to PM and Senior Manager.</div></li>
<li><div>If multiple users raise the same issue — likely a training gap: run a group re-training session.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 6.2 — Project Closure & Handover</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Formally close the project, document learnings, and hand over to the client.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Closure report signed by client and filed internally.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare Project Closure Report:<ul class="sub-steps">
<li>Scope delivered vs. original scope</li>
<li>Timeline adherence — planned vs. actual milestones</li>
<li>Key decisions made during the project</li>
<li>Issues faced and how they were resolved</li>
<li>Timesheet summary — time spent per phase</li>
<li>Learnings and recommendations for future projects</li>
</ul></div></li>
<li><div>Conduct a formal closure call with the client. Collect feedback.</div></li>
<li><div>Get the client to fill the <span class="ilink" onclick="nav('templates')">Feedback Form →</span></div></li>
<li><div>Archive all project documents in OneDrive — recordings, MoMs, flowcharts, all deliverables.</div></li>
<li><div>File the closure report internally with: industry, ERP type, team, duration, and key learnings tagged — so future teams can refer to it.</div></li>
</ol>`},



automation:{icon:"🤖",label:"SOP — Automation Projects",parent:"sop_library",render:()=>`
<div class="back-btn" onclick="nav('sop_library')">← SOP Library</div>
<div class="section-tag">Project Type: Automation</div>
<div class="page-icon">🤖</div>
<h1 class="page-title">SOP — Automation Projects</h1>
<p>Process Automation is the art of taking a manual, messy workflow and replacing it with a streamlined, automated process. We specialise in <strong>Finance Process Automation</strong>, but also covers other key processes including Production, AP, and AR.</p>

<h2>What Makes a Good Automation Candidate?</h2>
<div class="page-desc">An activity becomes a perfect automation candidate when it passes the <strong>3R Test</strong>.</div>
<div class="card-grid" style="grid-template-columns:repeat(3,1fr)">
  <div class="card"><div class="card-icon">🔁</div><div class="card-title">Repetitive</div><div class="card-sub">Tasks performed repeatedly with consistent, predictable patterns.</div></div>
  <div class="card"><div class="card-icon">📐</div><div class="card-title">Rule-Based</div><div class="card-sub">Activities that follow clear, defined logic and business rules.</div></div>
  <div class="card"><div class="card-icon">📅</div><div class="card-title">Recurring</div><div class="card-sub">Process happens at regular intervals — daily, weekly, or monthly.</div></div>
</div>

<h2>Why Us?</h2>
<div class="callout"><div class="callout-icon">💡</div><div>We act as the <strong>bridge between Finance Logic and Technology</strong>. Pure programmers lack finance domain knowledge; pure accountants lack the technical skills to automate. We bring both — deep understanding of accounting rules, Ind-AS standards, and balance sheets, combined with hands-on ability to embed that logic into automated systems.</div></div>

<h2>Common Automation Examples</h2>
<table class="raci-table"><thead><tr><th>Use Case</th><th>Old (Manual) Way</th><th>Automated Solution</th></tr></thead><tbody>
<tr><td><strong>Monthly Financial Reports</strong></td><td>Manually consolidating data from various ERP systems into Excel</td><td>VBA Macros generate consolidated reports in a few clicks</td></tr>
<tr><td><strong>Data Reconciliation</strong></td><td>Manually matching data received in different formats from external parties</td><td>Power Query standardises all external data with a single click</td></tr>
<tr><td><strong>MIS Tracker</strong></td><td>Manually updating management information trackers from multiple sources</td><td>Power Query / Excel automation pulls and formats data automatically</td></tr>
</tbody></table>

<h2>Tools to Know</h2>
<div class="card-grid">
  <div class="card"><div class="card-icon">📊</div><div class="card-title">Advanced Excel</div><div class="card-sub">Foundation for most finance automations.</div></div>
  <div class="card"><div class="card-icon">⚙️</div><div class="card-title">VBA Macros</div><div class="card-sub">Automate repetitive Excel tasks and report generation.</div></div>
  <div class="card"><div class="card-icon">🔄</div><div class="card-title">Power Query</div><div class="card-sub">Standardise and transform data from multiple sources.</div></div>
  <div class="card"><div class="card-icon">📈</div><div class="card-title">Power BI</div><div class="card-sub">Data visualisation and interactive dashboards.</div></div>
  <div class="card"><div class="card-icon">🤖</div><div class="card-title">Gemini Canvas</div><div class="card-sub">AI-assisted coding reference for automation logic.</div></div>
</div>

<div class="divider"></div>
<h2>Project Phases</h2>
<div class="card-grid" style="grid-template-columns:repeat(4,1fr)">
  <div class="card" onclick="nav('auto_phase0')"><div class="card-icon">0️⃣</div><div class="card-title">Phase 0</div><div class="card-sub">Initiation & Kick-off</div></div>
  <div class="card" onclick="nav('auto_phase1')"><div class="card-icon">1️⃣</div><div class="card-title">Phase 1</div><div class="card-sub">Process Understanding & BRD</div></div>
  <div class="card" onclick="nav('auto_phase2')"><div class="card-icon">2️⃣</div><div class="card-title">Phase 2</div><div class="card-sub">Solution Design & To-Be</div></div>
  <div class="card" onclick="nav('auto_phase3')"><div class="card-icon">3️⃣</div><div class="card-title">Phase 3</div><div class="card-sub">Build & Test</div></div>
  <div class="card" onclick="nav('auto_phase4')"><div class="card-icon">4️⃣</div><div class="card-title">Phase 4</div><div class="card-sub">Handholding & Handover</div></div>
</div>

<div class="divider"></div>
<h2>All Tasks at a Glance</h2>
<table class="raci-table"><thead><tr><th>Phase</th><th>Task</th><th>Output</th><th>Owner</th><th>Approver</th></tr></thead><tbody>
<tr><td>0</td><td><span class="ilink" onclick="nav('auto_phase0')">Kick-off email</span></td><td>Email sent to client</td><td>Executive</td><td>PM</td></tr>
<tr><td>0</td><td><span class="ilink" onclick="nav('auto_phase0')">Kick-off call</span></td><td>Scope & pain points documented</td><td>PM</td><td>SM</td></tr>
<tr><td>0</td><td><span class="ilink" onclick="nav('auto_phase0')">Project plan preparation & sharing</span></td><td>Plan shared with client</td><td>PM</td><td>SM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('auto_phase1')">Process understanding calls</span></td><td>Recordings + MoMs</td><td>Exec + PM</td><td>SM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('auto_phase1')">As-is flowchart / documentation</span></td><td>Approved as-is doc</td><td>Executive</td><td>PM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('auto_phase1')">BRD preparation</span></td><td>Signed-off BRD</td><td>PM</td><td>Client</td></tr>
<tr><td>2</td><td><span class="ilink" onclick="nav('auto_phase2')">Solution identification & tool selection</span></td><td>Tool decision document</td><td>PM</td><td>VH</td></tr>
<tr><td>2</td><td><span class="ilink" onclick="nav('auto_phase2')">To-be process design</span></td><td>Approved to-be blueprint</td><td>Exec + PM</td><td>Client</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('auto_phase3')">Build automation solution</span></td><td>Working automation tool</td><td>Executive</td><td>PM</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('auto_phase3')">Internal testing & QA</span></td><td>Test sign-off</td><td>Executive</td><td>PM</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('auto_phase3')">UAT with client</span></td><td>UAT sign-off</td><td>Exec + Client</td><td>PM</td></tr>
<tr><td>4</td><td><span class="ilink" onclick="nav('auto_phase4')">User handholding & training</span></td><td>Trained users</td><td>Executive</td><td>PM</td></tr>
<tr><td>4</td><td><span class="ilink" onclick="nav('auto_phase4')">Support period</span></td><td>Issues resolved</td><td>Exec + PM</td><td>PM</td></tr>
<tr><td>4</td><td><span class="ilink" onclick="nav('auto_phase4')">Project closure</span></td><td>Closure report signed</td><td>PM</td><td>VH</td></tr>
</tbody></table>`},

auto_phase0:{icon:"0️⃣",label:"Phase 0: Initiation & Kick-off",parent:"automation",render:()=>`
<div class="back-btn" onclick="nav('automation')">← Automation SOP</div>
<div class="section-tag">Phase 0 · Automation</div>
<div class="page-icon">0️⃣</div>
<h1 class="page-title">Phase 0: Initiation & Kick-off</h1>
<p>Sets the foundation for the project — aligning on scope, pain points, tools, and timelines before any technical work begins.</p>

<h2>Task 0.1 — Kick-off Email</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Formally initiate the engagement, introduce the team, and request initial information from the client.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> On the day the project starts, before any calls.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Email sent from the Project Manager's ID, approved by Senior Manager.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Open Outlook and compose a new email:<ul class="sub-steps">
<li>To: All client stakeholders</li>
<li>CC: CPL Team including Chitra (chitraparameswaran@contetra.com)</li>
<li>Subject: <code>Project Kick-off | &lt;Client&gt; &lt;&gt; Contetra | Process Automation</code></li>
</ul></div></li>
<li><div>Use the following email body:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Dear Team,

I hope this email finds you well.

This message is to formally kick off our Process Automation project. The primary goal of this engagement is to identify manual, repetitive, and rule-based processes in your operations and automate them using the right tools — reducing effort, errors, and turnaround time.

To ensure we align on scope and approach, we would like to schedule a kick-off call covering:

- Project Goals & Scope: Which processes are in scope for automation.
- Current Pain Points: Manual tasks, inefficiencies, and workarounds.
- Tools & Approach: The tools we propose to use and our methodology.
- Key Stakeholders & Roles: SPOCs for each process area.
- Timeline & Milestones: Project plan walkthrough.

Could you please share your availability for a 45-minute kick-off call?

In the meantime, please share the following:
- A list of processes you currently perform manually that feel repetitive or time-consuming
- Any existing Excel files, trackers, or tools used for those processes
- View-only access to relevant systems (ERP, Excel files, data sources)

We look forward to working with your team.

Best regards,</div></div></li>
<li><div>Review all details and send from the Project Manager's email ID.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.2 — Kick-off Call</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Understand the client's operations at a high level, identify automation candidates, and align on scope and expectations.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Call completed, automation candidates identified, MoM sent within 24 hours.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Schedule on MS Teams: <code>Kick-off Call | &lt;Client&gt; x Contetra</code>. Enable auto-record.</div></li>
<li><div>Research the client's industry and business model before the call using the <span class="ilink" onclick="nav('understanding_prep')">Pre-call Preparation →</span> Business Understanding prompt.</div></li>
<li><div>Cover the following during the call:<ul class="sub-steps">
<li>Walk through all current manual processes — ask "what do you do every month/week/day that feels repetitive?"</li>
<li>Apply the 3R test to each candidate: Is it Repetitive? Rule-based? Recurring?</li>
<li>Understand the volume — how many rows, how many people, how many hours per cycle?</li>
<li>Understand the data sources — which systems, which files, which formats?</li>
<li>Understand the desired output — what should the automation produce?</li>
<li>Identify SPOCs for each process area</li>
</ul></div></li>
<li><div>By the end of the call, agree on a <strong>shortlist of automation candidates</strong> to take into Phase 1.</div></li>
<li><div>Send MoM within 24 hours. See <span class="ilink" onclick="nav('phase1')">Task 1.4 — Write MoM →</span></div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.3 — Project Plan Preparation & Sharing</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Define the project timeline, milestones, and responsibilities across all phases.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Plan approved by Senior Manager and shared with client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head / CEO</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare the project plan in Excel covering all phases: Kick-off → Process Understanding → BRD → Solution Design → Build → Testing → UAT → Handholding → Support → Closure.</div></li>
<li><div>For each task: assign owner, dependency, start date, end date, days, and status.</div></li>
<li><div>Note: automation projects can run in parallel per process — plan accordingly (e.g., Process A in build while Process B is still in understanding).</div></li>
<li><div>Get approved by Senior Manager. Share with client using the <span class="ilink" onclick="nav('project_plan_email')">Project Plan Email template →</span> (update subject to say Process Automation).</div></li>
</ol>`},

auto_phase1:{icon:"1️⃣",label:"Phase 1: Process Understanding & BRD",parent:"automation",render:()=>`
<div class="back-btn" onclick="nav('automation')">← Automation SOP</div>
<div class="section-tag">Phase 1 · Automation</div>
<div class="page-icon">1️⃣</div>
<h1 class="page-title">Phase 1: Process Understanding & BRD</h1>
<p>Deep-dive into each automation candidate — understanding the current process in detail, documenting it as-is, and capturing all pain points and requirements in a Business Requirement Document.</p>

<h2>Task 1.1 — Pre-call Preparation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Research the process being discussed before the call so you can contribute actively, ask better questions, and validate what the client says.</div></div>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>For each process to be automated, research how that process ideally works in the client's industry. Use the <span class="ilink" onclick="nav('understanding_prep')">Pre-call Preparation prompts →</span></div></li>
<li><div>Prepare a process-specific questionnaire:<ul class="sub-steps">
<li>What is the trigger that starts this process?</li>
<li>What are the inputs — data sources, file formats, systems?</li>
<li>What steps are done manually today?</li>
<li>Who performs each step and how long does it take?</li>
<li>What is the expected output — format, frequency, recipients?</li>
<li>What are the pain points, errors, and exceptions in the current process?</li>
<li>Are there any validations or business rules that must be applied?</li>
</ul></div></li>
<li><div>Request the client to share any existing Excel files, trackers, or sample outputs before the call.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.2 — Process Understanding Calls</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Understand the current (as-is) process in complete detail — exactly as the process owners do it today, including all manual steps, workarounds, and pain points.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> One dedicated call per process or process area. Invite the Process Owner / Process Manager for that area only.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All process steps documented, pain points captured, MoM sent within 24 hours.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Schedule on MS Teams: <code>&lt;Process Name&gt; Understanding | &lt;Client&gt; x Contetra</code>. Invite the relevant Process Owner. Enable auto-record.</div></li>
<li><div>Start with this script:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Hi everyone. This call is to understand how you currently carry out [process name]. Please walk us through the process step by step — from where it starts to where it ends — and mention any pain points or workarounds you use along the way."</div></div></li>
<li><div>Use your questionnaire from Task 1.1 as a guide. Cover all questions by end of call.</div></li>
<li><div>Ask specifically:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"How many hours per [week/month] does this process take today? And how many people are involved?"</div></div></li>
<li><div>Ask the closing question:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Is there anything else in this process that feels manual, repetitive, or error-prone that you'd like us to solve?"</div></div></li>
<li><div>After the call: save recording to OneDrive, upload to NotebookLM (same client notebook). See <span class="ilink" onclick="nav('phase1')">Post-meeting Rituals →</span></div></li>
<li><div>Send MoM within 24 hours.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.3 — As-Is Documentation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Document the current process clearly — either as a Miro flowchart or a structured Excel file — so both our team and the client have a shared, validated baseline before designing the automation.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> As-is documentation reviewed and approved by client SPOC.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Client SPOC</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Use NotebookLM to extract the full current process using the <span class="ilink" onclick="nav('prompts')">Process Detail Prompt →</span></div></li>
<li><div>Choose the right format based on process complexity:<ul class="sub-steps">
<li><strong>Simple / linear process</strong> → Excel-based step table (Step, Who does it, Input, Output, Time taken, Pain point)</li>
<li><strong>Complex / branching process</strong> → Miro flowchart using AltQuad Ops Template (see <span class="ilink" onclick="nav('credentials')">credentials →</span>)</li>
</ul></div></li>
<li><div>Alongside the as-is documentation, capture a <strong>Pain Points & Requirements list</strong>:<ul class="sub-steps">
<li>List every pain point mentioned by the client</li>
<li>Add any additional inefficiencies you identified independently</li>
<li>Quantify each pain point where possible (hours wasted, error rate, frequency)</li>
</ul></div></li>
<li><div>Share with the client SPOC for review. Get written confirmation (email) that the as-is is accurately captured before proceeding.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.4 — BRD (Business Requirement Document) Preparation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Consolidate everything from the process understanding into a single signed-off document that defines exactly what the automation must achieve — this becomes the contract between our team and the client for the build phase.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> BRD reviewed, discussed with client, and signed off. No build begins without a signed BRD.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Client Management</td></tr></table>
<h3>BRD Structure</h3>
<table class="raci-table"><thead><tr><th>Section</th><th>Contents</th></tr></thead><tbody>
<tr><td><strong>1. Overview</strong></td><td>Project name, client, date, authors, version</td></tr>
<tr><td><strong>2. Scope</strong></td><td>Processes in scope + explicit out-of-scope items</td></tr>
<tr><td><strong>3. As-Is Process</strong></td><td>Current process documentation (flowchart or table)</td></tr>
<tr><td><strong>4. Pain Points & Requirements</strong></td><td>Full list of issues, quantified where possible</td></tr>
<tr><td><strong>5. Proposed Automation</strong></td><td>High-level description of the automation solution and tool(s) to be used</td></tr>
<tr><td><strong>6. Expected Outcomes</strong></td><td>Time savings, error reduction, output format, frequency</td></tr>
<tr><td><strong>7. Assumptions & Constraints</strong></td><td>Data quality, access requirements, system constraints</td></tr>
<tr><td><strong>8. Sign-off</strong></td><td>Client and our team sign-off with date</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare the BRD document using the structure above.</div></li>
<li><div>Walk the client through the BRD in a dedicated review call — do not just email it. Ensure every section is discussed and agreed.</div></li>
<li><div>Incorporate all client feedback. Re-circulate for final review.</div></li>
<li><div>Obtain written sign-off (email confirmation or signed PDF) from the authorised client representative.</div></li>
<li><div>No work in Phase 2 (Solution Design) or Phase 3 (Build) may begin without a signed BRD.</div></li>
</ol>`},

auto_phase2:{icon:"2️⃣",label:"Phase 2: Solution Design & To-Be",parent:"automation",render:()=>`
<div class="back-btn" onclick="nav('automation')">← Automation SOP</div>
<div class="section-tag">Phase 2 · Automation</div>
<div class="page-icon">2️⃣</div>
<h1 class="page-title">Phase 2: Solution Design & To-Be Process</h1>
<p>Identify the right tools, design the automated future-state process, and get client sign-off on the blueprint before building anything.</p>

<h2>Task 2.1 — Solution Identification & Tool Selection</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Determine the right tool(s) for each automation based on the process requirements, data sources, and client environment.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Tool decision documented, rationale explained, approved by Vertical Head.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Tool Selection Framework</h3>
<table class="raci-table"><thead><tr><th>Scenario</th><th>Recommended Tool</th><th>Why</th></tr></thead><tbody>
<tr><td>Repetitive Excel report from ERP data</td><td>VBA Macros</td><td>Automates multi-step Excel tasks, runs on a button click</td></tr>
<tr><td>Combining data from multiple sources / formats</td><td>Power Query</td><td>Standardises and transforms external data automatically</td></tr>
<tr><td>Management dashboards with live data</td><td>Power BI</td><td>Interactive visualisations, scheduled data refresh</td></tr>
<tr><td>Complex logic with custom formulas</td><td>Advanced Excel + VBA</td><td>Finance-specific logic embedded directly in the tool</td></tr>
<tr><td>AI-assisted automation coding</td><td>Gemini Canvas</td><td>Code generation and logic reference for faster build</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Review the signed BRD. For each requirement, map it to the most appropriate tool.</div></li>
<li><div>Consider client constraints:<ul class="sub-steps">
<li>What software does the client already have licensed?</li>
<li>What is the technical level of the end users?</li>
<li>Will the tool need to run without our involvement post-handover?</li>
</ul></div></li>
<li><div>Prepare a one-page tool selection rationale document. Get it reviewed by the Vertical Head before sharing with the client.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 2.2 — To-Be Process Design</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Design the future-state (to-be) automated process — a blueprint of exactly how the automation will work, including all logic, inputs, outputs, exceptions, and the tool's behaviour in each scenario. This must be approved by the client before the build begins.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> To-be blueprint approved by client in writing. Zero ambiguity before entering Phase 3.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>Client Management</td></tr></table>
<h3>What the To-Be Blueprint Must Cover</h3>
<table class="raci-table"><thead><tr><th>Element</th><th>Description</th></tr></thead><tbody>
<tr><td><strong>Trigger</strong></td><td>What starts the automation — button click, scheduled run, file upload?</td></tr>
<tr><td><strong>Inputs</strong></td><td>Exact data sources, file formats, column names, system connections</td></tr>
<tr><td><strong>Logic & Rules</strong></td><td>Every business rule to be applied — formulas, conditions, validations, filters</td></tr>
<tr><td><strong>Exception Handling</strong></td><td>What happens when data is missing, malformed, or out of range?</td></tr>
<tr><td><strong>Output</strong></td><td>Exact output format, layout, naming convention, destination</td></tr>
<tr><td><strong>Frequency</strong></td><td>How often will the automation run? Daily, weekly, monthly, on demand?</td></tr>
<tr><td><strong>User Actions</strong></td><td>What does the user need to do — what is manual vs. automated?</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare the to-be blueprint as a document or Miro flowchart, depending on complexity.</div></li>
<li><div>Walk the client through the blueprint in a dedicated call — do not just share the document. Ensure the client understands every step of the proposed automation.</div></li>
<li><div>Specifically confirm with the client:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Does this blueprint cover everything you need? Are there any scenarios or exceptions we have missed?"</div></div></li>
<li><div>Incorporate all feedback. Finalise the blueprint. Get written client approval before any build starts.</div></li>
</ol>`},

auto_phase3:{icon:"3️⃣",label:"Phase 3: Build & Test",parent:"automation",render:()=>`
<div class="back-btn" onclick="nav('automation')">← Automation SOP</div>
<div class="section-tag">Phase 3 · Automation</div>
<div class="page-icon">3️⃣</div>
<h1 class="page-title">Phase 3: Build & Test</h1>
<p>Build the automation exactly as per the approved to-be blueprint, test it internally, then put it through a formal UAT with the client before handover.</p>

<h2>Task 3.1 — Build the Automation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Develop the automation solution based strictly on the signed-off to-be blueprint. No deviation from the blueprint without a formal change request.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Automation built, internally tested, and ready for UAT.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Use the signed-off to-be blueprint as the sole specification. Do not add features or change logic without client approval.</div></li>
<li><div>Use Gemini Canvas as a coding reference to accelerate development of VBA / Power Query logic.</div></li>
<li><div>Build with the end user in mind:<ul class="sub-steps">
<li>Minimal steps required from the user</li>
<li>Clear error messages for bad / missing data</li>
<li>Instructions / guide embedded directly in the tool (as a separate tab or tooltip)</li>
<li>No dependency on our team to run the automation post-handover</li>
</ul></div></li>
<li><div>Version control: save each version with a date suffix (e.g., <code>AR_Recon_v1_20260310.xlsm</code>). Never overwrite the previous version.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 3.2 — Internal Testing & QA</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Thoroughly test the automation using real client data before showing it to the client. The client should never see a bug.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All test scenarios pass, output matches expected results, PM has signed off on quality.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Test with the actual client data received during Phase 1.</div></li>
<li><div>Test all scenarios from the to-be blueprint including edge cases:<ul class="sub-steps">
<li>Normal scenario — standard data, expected output</li>
<li>Empty / missing data — does the tool handle it gracefully?</li>
<li>Incorrect format — does the tool flag it or break?</li>
<li>Large volume — does performance hold up with the actual data size?</li>
<li>Re-run — can the automation be run multiple times without corrupting results?</li>
</ul></div></li>
<li><div>Manually verify the output against the old manual output for the same data period.</div></li>
<li><div>Document all bugs found and fixes applied in a test log.</div></li>
<li><div>Get PM sign-off on the test results before proceeding to UAT.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 3.3 — UAT with Client</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> The client's process owners test the automation with their own data and confirm it meets their requirements and is ready for live use.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All scenarios tested and passed, all issues resolved, written UAT sign-off received from client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Client Process Owner (supported by Exec)</td><td>Project Manager</td><td>Client Management</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare a UAT scenario list from the to-be blueprint. Each scenario: ID, Description, Steps, Input data, Expected output, Actual output, Pass/Fail, Remarks.</div></li>
<li><div>Share the UAT scenario list with the client in advance. Give them at least 2 working days to run through it.</div></li>
<li><div>Be available on standby during UAT to answer questions and resolve issues immediately.</div></li>
<li><div>Log all issues raised during UAT. Categorise as: Bug / Logic gap / Scope change (new requirement) / Training gap.</div></li>
<li><div>Scope changes during UAT must go through a formal change request — they are not automatically included in the current project.</div></li>
<li><div>Resolve all bugs and logic gaps. Re-test the affected scenarios.</div></li>
<li><div>Obtain written UAT sign-off from an authorised client representative. Mandatory before handover.</div></li>
</ol>`},

auto_phase4:{icon:"4️⃣",label:"Phase 4: Handholding & Handover",parent:"automation",render:()=>`
<div class="back-btn" onclick="nav('automation')">← Automation SOP</div>
<div class="section-tag">Phase 4 · Automation</div>
<div class="page-icon">4️⃣</div>
<h1 class="page-title">Phase 4: Handholding & Handover</h1>
<p>Ensure the client's team can operate the automation independently — with proper training, a support period, and a formal project closure.</p>

<h2>Task 4.1 — User Handholding & Training</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Train the client's end users to operate the automation confidently without needing our support. The automation is only successful if the client can run it themselves.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All users trained, user manual shared, and end users can run the automation independently.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Conduct a live training session with all end users who will operate the automation:<ul class="sub-steps">
<li>Walk through the tool step by step — from opening the file to getting the final output</li>
<li>Demonstrate what to do when there are errors or unexpected results</li>
<li>Show how to update the tool when the underlying data structure changes (if applicable)</li>
</ul></div></li>
<li><div>Record the training session and save to the client's OneDrive folder.</div></li>
<li><div>Prepare and share a <strong>User Manual</strong> for each automation tool. The manual must include:<ul class="sub-steps">
<li>Step-by-step operating instructions with screenshots</li>
<li>What inputs are required and in what format</li>
<li>How to interpret the output</li>
<li>Common errors and how to fix them</li>
<li>Contact details for support during the support period</li>
</ul></div></li>
<li><div>Make the end users run the automation once themselves during the training session — do not just demonstrate. Confirm they can do it independently.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.2 — Support Period</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Provide a structured support window after handover to resolve any issues the client faces during their first real-world use of the automation.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Starts from the day of handover. Duration as agreed in the project scope (typically 2–4 weeks for automation projects).</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Support SLAs</h3>
<table class="raci-table"><thead><tr><th>Priority</th><th>Response Time</th><th>Example</th></tr></thead><tbody>
<tr><td><strong>High</strong></td><td>4 hours</td><td>Automation breaks completely, cannot produce output, data corruption</td></tr>
<tr><td><strong>Medium</strong></td><td>16 hours</td><td>Output has incorrect values, error message with no clear fix</td></tr>
<tr><td><strong>Low</strong></td><td>24 hours</td><td>Formatting tweak, minor layout change, how-to question</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Set up a support tracker shared with the client. Log every issue: Date, Description, Priority, Reported by, Assigned to, Status, Resolution, Resolved date.</div></li>
<li><div>All issues must be logged — no verbal-only resolutions.</div></li>
<li><div>Distinguish between: Bug (fix immediately) | Scope change (raise change request, do not fix for free) | Training gap (re-train the user).</div></li>
<li><div>At the end of the support period, share a summary of all issues raised and resolved with the client.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.3 — Project Closure</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Formally close the project, document learnings, and archive all deliverables for future reference.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Closure report signed, client feedback collected, all files archived.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare a Project Closure Report:<ul class="sub-steps">
<li>Scope delivered vs. original scope</li>
<li>Timeline adherence — planned vs. actual</li>
<li>Automation tools built and processes covered</li>
<li>Quantified time savings achieved (hours saved per cycle x frequency)</li>
<li>Issues faced during build and how they were resolved</li>
<li>Timesheet summary — hours spent per phase</li>
<li>Learnings and recommendations for similar future projects</li>
</ul></div></li>
<li><div>Conduct a closure call with the client. Walk through the report and collect feedback.</div></li>
<li><div>Get the client to fill the <span class="ilink" onclick="nav('templates')">Feedback Form →</span></div></li>
<li><div>Archive all deliverables in OneDrive: recordings, MoMs, BRD, to-be blueprints, built tools, user manuals, test logs, UAT sign-off, closure report.</div></li>
<li><div>File the closure report internally with: industry, processes automated, tools used, team, duration, and key learnings — so future teams can reference it.</div></li>
</ol>`},


master_data:{icon:"🧹",label:"SOP — Master Data Cleanup",parent:"sop_library",render:()=>`
<div class="back-btn" onclick="nav('sop_library')">← SOP Library</div>
<div class="section-tag">Project Type: Master Data Cleanup</div>
<div class="page-icon">🧹</div>
<h1 class="page-title">SOP — Master Data Cleanup</h1>
<p>Master Data Cleanup is the process of identifying, correcting, deduplicating, and enriching the core reference data in a client's ERP system — ensuring that all downstream transactions, reports, and compliance filings are built on a clean, accurate foundation.</p>

<h2>Why Does Master Data Matter?</h2>
<div class="callout"><div class="callout-icon">⚠️</div><div>Dirty master data is the root cause of most operational problems in ERP systems — duplicate vendors leading to double payments, wrong GSTINs causing GST return mismatches, incorrect PIN codes triggering e-invoice failures, and bloated item masters making procurement chaos. Cleaning the master data once, correctly, prevents hundreds of downstream errors.</div></div>

<h2>Master Data Types Covered</h2>
<div class="card-grid">
  <div class="card" onclick="nav('mdc_customer')"><div class="card-icon">👥</div><div class="card-title">Customer Master</div><div class="card-sub">PAN duplicates, GSTIN, address, credit terms, GL tagging.</div></div>
  <div class="card" onclick="nav('mdc_vendor')"><div class="card-icon">🏭</div><div class="card-title">Vendor Master</div><div class="card-sub">PAN duplicates, MSME, bank details, TDS tagging.</div></div>
  <div class="card" onclick="nav('mdc_item')"><div class="card-icon">📦</div><div class="card-title">Item / Product Master</div><div class="card-sub">Duplicates, HSN codes, UOM, GL mapping.</div></div>
  <div class="card" onclick="nav('mdc_coa')"><div class="card-icon">📒</div><div class="card-title">Chart of Accounts</div><div class="card-sub">Rationalisation, grouping, GL structure cleanup.</div></div>
  <div class="card" onclick="nav('mdc_employee')"><div class="card-icon">🪪</div><div class="card-title">Employee Master</div><div class="card-sub">PAN, Aadhaar, bank details, department mapping.</div></div>
  <div class="card" onclick="nav('mdc_other')"><div class="card-icon">🗂️</div><div class="card-title">Other Masters</div><div class="card-sub">Cost centres, tax codes, payment terms, UOM.</div></div>
</div>

<div class="divider"></div>
<h2>Project Phases</h2>
<div class="card-grid" style="grid-template-columns:repeat(4,1fr)">
  <div class="card" onclick="nav('mdc_phase0')"><div class="card-icon">0️⃣</div><div class="card-title">Phase 0</div><div class="card-sub">Scoping & Kick-off</div></div>
  <div class="card" onclick="nav('mdc_phase1')"><div class="card-icon">1️⃣</div><div class="card-title">Phase 1</div><div class="card-sub">Data Extraction & Audit</div></div>
  <div class="card" onclick="nav('mdc_phase2')"><div class="card-icon">2️⃣</div><div class="card-title">Phase 2</div><div class="card-sub">Cleanup & Enrichment</div></div>
  <div class="card" onclick="nav('mdc_phase3')"><div class="card-icon">3️⃣</div><div class="card-title">Phase 3</div><div class="card-sub">Validation & Upload</div></div>
</div>

<div class="divider"></div>
<h2>All Tasks at a Glance</h2>
<table class="raci-table"><thead><tr><th>Phase</th><th>Task</th><th>Output</th><th>Owner</th><th>Approver</th></tr></thead><tbody>
<tr><td>0</td><td><span class="ilink" onclick="nav('mdc_phase0')">Kick-off email & call</span></td><td>Scope agreed, data requested</td><td>Executive</td><td>PM</td></tr>
<tr><td>0</td><td><span class="ilink" onclick="nav('mdc_phase0')">Project plan</span></td><td>Plan shared with client</td><td>PM</td><td>SM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('mdc_phase1')">Data extraction from ERP</span></td><td>Raw master data files</td><td>Executive</td><td>PM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('mdc_phase1')">Data audit & issue log</span></td><td>Issue log with counts</td><td>Executive</td><td>PM</td></tr>
<tr><td>2</td><td><span class="ilink" onclick="nav('mdc_phase2')">Cleanup per master type</span></td><td>Cleaned data files</td><td>Executive</td><td>PM</td></tr>
<tr><td>2</td><td><span class="ilink" onclick="nav('mdc_phase2')">Client validation of findings</span></td><td>Client-approved cleanup list</td><td>PM</td><td>Client</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('mdc_phase3')">Final review & sign-off</span></td><td>Signed-off clean data</td><td>PM</td><td>Client</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('mdc_phase3')">Upload / update in ERP</span></td><td>ERP updated</td><td>Executive</td><td>PM</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('mdc_phase3')">Post-cleanup reconciliation</span></td><td>Reconciliation report</td><td>Executive</td><td>PM</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('mdc_phase3')">Project closure</span></td><td>Closure report</td><td>PM</td><td>VH</td></tr>
</tbody></table>`},

mdc_phase0:{icon:"0️⃣",label:"Phase 0: Scoping & Kick-off",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Phase 0 · Master Data Cleanup</div>
<div class="page-icon">0️⃣</div>
<h1 class="page-title">Phase 0: Scoping & Kick-off</h1>
<p>Define exactly which masters are in scope, understand the client's ERP, and align on the cleanup approach before any data is touched.</p>

<h2>Task 0.1 — Kick-off Email</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Initiate the engagement and request raw master data exports from the client's ERP system.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Open Outlook and send the kick-off email:<ul class="sub-steps">
<li>Subject: <code>Project Kick-off | &lt;Client&gt; &lt;&gt; Contetra | Master Data Cleanup</code></li>
<li>To: All client stakeholders | CC: CPL Team</li>
</ul></div></li>
<li><div>Email body:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Dear Team,

This message is to formally kick off our Master Data Cleanup project.

The goal of this engagement is to audit, clean, and enrich the master data in your ERP system — ensuring that your customer, vendor, item, and account records are accurate, deduplicated, and compliant.

For us to begin the audit, could you please share the following data extracts from your ERP (Excel or CSV format):

- Customer Master — full export with all fields
- Vendor Master — full export with all fields
- Item / Product Master — full export with all fields
- Chart of Accounts — full GL list with groupings
- Employee Master — if in scope
- Any other master as discussed

Please ensure the exports include all fields — not just the display name. Hidden fields like PAN, GSTIN, bank account, payment terms, and GL codes are critical for our audit.

We will treat all data as strictly confidential.

Best regards,</div></div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.2 — Kick-off Call & Scoping</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Understand which masters are in scope, the client's ERP system, the history of data entry quality, and the intended outcome of the cleanup.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Scope document agreed, data received or collection timeline confirmed, MoM sent.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Key Questions to Cover During the Call</h3>
<ol class="steps">
<li><div>Which master data types are in scope? (Customer, Vendor, Item, COA, Employee, others?)</div></li>
<li><div>Which ERP system? How long has data been in the system? Has it ever been cleaned before?</div></li>
<li><div>What is the known problem? (e.g., duplicate vendors causing double payments, GSTIN mismatches in GST returns, wrong HSN codes on invoices?)</div></li>
<li><div>Who is the data owner for each master? (who can confirm or reject a proposed change?)</div></li>
<li><div>After cleanup — will we update the ERP directly, or provide a clean file for the client to upload?</div></li>
<li><div>Is there a trigger for this cleanup? (ERP migration, GST audit, new financial year, system go-live?)</div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.3 — Project Plan</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Define the timeline per master type and agree milestones with the client.</div></div>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare the project plan in Excel. Structure it by master type — each master is a separate workstream.</div></li>
<li><div>For each master: data extraction → audit → client validation → cleanup → sign-off → upload.</div></li>
<li><div>Note: multiple masters can run in parallel. Plan accordingly.</div></li>
<li><div>Share with client using the <span class="ilink" onclick="nav('project_plan_email')">Project Plan Email template →</span></div></li>
</ol>`},

mdc_phase1:{icon:"1️⃣",label:"Phase 1: Data Extraction & Audit",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Phase 1 · Master Data Cleanup</div>
<div class="page-icon">1️⃣</div>
<h1 class="page-title">Phase 1: Data Extraction & Audit</h1>
<p>Extract the raw master data from the client's ERP, run a systematic audit against every quality dimension, and produce a detailed issue log with counts before touching anything.</p>

<h2>Task 1.1 — Data Extraction</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Get a complete, unfiltered export of every master record from the ERP — including inactive and blocked records.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Request view-only ERP access or ask the client to run the exports themselves using a standard format (Excel / CSV).</div></li>
<li><div>Ensure exports include ALL fields — not just display fields. Specifically confirm:<ul class="sub-steps">
<li>PAN, GSTIN, TAN numbers</li>
<li>Bank account number and IFSC</li>
<li>State code, PIN code, city</li>
<li>Payment terms, credit limit</li>
<li>GL codes and account groups</li>
<li>Active / Inactive / Blocked status</li>
<li>Creation date and last modified date</li>
</ul></div></li>
<li><div>Include inactive and blocked records — do not ask the client to filter. Issues often hide in records that are "not used anymore."</div></li>
<li><div>Save the raw files to the client's OneDrive folder as-is. Never edit the raw extraction — always work on a copy.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.2 — Data Audit & Issue Log</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Systematically scan every master record for data quality issues and build an issue log with counts, examples, and severity — before presenting findings to the client.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Issue log completed, PM reviewed, ready to present to client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Issue Log Structure</h3>
<table class="raci-table"><thead><tr><th>Column</th><th>What to Capture</th></tr></thead><tbody>
<tr><td><strong>Sr. No.</strong></td><td>Sequential number</td></tr>
<tr><td><strong>Master Type</strong></td><td>Customer / Vendor / Item / COA / Employee</td></tr>
<tr><td><strong>Issue Category</strong></td><td>Duplicate / Missing Field / Invalid Format / Incorrect Data / Inactive Record / Classification Error</td></tr>
<tr><td><strong>Field Affected</strong></td><td>PAN / GSTIN / PIN Code / Bank Account / etc.</td></tr>
<tr><td><strong>Count</strong></td><td>How many records are affected</td></tr>
<tr><td><strong>Severity</strong></td><td>High (compliance risk) / Medium (operational impact) / Low (hygiene)</td></tr>
<tr><td><strong>Example Record</strong></td><td>One anonymised example to illustrate the issue</td></tr>
<tr><td><strong>Proposed Action</strong></td><td>Merge / Correct / Enrich / Block / Delete / Flag for client decision</td></tr>
</tbody></table>
<h3>Universal Audit Checks (Run on Every Master)</h3>
<ol class="steps">
<li><div><strong>Exact duplicates</strong> — identical records with different codes. Use Excel COUNTIF on name + PAN/GSTIN combination.</div></li>
<li><div><strong>Near-duplicates</strong> — same entity with slightly different names (e.g., "Tata Consultancy" vs "TATA Consultancy Services"). Use fuzzy matching or manual review of similar names.</div></li>
<li><div><strong>Blank mandatory fields</strong> — any record missing PAN, GSTIN, state, city, or GL code.</div></li>
<li><div><strong>Invalid formats</strong> — PAN must be 10 characters (5 alpha + 4 numeric + 1 alpha), GSTIN must be 15 characters, PIN code must be 6 digits, IFSC must be 11 characters.</div></li>
<li><div><strong>Inactive / stale records</strong> — records not used in the last 2–3 years but still active. Flag for blocking, not deletion.</div></li>
<li><div><strong>Naming hygiene</strong> — extra spaces, all caps, inconsistent abbreviations, special characters in names.</div></li>
</ol>`},

mdc_phase2:{icon:"2️⃣",label:"Phase 2: Cleanup & Enrichment",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Phase 2 · Master Data Cleanup</div>
<div class="page-icon">2️⃣</div>
<h1 class="page-title">Phase 2: Cleanup & Enrichment</h1>
<p>Work through each master type systematically — fixing issues identified in the audit, enriching missing data, and getting client sign-off on every proposed change.</p>

<h2>Golden Rules for Cleanup</h2>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Never delete — always block or merge.</strong> Deleting master records in a live ERP breaks transaction history. Mark unused records as "Blocked" or "Inactive" instead.</div></div>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Never change without client sign-off.</strong> Every proposed change must be validated by the client's data owner before it is applied in the system. What looks like a duplicate to us may be intentional.</div></div>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Always work on a copy.</strong> Keep the original raw extract untouched. All changes go in the "Cleaned" version. Maintain a change log of every modification made.</div></div>

<div class="divider"></div>
<h2>Customer Master Cleanup</h2>
<p>Full checklist — work through every item. Click <span class="ilink" onclick="nav('mdc_customer')">Customer Master Detail →</span> for the complete cleanup guide.</p>
<table class="raci-table"><thead><tr><th>#</th><th>Check</th><th>Severity</th><th>Action</th></tr></thead><tbody>
<tr><td>1</td><td>Duplicate PAN — same PAN mapped to multiple customer codes</td><td>High</td><td>Merge into one code; add additional locations under the same code</td></tr>
<tr><td>2</td><td>Duplicate GSTIN — same GSTIN on multiple customers</td><td>High</td><td>Retain one; block duplicates after merging open balances</td></tr>
<tr><td>3</td><td>State code mismatch — GSTIN state code doesn't match the address state</td><td>High</td><td>Correct the state in the address or update the GSTIN</td></tr>
<tr><td>4</td><td>Invalid PAN format — not 10 characters or wrong pattern</td><td>High</td><td>Flag for client to provide correct PAN</td></tr>
<tr><td>5</td><td>Invalid GSTIN format — not 15 characters or wrong pattern</td><td>High</td><td>Flag for client to provide correct GSTIN</td></tr>
<tr><td>6</td><td>PIN code validation — 6 digits, valid Indian PIN code</td><td>Medium</td><td>Correct using India Post PIN database cross-reference</td></tr>
<tr><td>7</td><td>City/State mismatch — city doesn't match the PIN code's actual state</td><td>Medium</td><td>Correct city or state to match the PIN code</td></tr>
<tr><td>8</td><td>Missing Customer Industry classification</td><td>Medium</td><td>Enrich using company name + GST database lookup</td></tr>
<tr><td>9</td><td>Missing Customer Group (e.g., Tata Group — TCS, TML)</td><td>Medium</td><td>Enrich — group parent-subsidiary relationships</td></tr>
<tr><td>10</td><td>Domestic/International/SEZ not classified</td><td>Medium</td><td>Classify based on GSTIN (blank GSTIN = likely International or SEZ)</td></tr>
<tr><td>11</td><td>International customers — missing foreign tax number (VAT/EIN/ABN)</td><td>Medium</td><td>Flag for client to provide; needed for export compliance</td></tr>
<tr><td>12</td><td>Missing or incorrect GL tagging</td><td>High</td><td>Map to correct AR GL and account group</td></tr>
<tr><td>13</td><td>Missing credit limit or payment terms</td><td>Low</td><td>Enrich from contract / client confirmation</td></tr>
<tr><td>14</td><td>Missing customer contacts (email, phone)</td><td>Low</td><td>Enrich where possible; flag remainder to client</td></tr>
<tr><td>15</td><td>Name hygiene — inconsistent casing, extra spaces, special characters</td><td>Low</td><td>Standardise to Title Case; remove special characters</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Vendor Master Cleanup</h2>
<p>Full checklist — work through every item. Click <span class="ilink" onclick="nav('mdc_vendor')">Vendor Master Detail →</span> for the complete guide.</p>
<table class="raci-table"><thead><tr><th>#</th><th>Check</th><th>Severity</th><th>Action</th></tr></thead><tbody>
<tr><td>1</td><td>Duplicate PAN — same PAN on multiple vendor codes</td><td>High</td><td>Merge; add additional locations under one code</td></tr>
<tr><td>2</td><td>Duplicate GSTIN</td><td>High</td><td>Retain one; block duplicates after verifying open AP</td></tr>
<tr><td>3</td><td>Invalid PAN / GSTIN format</td><td>High</td><td>Flag to client; incorrect PAN causes TDS filing issues</td></tr>
<tr><td>4</td><td>State code mismatch in GSTIN vs. address</td><td>High</td><td>Correct address state or GSTIN</td></tr>
<tr><td>5</td><td>MSME check — vendor is MSME but not flagged in system</td><td>High</td><td>Verify via Udyam portal; flag and update MSME status — payment terms must be ≤ 45 days for MSME</td></tr>
<tr><td>6</td><td>Missing or incorrect bank details (account + IFSC)</td><td>High</td><td>Request from vendor; invalid IFSC blocks payment processing</td></tr>
<tr><td>7</td><td>IFSC code validation — 11 characters, valid RBI IFSC format</td><td>High</td><td>Cross-check against RBI IFSC database</td></tr>
<tr><td>8</td><td>Bank account number format check — minimum digits, no special characters</td><td>High</td><td>Request confirmation from vendor if in doubt</td></tr>
<tr><td>9</td><td>Missing TDS tagging — vendor liable for TDS but not tagged</td><td>High</td><td>Apply correct TDS section based on vendor type (194C, 194J, 194H, etc.)</td></tr>
<tr><td>10</td><td>Lower TDS rate not updated — vendor has Form 15G/15H or lower deduction certificate</td><td>High</td><td>Update with certificate validity period and applicable rate</td></tr>
<tr><td>11</td><td>Vendor grouping missing — not classified as sub-contractor / service provider / employee / one-time</td><td>Medium</td><td>Classify based on nature of purchase and PAN type</td></tr>
<tr><td>12</td><td>One-time vendors used repeatedly — should be converted to regular vendors</td><td>Medium</td><td>Create proper vendor master for frequent one-time vendors</td></tr>
<tr><td>13</td><td>Domestic/International not classified</td><td>Medium</td><td>Classify based on GSTIN presence and country</td></tr>
<tr><td>14</td><td>Missing GL tagging and account group</td><td>High</td><td>Map to correct AP GL</td></tr>
<tr><td>15</td><td>Missing credit limit and payment terms</td><td>Medium</td><td>Enrich from vendor contracts</td></tr>
<tr><td>16</td><td>PIN code, city, state validation</td><td>Medium</td><td>Cross-reference and correct</td></tr>
<tr><td>17</td><td>Name hygiene</td><td>Low</td><td>Standardise casing; remove special characters</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Item / Product Master Cleanup</h2>
<p>Full checklist. Click <span class="ilink" onclick="nav('mdc_item')">Item Master Detail →</span> for the complete guide.</p>
<table class="raci-table"><thead><tr><th>#</th><th>Check</th><th>Severity</th><th>Action</th></tr></thead><tbody>
<tr><td>1</td><td>Duplicate items — same product with different codes (common after migrations)</td><td>High</td><td>Merge; retain one master code; update open stock to the retained code</td></tr>
<tr><td>2</td><td>HSN / SAC code missing or incorrect</td><td>High</td><td>Assign correct HSN (goods) or SAC (services) — affects GST rate determination and e-invoice</td></tr>
<tr><td>3</td><td>GST rate missing or incorrect on item</td><td>High</td><td>Cross-reference with GST rate schedule for that HSN code</td></tr>
<tr><td>4</td><td>Unit of Measure (UOM) inconsistency — same item in KG and Nos on different records</td><td>High</td><td>Standardise UOM; define conversion factor where needed</td></tr>
<tr><td>5</td><td>Missing item category / product group classification</td><td>Medium</td><td>Classify based on nature of item — needed for GL auto-determination</td></tr>
<tr><td>6</td><td>Missing GL determination mapping — item not linked to revenue or expense GL</td><td>High</td><td>Map each item category to the correct GL account</td></tr>
<tr><td>7</td><td>Inactive / obsolete items still marked active</td><td>Medium</td><td>Check last transaction date; block items with no activity in 2+ years</td></tr>
<tr><td>8</td><td>Item description hygiene — inconsistent naming, abbreviations, no standard format</td><td>Low</td><td>Standardise item naming convention: [Category] - [Brand] - [Spec] - [UOM]</td></tr>
<tr><td>9</td><td>Missing purchase price / standard cost</td><td>Medium</td><td>Enrich from latest purchase orders or price list</td></tr>
<tr><td>10</td><td>Inventory valuation method not set (FIFO / Weighted Avg)</td><td>High</td><td>Set per company policy; must be consistent across similar item groups</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Chart of Accounts Cleanup</h2>
<p>Full guide. Click <span class="ilink" onclick="nav('mdc_coa')">COA Detail →</span></p>
<table class="raci-table"><thead><tr><th>#</th><th>Check</th><th>Severity</th><th>Action</th></tr></thead><tbody>
<tr><td>1</td><td>Duplicate GL accounts — same purpose, different codes</td><td>High</td><td>Merge; transfer balances to the retained GL before blocking</td></tr>
<tr><td>2</td><td>GL accounts with no transactions in 2+ years</td><td>Medium</td><td>Block; do not delete — needed for historical reporting</td></tr>
<tr><td>3</td><td>Incorrect account group assignment — e.g., an expense coded under assets</td><td>High</td><td>Reassign to correct group; check for historical mispostings</td></tr>
<tr><td>4</td><td>GL not linked to financial statement mapping (P&L vs. Balance Sheet)</td><td>High</td><td>Assign every GL to the correct FS line item</td></tr>
<tr><td>5</td><td>Sub-GL control accounts missing — AR, AP, inventory not separately mapped</td><td>High</td><td>Ensure each Sub-GL has its own control account in the GL</td></tr>
<tr><td>6</td><td>Overly granular COA — hundreds of GLs for the same nature</td><td>Medium</td><td>Rationalise — combine similar GLs; use dimensions (cost centre, project) instead of separate GLs</td></tr>
<tr><td>7</td><td>Missing GL descriptions or unclear naming</td><td>Low</td><td>Standardise GL names: [BS/PL] - [Category] - [Nature] (e.g., "PL - Admin - Office Supplies")</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Employee Master Cleanup</h2>
<p>Full guide. Click <span class="ilink" onclick="nav('mdc_employee')">Employee Master Detail →</span></p>
<table class="raci-table"><thead><tr><th>#</th><th>Check</th><th>Severity</th><th>Action</th></tr></thead><tbody>
<tr><td>1</td><td>Duplicate employee records — same employee with multiple codes (common after system migrations)</td><td>High</td><td>Merge; retain the active code; block duplicates</td></tr>
<tr><td>2</td><td>PAN missing or invalid format</td><td>High</td><td>Mandatory for TDS under Section 192; flag to HR for collection</td></tr>
<tr><td>3</td><td>Aadhaar number missing or invalid (12 digits)</td><td>High</td><td>Flag to HR; required for PF and ESI compliance</td></tr>
<tr><td>4</td><td>Bank account and IFSC missing or invalid</td><td>High</td><td>Collect from employee; required for payroll processing</td></tr>
<tr><td>5</td><td>Department / cost centre not assigned</td><td>High</td><td>Assign based on org chart; affects salary cost allocation in P&L</td></tr>
<tr><td>6</td><td>Designation / grade missing</td><td>Medium</td><td>Enrich from HR records; needed for leave policy and payroll structure</td></tr>
<tr><td>7</td><td>Date of joining missing or incorrect</td><td>Medium</td><td>Verify from offer letter / HR records</td></tr>
<tr><td>8</td><td>Resigned / terminated employees still active in system</td><td>High</td><td>Block immediately; active ex-employees are a security and payroll risk</td></tr>
<tr><td>9</td><td>TDS regime not selected (Old vs. New tax regime)</td><td>High</td><td>Collect declaration from each employee for the FY</td></tr>
<tr><td>10</td><td>PF / ESI applicability not set correctly</td><td>High</td><td>PF applicable if basic ≤ ₹15,000; ESI applicable if gross ≤ ₹21,000</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Task 2.6 — Client Validation of Findings</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Present the full issue log and proposed actions to the client. Get written confirmation on every proposed change before applying it — especially merges and blocks.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Client has reviewed and signed off on the complete cleanup list. No change is applied without this sign-off.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Client Data Owner</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare a <strong>Cleanup Summary Presentation</strong> — do not just share the issue log Excel. Summarise:<ul class="sub-steps">
<li>Total records audited per master type</li>
<li>Issues found by category and severity</li>
<li>Key high-severity findings with examples</li>
<li>Proposed actions and their impact</li>
</ul></div></li>
<li><div>Walk the client through the findings in a dedicated call. Involve the data owner for each master (Finance head for COA/Customer/Vendor, HR head for Employee, SCM head for Item).</div></li>
<li><div>For each proposed <strong>merge or block</strong> — get explicit written confirmation. These are irreversible and carry risk if done incorrectly.</div></li>
<li><div>For proposed corrections (format fixes, enrichments) — share the cleaned file and ask for a bulk sign-off.</div></li>
<li><div>Document all client decisions in the issue log (columns: Client Decision, Decided by, Date). This is your audit trail.</div></li>
</ol>`},

mdc_phase3:{icon:"3️⃣",label:"Phase 3: Validation & Upload",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Phase 3 · Master Data Cleanup</div>
<div class="page-icon">3️⃣</div>
<h1 class="page-title">Phase 3: Validation & Upload</h1>
<p>Final quality check, ERP update, post-cleanup reconciliation, and project closure.</p>

<h2>Task 3.1 — Final Data Validation Before Upload</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Run a final automated check on the cleaned data file before it goes into the ERP — catch any errors introduced during the cleanup process itself.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Final Validation Checklist</h3>
<ol class="steps">
