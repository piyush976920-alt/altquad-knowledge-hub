concept_gl:{icon:"📒",label:"GL & Sub-GL",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">📒</div>
<h1 class="page-title">GL & Sub-GL — The Big Idea</h1>
<div class="page-desc">The General Ledger (GL) is the Summary. The Sub-Ledger (Sub-GL) is the Detail. Think of it like organising a bookshelf — the label on the shelf tells you the total, the books inside tell you exactly what's there.</div>

<h2>The Credit Card Analogy</h2>
<div class="callout"><div class="callout-icon">💳</div><div>Imagine your monthly credit card statement. On the back you see every individual transaction — Starbucks ₹400, petrol ₹2,000, groceries ₹3,500. That list is the <strong>Sub-GL</strong>. On the front page you see one line: <strong>Total Balance: ₹5,900</strong>. That single line is the <strong>GL</strong>.</div></div>

<h2>Real Business Examples</h2>
<table class="raci-table"><thead><tr><th>GL (Summary)</th><th>Sub-GL (Detail)</th><th>Who uses it</th></tr></thead><tbody>
<tr><td><strong>Accounts Receivable: ₹3,500</strong></td><td>Customer A owes ₹1,000 · Customer B owes ₹2,000 · Customer C owes ₹500</td><td>CFO sees GL · Collections team uses Sub-GL to call customers</td></tr>
<tr><td><strong>Accounts Payable: ₹7,300</strong></td><td>Landlord ₹2,000 · Dell ₹5,000 · Power company ₹300</td><td>Finance head sees GL · AP team pays each vendor from Sub-GL</td></tr>
<tr><td><strong>Inventory: ₹6,500</strong></td><td>10 Laptops @ ₹500 · 50 Keyboards @ ₹20 · 100 Mousepads @ ₹5</td><td>Balance Sheet shows GL · Warehouse manages Sub-GL</td></tr>
</tbody></table>

<h2>How GL and Sub-GL Talk to Each Other</h2>
<ol class="steps">
<li><div>Operational staff enter transactions into the Sub-GL daily (e.g., creating a customer invoice).</div></li>
<li><div>The system automatically "rolls up" the Sub-GL total and posts it to the GL Control Account.</div></li>
<li><div><strong>The Golden Rule:</strong> The total of all Sub-GL entries must always equal the GL Control Account balance. If they don't match — you have a reconciliation problem that must be fixed before any financial statement is prepared.</div></li>
</ol>

<h2>Quick Reference</h2>
<table class="raci-table"><thead><tr><th>Feature</th><th>Sub-Ledger (Sub-GL)</th><th>General Ledger (GL)</th></tr></thead><tbody>
<tr><td>Level of detail</td><td>High — every individual transaction</td><td>Low — summarised totals only</td></tr>
<tr><td>Who uses it</td><td>Operational staff (Sales, AP, AR clerks)</td><td>Management, Auditors, Investors</td></tr>
<tr><td>Purpose</td><td>Track specific parties and items</td><td>Prepare Financial Statements</td></tr>
<tr><td>Example</td><td>"Raju Textiles owes ₹50,000"</td><td>"Total Receivables: ₹8,00,000"</td></tr>
</tbody></table>`},

concept_enterprise:{icon:"🏗️",label:"Enterprise Structure",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🏗️</div>
<h1 class="page-title">Enterprise Structure</h1>
<div class="page-desc">The cuts and slices in which management wants to see profitability define the Enterprise Structure. Getting this right before ERP configuration is critical — it is very expensive to change later.</div>

<h2>Cost Centre vs Profit Centre</h2>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Cost Centre:</strong> An area that incurs costs but generates no direct revenue. It is a combination of Department + Location. <em>Example: HR team at Mumbai → "HR – Mumbai" is a cost centre.</em></div></div>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Profit Centre:</strong> An area that directly generates revenue. <em>Example: Process Vertical — it bills clients and earns revenue, so it is a Profit Centre.</em></div></div>

<h2>Example: Enterprise Structure (Contetra)</h2>
<table class="raci-table"><thead><tr><th>Dimension</th><th>Values</th><th>Type</th></tr></thead><tbody>
<tr><td><strong>Verticals</strong></td><td>Process · FPNA · Technical Accounting</td><td>Profit Centres</td></tr>
<tr><td><strong>Project Categories</strong></td><td>ERP Implementation · Diagnostics · Automation</td><td>Sub-Profit Centres</td></tr>
<tr><td><strong>Departments</strong></td><td>HR · Finance · Sales · Delivery · Legal · IT</td><td>Cost Centres</td></tr>
<tr><td><strong>Locations</strong></td><td>Mumbai · Bangalore</td><td>Cost Centre dimension</td></tr>
<tr><td><strong>Project Code</strong></td><td>Unique code per client project</td><td>Reporting dimension</td></tr>
<tr><td><strong>Customer Industry</strong></td><td>Captured at Customer Master level</td><td>Reporting dimension</td></tr>
</tbody></table>

<h2>The Thumb Rule</h2>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Minimise user inputs at transaction level.</strong> Every dimension that requires a user to manually select something at transaction entry is a source of error. Capture dimensions at the Master level wherever possible — Project Master captures the vertical and project category, Customer Master captures the industry, User ID captures the department and location.</div></div>

<h2>Legal Entity Structure</h2>
<p>Every legal entity is identified as a separate person in the ERP. Relationships between entities (holding company, subsidiary, associated party) are established at the Legal Entity level. The Enterprise Structure is then an extension of the Legal Entity Structure — each legal entity can have its own cost centres and profit centres.</p>

<h2>What Management Should Be Able to See</h2>
<ol class="steps">
<li><div>Gross Margin by Project</div></li>
<li><div>Gross Margin by Project Category (ERP / Diagnostics / Automation)</div></li>
<li><div>Gross Margin by Vertical (Process / FPNA / Tech Accounting)</div></li>
<li><div>Gross Margin by Customer and Customer Industry</div></li>
<li><div>Cost by Department and Location (Cost Centre P&L)</div></li>
</ol>`},

concept_migration:{icon:"🔄",label:"Migration Approach",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🔄</div>
<h1 class="page-title">Migration / Cut-over Approach</h1>
<div class="page-desc">How to migrate data from an old ERP to a new ERP — the sequencing, the accounting entries, and the critical checklists that ensure you don't go live with wrong balances.</div>

<h2>The Step-by-Step Migration Approach</h2>
<ol class="steps">
<li><div>Clean up the COA, master data, and prepare a final list of all balances in the old ERP. Nothing dirty goes into the new system.</div></li>
<li><div>Select a <strong>cut-off date</strong> (e.g., 31.12.2025). All transactions up to this date stay in the old system. All new transactions from Day 1 go into the new ERP.</div></li>
<li><div>Create 4 standard <strong>Migration Control GLs</strong> in the new ERP:<ul class="sub-steps"><li>AR Migration Control Account</li><li>AP Migration Control Account</li><li>GL Migration Control Account</li><li>Inventory Migration Control Account</li></ul></div></li>
<li><div>Upload balances in this order: <strong>Open AR → Open AP → Inventory → Fixed Assets → Other Sub-GLs → Trial Balance</strong></div></li>
</ol>

<h2>Sub-GL Upload Checklist</h2>
<table class="raci-table"><thead><tr><th>#</th><th>Check</th></tr></thead><tbody>
<tr><td>a</td><td>Original document number must be captured</td></tr>
<tr><td>b</td><td>No GST or TDS element in the upload data</td></tr>
<tr><td>c</td><td>Total must match the corresponding Trial Balance</td></tr>
<tr><td>d</td><td>Upload invoice-wise, not net balances</td></tr>
<tr><td>e</td><td>On-account advances uploaded as negative with a unique code</td></tr>
<tr><td>f</td><td>Check Special GL indicator applicability</td></tr>
<tr><td>g</td><td>Upload sample transactions in UAT first — validate — then do Production</td></tr>
<tr><td>h</td><td>Check how the new ERP handles credit/debit notes against open invoices post-migration (ask tech partner)</td></tr>
<tr><td>i</td><td>No item lines needed in open balance uploads</td></tr>
<tr><td>j</td><td>Smaller-value invoices can be cleaned up (written off) before migration</td></tr>
<tr><td>k</td><td>Net balances only — after TDS deduction</td></tr>
</tbody></table>

<h2>Trial Balance Upload Checklist</h2>
<table class="raci-table"><thead><tr><th>#</th><th>Check</th></tr></thead><tbody>
<tr><td>a</td><td>Debit total = Credit total (must match exactly)</td></tr>
<tr><td>b</td><td>Sub-GL totals must match corresponding TB balances</td></tr>
<tr><td>c</td><td>Use the cleaned/rationalised COA — not the old one</td></tr>
<tr><td>d</td><td>Client SPOC sign-off required before upload</td></tr>
<tr><td>e</td><td>Upload in UAT first, validate, then replicate in Production</td></tr>
</tbody></table>

<h2>Accounting Entries — Migration</h2>
<table class="raci-table"><thead><tr><th>Scenario</th><th>Debit</th><th>Credit</th></tr></thead><tbody>
<tr><td>Open AR — outstanding invoice</td><td>Customer Account</td><td>AR Migration Control A/c</td></tr>
<tr><td>Open AR — advance received from customer</td><td>AR Migration Control A/c</td><td>Customer Account</td></tr>
<tr><td>Open AP — outstanding invoice</td><td>AP Migration Control A/c</td><td>Vendor Account</td></tr>
<tr><td>Open AP — advance paid to vendor</td><td>Vendor Account</td><td>AP Migration Control A/c</td></tr>
<tr><td>Trial Balance upload</td><td>Asset accounts + AR Migration Control</td><td>Liability accounts + AP Migration Control + GL Migration Control</td></tr>
</tbody></table>
<div class="callout"><div class="callout-icon">✅</div><div><strong>The Net Check:</strong> After all uploads are complete, the net balance of all 4 Migration Control Accounts combined must equal zero. If not — something has been missed or doubled.</div></div>`},

concept_coa:{icon:"🗂️",label:"COA Mapping",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🗂️</div>
<h1 class="page-title">COA Mapping During Migration</h1>

<tr><td><strong style="color:#e74c3c">2</strong></td><td>Liability</td><td>Balance Sheet</td><td>2020201</td><td>Accounts Payable — Trade</td></tr>
<tr><td><strong style="color:#8e44ad">3</strong></td><td>Equity</td><td>Balance Sheet</td><td>3010101</td><td>Share Capital</td></tr>
<tr><td><strong style="color:#2980b9">4</strong></td><td>Income</td><td>Profit & Loss</td><td>4010101</td><td>Service Revenue</td></tr>
<tr><td><strong style="color:#e67e22">5</strong></td><td>Expense</td><td>Profit & Loss</td><td>5010101</td><td>Electricity Charges — Direct</td></tr>
<tr><td><strong style="color:#7f8c8d">9</strong></td><td>Migration Ledgers</td><td>Temporary (cleared post go-live)</td><td>9000001</td><td>Migration Trade Receivable</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Understanding the 4 Levels</h2>
<p>The 7-digit code has 4 levels of hierarchy. Each level adds more specificity:</p>

<table class="raci-table"><thead><tr><th>Level</th><th>Digits</th><th>Purpose</th><th>Example Code</th><th>Example Label</th></tr></thead><tbody>
<tr><td><strong>Level 1</strong></td><td>1000000</td><td>Broad category — never posted to directly</td><td>1000000</td><td>Asset</td></tr>
<tr><td><strong>Level 2</strong></td><td>1010000</td><td>Sub-category — groups similar accounts</td><td>1010000</td><td>Non-Current Asset</td></tr>
<tr><td><strong>Level 3</strong></td><td>1010100</td><td>Account group — further narrows the type</td><td>1010100</td><td>Property, Plant & Equipment</td></tr>
<tr><td><strong>Level 4</strong></td><td>1010101</td><td>Individual GL — actual posting level</td><td>1010101</td><td>Land</td></tr>
</tbody></table>

<div class="callout"><div class="callout-icon">💡</div><div><strong>Only Level 4 accounts are posted to.</strong> Levels 1–3 are grouping/summary levels — they roll up the balances of all Level 4 accounts below them. This is what allows you to see both a high-level Balance Sheet and a drill-down detail in the same ERP.</div></div>

<div class="divider"></div>
<h2>Full Example — Reading a COA Code</h2>
<p>Take the code <strong>5010101</strong> — Electricity Charges Direct:</p>
<table class="raci-table"><thead><tr><th>Digit(s)</th><th>Meaning</th></tr></thead><tbody>
<tr><td><strong>5</strong>xxxxxx</td><td>Expense (P&L)</td></tr>
<tr><td>5<strong>01</strong>xxxx</td><td>Contract Cost (sub-category of Expense)</td></tr>
<tr><td>501<strong>01</strong>xx</td><td>Direct Overheads (group within Contract Cost)</td></tr>
<tr><td>50101<strong>01</strong></td><td>Electricity Charges — Direct (individual GL, posting level)</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>The COA Rationalisation Process</h2>
<ol class="steps">
<li><div>First, rationalise the existing COA — merge duplicate GLs, eliminate unused accounts, fix misclassified accounts. See <span class="ilink" onclick="nav('mdc_coa')">COA Cleanup Guide →</span></div></li>
<li><div>Once you have the new clean COA, map every old GL to a new GL. This mapping drives the Trial Balance migration.</div></li>
<li><div>If migration is at <strong>year end</strong> — only Balance Sheet accounts need to be mapped (P&L accounts reset to zero at year end).</div></li>
<li><div>If migration is <strong>mid-year</strong> — both Balance Sheet and P&L accounts must be mapped (YTD P&L balances carry over).</div></li>
</ol>

<h2>Mapping Possibilities</h2>
<table class="raci-table"><thead><tr><th>Scenario</th><th>Example</th></tr></thead><tbody>
<tr><td><strong>Many old GLs → One new GL</strong></td><td>"Travelling Expenses 18%" + "Travelling Expenses" → merged into single "Travelling Expenses" GL</td></tr>
<tr><td><strong>One old GL → Many new GLs</strong></td><td>"GST Payable" → split into IGST Payable + CGST Payable + SGST Payable</td></tr>
<tr><td><strong>Old GL → Sub-GL level</strong></td><td>"Security Deposits" → now maintained at Sub-GL level (individual deposit-wise)</td></tr>
</tbody></table>

<h2>Accounts That Must Always Be at Sub-GL Level</h2>
<div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
<div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Debtors (Customer-wise)</div></div><div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Creditors (Vendor-wise)</div></div><div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Inventory (Item-wise)</div></div><div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Fixed Assets (Asset-wise)</div></div><div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Fixed Deposits</div></div><div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Advances to Employees</div></div><div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Bank Accounts</div></div><div class="callout" style="margin:0"><div class="callout-icon">📌</div><div>Loans</div></div>
</div>
<div style="margin-top:16px"></div>
<div class="callout"><div class="callout-icon">💡</div><div>Generally <strong>4 levels of COA</strong> are sufficient for most businesses — adding more levels creates complexity without reporting benefit. Use dimensions (cost centres, projects, customer industry) instead of additional GL levels.</div></div>`},

concept_special_gl:{icon:"🚦",label:"Special GL Indicator",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🚦</div>
<h1 class="page-title">Special GL Indicator</h1>
<div class="page-desc">A Special GL Indicator is a "detour sign" for accounting entries — it tells the system to route a transaction to a special account instead of the standard payable or receivable account.</div>

<h2>The Coffee Shop Analogy</h2>
<div class="callout"><div class="callout-icon">☕</div><div>You run a tab at a coffee shop. Every coffee goes on your <strong>Main Tab</strong> (standard AP). But one day you borrow an expensive mug and pay a ₹500 security deposit. The barista puts that in a separate <strong>Deposits Box</strong> — not on your main tab, because it's a different kind of money. The sticky note marking it as a "Deposit" is the <strong>Special GL Indicator</strong>.</div></div>

<h2>Most Common Use Case — Vendor Advance (Down Payment)</h2>
<ol class="steps">
<li><div>You hire a contractor for ₹1,00,000. They ask for ₹20,000 advance before starting.</div></li>
<li><div>Without Special GL: The system books the ₹20,000 as a credit to Accounts Payable. Your vendor balance shows −₹20,000 which is confusing and incorrect.</div></li>
<li><div>With Special GL Indicator "A" (Down Payment): The system routes the ₹20,000 to <strong>"Advances Paid to Vendors" (Asset)</strong> — not AP. Your AP shows ₹0 (no invoice yet). Your Assets show ₹20,000 paid in advance.</div></li>
<li><div>When the invoice arrives for ₹1,00,000: AP shows ₹1,00,000. The ₹20,000 advance is cleared against it. You pay the remaining ₹80,000.</div></li>
</ol>

<h2>Why It Matters — Balance Sheet Accuracy</h2>
<div class="callout"><div class="callout-icon">⚠️</div><div>Advances paid are <strong>Assets</strong> (you paid money and will receive value). Accounts Payable is a <strong>Liability</strong> (you owe money). Mixing them together by netting one against the other makes financial statements incorrect. Special GL indicators keep them separate but linked to the same vendor.</div></div>

<h2>Common Special GL Indicator Codes</h2>
<table class="raci-table"><thead><tr><th>Code</th><th>Transaction Type</th><th>Account Nature</th></tr></thead><tbody>
<tr><td><strong>A</strong></td><td>Vendor Down Payment / Advance</td><td>Asset — Advances Paid</td></tr>
<tr><td><strong>E</strong></td><td>Security Deposit paid to vendor</td><td>Asset — Deposits</td></tr>
<tr><td><strong>F</strong></td><td>Customer Down Payment received</td><td>Liability — Advances Received</td></tr>
<tr><td><strong>W</strong></td><td>Bills of Exchange / Guarantee</td><td>Varies</td></tr>
</tbody></table>`},

<div class="callout"><div class="callout-icon">📌</div><div><strong>Definition:</strong> Work has been done and value delivered to the client, but the invoice has not yet been raised. Revenue is earned but not billed. Also called <strong>Accrued Revenue</strong>. Sits as a <strong>Current Asset</strong> on the Balance Sheet.</div></div>

<h2>Example 1 — T&M Project (Time & Material)</h2>
<p>Project P1234. Your team works <strong>100 hours in May</strong> at ₹5,000/hr. Customer has not yet approved hours at month end.</p>
<h3>Step 1 — Month-End Revenue Recognition (31 May)</h3>
<table class="raci-table"><thead><tr><th>Account</th><th>Dr/Cr</th><th>Amount</th><th>Logic</th></tr></thead><tbody>
<tr><td>Unbilled Revenue A/c (Asset)</td><td><strong>Dr</strong></td><td>₹5,00,000</td><td rowspan="2">100 hours × ₹5,000/hr (billing rate, not cost)</td></tr>
<tr><td>Revenue A/c (Income)</td><td><strong>Cr</strong></td><td>₹5,00,000</td></tr>
</tbody></table>
<div class="callout"><div class="callout-icon">💡</div><div>UBR is always raised at the <strong>billing rate</strong> (what the client pays), not at cost. The cost entry is separate and based on the payroll register.</div></div>

<h3>Step 2 — Customer Approves Only 90 Hours (15 June)</h3>
<p>Customer approves 90 hours, not 100. The 10-hour difference must be reversed immediately.</p>
<table class="raci-table"><thead><tr><th>Account</th><th>Dr/Cr</th><th>Amount</th><th>Logic</th></tr></thead><tbody>
<tr><td>Revenue A/c (Income)</td><td><strong>Dr</strong></td><td>₹50,000</td><td rowspan="2">Reverse 10 hours × ₹5,000/hr. Revenue reduced to reflect approved hours only.</td></tr>
<tr><td>Unbilled Revenue A/c (Asset)</td><td><strong>Cr</strong></td><td>₹50,000</td></tr>
</tbody></table>
<div class="callout"><div class="callout-icon">⚠️</div><div>Do not wait for next month to rectify. The rectification entry must be passed as soon as the customer-approved hours are known. UBR in books must always reflect <strong>customer-approved work</strong>, not just internally approved work.</div></div>

<h3>Step 3 — Invoice Raised / PO Received (15 July)</h3>
<p>Invoice is raised for 90 approved hours. UBR is cleared and replaced with a proper receivable.</p>
<table class="raci-table"><thead><tr><th>Account</th><th>Dr/Cr</th><th>Amount</th><th>Logic</th></tr></thead><tbody>
<tr><td>Customer A/c (Receivable)</td><td><strong>Dr</strong></td><td>₹4,50,000</td><td rowspan="2">90 hours × ₹5,000/hr. UBR fully cleared. Customer A/c now holds the receivable.</td></tr>
<tr><td>Unbilled Revenue A/c (Asset)</td><td><strong>Cr</strong></td><td>₹4,50,000</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Example 2 — Fixed Price Project (POC Method)</h2>
<p>Project P1235. Contract value: <strong>₹50,00,000</strong>. Revenue is recognised using the <strong>Percentage of Completion (POC)</strong> method.</p>
<div class="callout"><div class="callout-icon">📐</div><div><strong>POC Formula:</strong><br>POC % = Actual YTD Cost ÷ Estimated Total Cost<br>Revenue to Recognise = POC % × Total Contract Value<br><br><em>Example: YTD cost = ₹3,00,000 · Estimated total cost = ₹15,00,000 → POC = 20% → Revenue = 20% × ₹50,00,000 = ₹10,00,000</em></div></div>

<h3>Month-End Revenue Recognition (31 May)</h3>
<table class="raci-table"><thead><tr><th>Account</th><th>Dr/Cr</th><th>Amount</th><th>Logic</th></tr></thead><tbody>
<tr><td>Unbilled Revenue A/c (Asset)</td><td><strong>Dr</strong></td><td>₹10,00,000</td><td rowspan="2">POC % × Contract Value. No invoice raised yet — goes to UBR.</td></tr>
<tr><td>Revenue A/c (Income)</td><td><strong>Cr</strong></td><td>₹10,00,000</td></tr>
</tbody></table>

<h3>Milestone Triggered — Customer Approves ₹8.5L (15 June)</h3>
<p>Customer approves a milestone of ₹8,50,000. UBR is reversed to the extent of the invoice raised.</p>
<table class="raci-table"><thead><tr><th>Account</th><th>Dr/Cr</th><th>Amount</th><th>Logic</th></tr></thead><tbody>
<tr><td>Customer A/c (Receivable)</td><td><strong>Dr</strong></td><td>₹8,50,000</td><td rowspan="2">Milestone value. UBR reversed to this extent. Remaining ₹1,50,000 stays in UBR with ageing.</td></tr>
<tr><td>Unbilled Revenue A/c (Asset)</td><td><strong>Cr</strong></td><td>₹8,50,000</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Unearned Revenue — Billed, Not Yet Earned</h2>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Definition:</strong> The client has been invoiced and may have even paid — but the work has not yet been done. Revenue is billed but not earned. Also called <strong>Deferred Revenue</strong>. Sits as a <strong>Current Liability</strong> on the Balance Sheet.</div></div>
<table class="raci-table"><thead><tr><th>Scenario</th><th>Account</th><th>Dr/Cr</th><th>Amount</th></tr></thead><tbody>
<tr><td rowspan="2">Annual retainer billed upfront on 1 April — ₹12,00,000</td><td>Bank A/c</td><td>Dr</td><td>₹12,00,000</td></tr>
<tr><td>Unearned Revenue A/c (Liability)</td><td>Cr</td><td>₹12,00,000</td></tr>
<tr><td rowspan="2">Each month as service is delivered — ₹1,00,000/month</td><td>Unearned Revenue A/c (Liability)</td><td>Dr</td><td>₹1,00,000</td></tr>
<tr><td>Revenue A/c (Income)</td><td>Cr</td><td>₹1,00,000</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Side-by-Side Comparison</h2>
<table class="raci-table"><thead><tr><th></th><th>Unbilled Revenue</th><th>Unearned Revenue</th></tr></thead><tbody>
<tr><td><strong>Also called</strong></td><td>Accrued Revenue</td><td>Deferred Revenue</td></tr>
<tr><td><strong>Work done?</strong></td><td>✅ Yes</td><td>❌ No</td></tr>
<tr><td><strong>Invoice raised?</strong></td><td>❌ No</td><td>✅ Yes</td></tr>
<tr><td><strong>Balance Sheet</strong></td><td>Current Asset</td><td>Current Liability</td></tr>
<tr><td><strong>Revenue in P&L?</strong></td><td>✅ Yes — recognised at month end</td><td>❌ No — recognised as work is done</td></tr>
<tr><td><strong>Common in</strong></td><td>T&M projects, consulting, milestone billing</td><td>Annual retainers, subscriptions, AMC contracts</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Key Rules to Never Forget</h2>
<ol class="steps">
<li><div>UBR entries are raised at <strong>month end</strong> based on approved hours (T&M) or POC calculation (Fixed Price) — not when the invoice is raised.</div></li>
<li><div>UBR is always at the <strong>billing rate</strong>, never at cost. Cost entries are separate.</div></li>
<li><div>When customer approves fewer hours than worked — pass the <strong>rectification entry immediately</strong>. Never let incorrect UBR carry forward.</div></li>
<li><div>UBR must be tracked at the <strong>project and customer level</strong> with proper ageing. UBR sitting for more than 90 days without an invoice is a red flag.</div></li>
<li><div>Old UBR that cannot be invoiced must be <strong>written off</strong> — carrying it as an asset when it is unrecoverable inflates the Balance Sheet.</div></li>
<li><div>T&M vs Fixed Price: T&M UBR is rectified when customer confirms hours. Fixed Price UBR reduces when milestones are triggered and invoiced.</div></li>
</ol>`},

concept_gst:{icon:"🧾",label:"GST — Concepts & Ledgers",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🧾</div>
<h1 class="page-title">GST — Concepts & Ledger Configuration</h1>
<div class="page-desc">Goods and Services Tax (GST) is India's unified indirect tax. Understanding how it flows — from transaction to return — and how to configure ledgers correctly in an ERP is essential for any ERP project.</div>

<h2>How GST Works (Simplified)</h2>
<ol class="steps">
<li><div><strong>Output GST</strong> — When you sell goods or services, you charge GST to your customer and collect it on behalf of the government. This is your liability.</div></li>
<li><div><strong>Input Tax Credit (ITC)</strong> — When you buy goods or services, you pay GST to your supplier. You can claim this back and set it off against your output GST liability.</div></li>
<li><div><strong>Net GST Payable</strong> — Output GST minus ITC = what you actually pay to the government.</div></li>
<li><div><strong>IGST vs CGST+SGST</strong> — Inter-state transactions attract IGST. Intra-state transactions attract CGST + SGST (each at half the rate).</div></li>
<li><div><strong>RCM (Reverse Charge Mechanism)</strong> — For specific services (e.g., GTA, legal fees from advocates), the buyer pays GST directly to the government instead of the supplier. Both a liability (output RCM) and an asset (input RCM credit) are created.</div></li>
</ol>

<h2>Standard GST Ledger Configuration</h2>
<p>These ledgers must exist under <strong>Current Liabilities → Duties and Taxes → GST</strong> in every ERP:</p>
<table class="raci-table"><thead><tr><th>Ledger Name</th><th>Nature</th><th>Tax Type</th></tr></thead><tbody>
<tr><td>Output IGST</td><td>Liability</td><td>Inter-state sales GST collected</td></tr>
<tr><td>Output CGST</td><td>Liability</td><td>Intra-state CGST collected</td></tr>
<tr><td>Output SGST</td><td>Liability</td><td>Intra-state SGST collected</td></tr>
<tr><td>Input IGST</td><td>Asset (ITC)</td><td>ITC on inter-state purchases</td></tr>
<tr><td>Input CGST</td><td>Asset (ITC)</td><td>ITC on intra-state purchases</td></tr>
<tr><td>Input SGST</td><td>Asset (ITC)</td><td>ITC on intra-state purchases</td></tr>
<tr><td>RCM IGST</td><td>Liability + Asset</td><td>Reverse Charge inter-state</td></tr>
<tr><td>RCM CGST</td><td>Liability + Asset</td><td>Reverse Charge intra-state</td></tr>
<tr><td>RCM SGST</td><td>Liability + Asset</td><td>Reverse Charge intra-state</td></tr>
<tr><td>IGST Payable</td><td>Net Liability</td><td>After ITC set-off — inter-state</td></tr>
<tr><td>CGST Payable</td><td>Net Liability</td><td>After ITC set-off — intra-state</td></tr>
<tr><td>SGST Payable</td><td>Net Liability</td><td>After ITC set-off — intra-state</td></tr>
</tbody></table>
<div class="callout"><div class="callout-icon">⚠️</div><div>ITC set-off rules: IGST credit can be used against IGST, CGST, or SGST liability (in that priority order). CGST credit can only be used against CGST. SGST credit can only be used against SGST. Never cross-set off CGST against SGST or vice versa.</div></div>`},

concept_crp_uat:{icon:"🧪",label:"CRP & UAT",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🧪</div>
<h1 class="page-title">CRP & UAT — What Are They and How Are They Different?</h1>

<h2>CRP — Conference Room Pilot</h2>
<div class="callout"><div class="callout-icon">📌</div><div>A <strong>Conference Room Pilot</strong> is a testing phase conducted by the <em>implementation team</em> (our team + technical partner) in a controlled environment. It simulates the client's business processes in the newly configured ERP to verify that the system has been set up correctly — before real users touch it.</div></div>
<table class="raci-table"><thead><tr><th>Aspect</th><th>CRP</th></tr></thead><tbody>
<tr><td>Who conducts it</td><td>Our team + Technical Partner</td></tr>
<tr><td>When</td><td>After initial ERP configuration — before training and UAT</td></tr>
<tr><td>Purpose</td><td>Validate that the system is configured correctly as per the to-be processes</td></tr>
<tr><td>Data used</td><td>Sample/dummy data or limited real data</td></tr>
<tr><td>Output</td><td>Issue log, gap list, configuration changes required</td></tr>
<tr><td>Sign-off</td><td>Client management signs off on CRP before UAT begins</td></tr>
</tbody></table>

<h2>UAT — User Acceptance Testing</h2>
<div class="callout"><div class="callout-icon">📌</div><div><strong>User Acceptance Testing</strong> is conducted by the <em>client's own end users</em> — the people who will use the system daily after go-live. Its purpose is to confirm that the system meets their actual business requirements and that they are comfortable operating it independently.</div></div>
<table class="raci-table"><thead><tr><th>Aspect</th><th>UAT</th></tr></thead><tbody>
<tr><td>Who conducts it</td><td>Client's end users (supported by our team)</td></tr>
<tr><td>When</td><td>After training — immediately before Go-live</td></tr>
<tr><td>Purpose</td><td>Confirm system meets business requirements from the user's perspective</td></tr>
<tr><td>Data used</td><td>Real business data — actual transactions from the client's operations</td></tr>
<tr><td>Output</td><td>UAT sign-off document — mandatory before Go-live</td></tr>
<tr><td>Sign-off</td><td>Authorised client representative signs off — Go-live cannot happen without this</td></tr>
</tbody></table>

<h2>Key Difference in One Line</h2>
<div class="callout"><div class="callout-icon">💡</div><div>CRP = <strong>implementation team</strong> testing that the system is built right. UAT = <strong>client users</strong> confirming the system does what they need. Both are mandatory. CRP catches configuration errors. UAT catches requirement gaps and training needs.</div></div>`},

concept_mrp:{icon:"🏭",label:"MRP — Material Resource Planning",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🏭</div>
<h1 class="page-title">MRP — Material Resource Planning</h1>
<div class="page-desc">MRP is the brain of a manufacturing company's planning system. It answers three questions: What materials do we need? How many? And when must we order them so production doesn't stop?</div>

<h2>The Core Concept</h2>
<div class="callout"><div class="callout-icon">💡</div><div>Think of MRP as a <strong>backward scheduler</strong>. You tell it: "I need 50 finished tables by Week 8." MRP works backward from that deadline, calculating exactly what components to order and when — so every part arrives just in time for production, not a week early (wasting storage) and not a day late (stopping the line).</div></div>

<h2>3 Key Terms</h2>
<table class="raci-table"><thead><tr><th>Term</th><th>Definition</th></tr></thead><tbody>
<tr><td><strong>BOM (Bill of Materials)</strong></td><td>The "recipe" for the product — every raw material, component, and sub-assembly needed to make one unit</td></tr>
<tr><td><strong>Lead Time</strong></td><td>How long it takes from placing an order to receiving the material</td></tr>
<tr><td><strong>Net Requirement</strong></td><td>Total needed MINUS current inventory = what you actually need to order</td></tr>
</tbody></table>

<h2>Example: 50 Wooden Dining Tables by Week 8</h2>
<p>BOM for 1 table: 1 Table Top + 4 Legs + 1 Hardware Kit. Assembly takes 1 week.</p>
<table class="raci-table"><thead><tr><th>Component</th><th>Gross Need</th><th>Stock</th><th>Net Order</th><th>Lead Time</th><th>Order By</th></tr></thead><tbody>
<tr><td>Table Tops</td><td>50</td><td>10</td><td>40</td><td>3 weeks</td><td><strong>Week 4</strong></td></tr>
<tr><td>Legs</td><td>200 (50×4)</td><td>50</td><td>150</td><td>2 weeks</td><td><strong>Week 5</strong></td></tr>
<tr><td>Hardware Kits</td><td>50</td><td>0</td><td>50</td><td>1 week</td><td><strong>Week 6</strong></td></tr>
</tbody></table>
<table class="raci-table"><thead><tr><th>Week</th><th>Action</th></tr></thead><tbody>
<tr><td>Week 4</td><td>Release Purchase Order: 40 Table Tops</td></tr>
<tr><td>Week 5</td><td>Release Purchase Order: 150 Legs</td></tr>
<tr><td>Week 6</td><td>Release Purchase Order: 50 Hardware Kits</td></tr>
<tr><td>Week 7</td><td>Start Work Order: Final Assembly (all parts have arrived)</td></tr>
<tr><td>Week 8</td><td>Ship 50 Tables to customer</td></tr>
</tbody></table>
<div class="callout"><div class="callout-icon">✅</div><div>Without MRP, you might order everything in Week 4. Legs would arrive in Week 6 and sit idle for a week — occupying warehouse space and risking damage. MRP ensures "just-in-time" arrival for every component.</div></div>`},

concept_production:{icon:"👕",label:"Production Accounting",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">👕</div>
<h1 class="page-title">Production Accounting — Journal Entries</h1>
<div class="page-desc">How do accounting entries flow through a manufacturing business? This example uses Raju Garments — a school uniform manufacturer — to walk through every stage from raw material purchase to customer sale.</div>

<h2>The Scenario: 100 White Shirts (Credit Purchase)</h2>
<p>Raju needs to manufacture 100 white shirts. He buys fabric from Laxmi Textiles on 30-day credit (udhaari), not immediate payment.</p>

<table class="raci-table"><thead><tr><th>Step</th><th>What Happens</th><th>Debit</th><th>Credit</th><th>Amount</th></tr></thead><tbody>
<tr><td><strong>1</strong></td><td>Buy fabric on credit from Laxmi Textiles</td><td>Raw Material Inventory (Asset ↑)</td><td>Accounts Payable / Sundry Creditors (Liability ↑)</td><td>₹50,000</td></tr>
<tr><td><strong>2</strong></td><td>Issue fabric to factory floor + pay tailors</td><td>WIP Inventory (Asset ↑)</td><td>Raw Material Inventory (Asset ↓) + Wages Payable (Liability ↑)</td><td>₹15,000</td></tr>
<tr><td><strong>3</strong></td><td>QC check on stitched bodies — Passed</td><td colspan="3" style="color:var(--text-tertiary);font-style:italic">No journal entry — just a process checkpoint</td></tr>
<tr><td><strong>4</strong></td><td>Move stitched (unbuttoned) shirts to SFG storage</td><td>SFG Inventory (Asset ↑)</td><td>WIP Inventory (Asset ↓)</td><td>₹15,000</td></tr>
<tr><td><strong>5</strong></td><td>Finishing — add buttons, iron, pack</td><td>WIP Inventory (Asset ↑)</td><td>SFG Inventory (Asset ↓) + Raw Material (Asset ↓)</td><td>₹17,000</td></tr>
<tr><td><strong>6</strong></td><td>Final QC passed — shirts ready for sale</td><td>Finished Goods Inventory (Asset ↑)</td><td>WIP Inventory (Asset ↓)</td><td>₹17,000</td></tr>
<tr><td><strong>7A</strong></td><td>Sale to school on credit for ₹25,000</td><td>Accounts Receivable / Sundry Debtors (Asset ↑)</td><td>Sales Revenue (Income ↑)</td><td>₹25,000</td></tr>
<tr><td><strong>7B</strong></td><td>Record cost of goods sold (COGS)</td><td>COGS (Expense ↑)</td><td>Finished Goods Inventory (Asset ↓)</td><td>₹17,000</td></tr>
<tr><td><strong>8</strong></td><td>Pay Laxmi Textiles 30 days later</td><td>Accounts Payable (Liability ↓)</td><td>Bank (Asset ↓)</td><td>₹50,000</td></tr>
</tbody></table>

<h2>Key Insight — The Inventory Journey</h2>
<div class="callout"><div class="callout-icon">💡</div><div>Raw Material → WIP (Work in Progress) → SFG (Semi-Finished Goods) → WIP (Finishing) → Finished Goods → COGS. The value of the product accumulates at each stage. At sale, the total accumulated cost moves from Finished Goods to COGS, and the sale price goes to Revenue. The difference is your <strong>Gross Profit</strong>.</div></div>`},

concept_invoice:{icon:"🔢",label:"Invoice Numbering & Roles",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">🔢</div>
<h1 class="page-title">Invoice Numbering Series & Roles / Authorisations</h1>

<h2>Invoice Numbering Series</h2>
<div class="callout"><div class="callout-icon">📌</div><div>Invoice numbering in India must follow specific rules for GST compliance and e-invoicing. The numbering series must be unique per financial year, sequential, and cannot have gaps.</div></div>
<h3>Key Rules</h3>
<ol class="steps">
<li><div>Each document type must have its own series — Sales Invoices, Credit Notes, Debit Notes, Purchase Orders, and Journal Vouchers should each have a distinct prefix.</div></li>
<li><div>Series should reset at the start of each financial year (April 1). Recommended format: <code>[Prefix]/[YY-YY]/[Sequential Number]</code> — e.g., <code>SI/25-26/001</code></div></li>
<li><div>For companies under e-invoicing (turnover above ₹5 crore) — the IRN (Invoice Reference Number) generated by the GST portal becomes the primary identifier. Your internal series must still exist but the IRN governs compliance.</div></li>
<li><div>Credit notes must reference the original invoice number and date — gaps in this reference trail cause issues in GSTR-1 reconciliation.</div></li>
<li><div>Configure the numbering series in the ERP before go-live — changing it mid-year is messy and audit-prone.</div></li>
</ol>

<h2>Roles & Authorisations</h2>
<div class="callout"><div class="callout-icon">📌</div><div>Role-based access control (RBAC) in an ERP determines who can create, edit, approve, and view each transaction type. Getting this right prevents fraud, errors, and audit findings.</div></div>
<h3>Core Principles</h3>
<ol class="steps">
<li><div><strong>Maker-Checker separation:</strong> The person who creates a transaction must not be the same person who approves it. E.g., the AP executive who creates a vendor payment cannot be the one who approves it.</div></li>
<li><div><strong>Least privilege:</strong> Every user should have only the minimum access required to do their job — nothing more.</div></li>
<li><div><strong>No shared logins:</strong> Every user must have their own unique login ID. Shared IDs make the audit trail useless.</div></li>
<li><div><strong>Role-based, not name-based:</strong> Configure roles (AP Clerk, Finance Manager, Inventory Controller) and assign users to roles — not individual permissions per user. This makes onboarding and offboarding clean.</div></li>
<li><div><strong>Restrict Master data creation:</strong> Only designated data stewards should be able to create or modify master data (customers, vendors, items, GLs). This is the single most important access control in any ERP.</div></li>
</ol>
<h3>Typical Role Structure</h3>
<table class="raci-table"><thead><tr><th>Role</th><th>Can Create</th><th>Can Approve</th><th>Can View Reports</th></tr></thead><tbody>
<tr><td>AP Clerk</td><td>Vendor invoices, payment requests</td><td>No</td><td>AP Ageing only</td></tr>
<tr><td>Finance Manager</td><td>Journal entries, adjustments</td><td>Vendor payments, JVs</td><td>All Finance reports</td></tr>
<tr><td>CFO / Controller</td><td>No (review only)</td><td>High-value payments, period close</td><td>All reports + MIS</td></tr>
<tr><td>Inventory Executive</td><td>GRN, stock transfers</td><td>No</td><td>Inventory reports</td></tr>
<tr><td>System Admin</td><td>User accounts, role assignments</td><td>No</td><td>Audit logs only</td></tr>
</tbody></table>`},

pre_project:{icon:"🚀",label:"Pre-Project Initiation Checklist",parent:"hub",render:()=>`
<div class="back-btn" onclick="nav('hub')">← Back</div>
<div class="page-icon">🚀</div>
<h1 class="page-title">Pre-Project Initiation Checklist</h1>
<div class="page-desc">Everything that must be confirmed and set up <strong>before</strong> the first client call is made. No project should begin execution without every item on this list being cleared. This checklist is the PM's responsibility.</div>

<div class="callout"><div class="callout-icon">⚠️</div><div>If any item below is unclear or missing — do not start the project. Raise the gap with your Senior Manager immediately. Starting a project without scope clarity or budgeted hours leads to scope creep, unbilled work, and escalations.</div></div>

<h2>Checklist</h2>
<table class="raci-table"><thead><tr><th>#</th><th>Item</th><th>Details</th><th>Owner</th><th>Status</th></tr></thead><tbody>
<tr><td>1</td><td><strong>Budgeted Hours confirmed</strong></td><td>Total hours budgeted for the engagement must be shared with every team member from Day 1. The PM must flag proactively if actual hours are tracking above budget at any point.</td><td>PM + SM</td><td>☐</td></tr>
<tr><td>2</td><td><strong>Scope clarity & sign-off</strong></td><td>Scope of work must be explicitly defined — what is IN scope and what is OUT of scope. Both must be documented and agreed with the client. Verbal scope alignment is not sufficient.</td><td>PM + SM</td><td>☐</td></tr>
<tr><td>3</td><td><strong>Billing Milestones confirmed</strong></td><td>All billing milestones must be linked to specific deliverables or project tasks. Milestone dates, amounts, and the conditions that trigger each invoice must be agreed before work starts.</td><td>PM + SM</td><td>☐</td></tr>
<tr><td>4</td><td><strong>Project Code created in PMO Tool</strong></td><td>A unique project code must be created in the PMO Tool before any timesheets are logged. All team members must log time against this code daily. <a href="https://reimbursement-tool-6e490.web.app/" target="_blank" style="color:var(--accent);font-weight:500">Open PMO Tool →</a></td><td>PM</td><td>☐</td></tr>
<tr><td>5</td><td><strong>Project Plan created & shared</strong></td><td>A detailed project plan covering all phases must be created in Excel, reviewed by SM, and shared with the client before Phase 0 ends. See <span class="ilink" onclick="nav('project_plan_email')">Project Plan Email →</span></td><td>PM</td><td>☐</td></tr>
<tr><td>6</td><td><strong>Team structure defined</strong></td><td>Every team member's role must be clearly defined — who is the PM, who are the Executives, and what is each person responsible for. Assign module ownership where applicable.</td><td>SM + PM</td><td>☐</td></tr>
<tr><td>7</td><td><strong>Advance invoice check</strong></td><td>Verify with the accounts team whether an advance invoice has already been raised for this engagement. If yes — confirm the amount, date, and conditions so the team is aligned on billing expectations.</td><td>PM + Accounts</td><td>☐</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Internal Kick-off Call Agenda</h2>
<p>Before the first client call, an internal kick-off call must be held with the full project team. Cover:</p>
<ol class="steps">
<li><div>Walk through the scope document — what is in and out of scope. Every team member must read it.</div></li>
<li><div>Share the budgeted hours per phase. Every team member must know the budget from Day 1.</div></li>
<li><div>Review billing milestones — link each milestone to specific deliverables so the team understands what drives revenue recognition.</div></li>
<li><div>Confirm the project code in the PMO Tool. Everyone logs time from Day 1 — no exceptions.</div></li>
<li><div>Assign roles and module ownership. Clarify the escalation path: Executive → PM → SM → VH.</div></li>
<li><div>Review the project plan together. Flag any timeline risks immediately.</div></li>
<li><div>Clarify the advance invoice situation if applicable — the team should know what has been billed and what is pending.</div></li>
</ol>

<div class="callout"><div class="callout-icon">💡</div><div><strong>PMO Tool:</strong> All timesheets, project codes, and reimbursements are managed on the <a href="https://reimbursement-tool-6e490.web.app/" target="_blank" style="color:var(--accent);font-weight:500">PMO Tool →</a>. Contact Falguni Bhanushali (HR) to get your login ID created if you do not have access.</div></div>`},

concept_scenarios:{icon:"📋",label:"Scenario Listing",parent:"concepts",render:()=>`
<div class="back-btn" onclick="nav('concepts')">← Important Concepts</div>
<div class="page-icon">📋</div>
<h1 class="page-title">Scenario Listing</h1>
<div class="page-desc">Scenario listing is the process of building an exhaustive, real-world test case library — derived from the client's actual Trial Balance and historical transactions — used for UAT in ERP Implementation and for testing in Automation projects. A good scenario list is the difference between a smooth go-live and a chaotic one.</div>

<h2>The Core Principle</h2>
<div class="callout"><div class="callout-icon">💡</div><div><strong>Never build scenarios from theory — always build them from the client's actual data.</strong> Open the Trial Balance, look at every GL that has movement, and ask: "What transaction created this balance?" Each answer becomes a scenario. If the client posts 5 types of sales invoices in real life, you need 5 sales invoice scenarios — not one generic one.</div></div>

<div class="divider"></div>
<h2>How to Build the Scenario List — Step by Step</h2>
<ol class="steps">
<li><div><strong>Start with the Trial Balance.</strong> Export the full TB from the client's existing system. Every GL account with a non-zero balance represents a real transaction type that must be tested in the new system.</div></li>
<li><div><strong>Pull 2–3 months of actual transactions.</strong> Look at the actual vouchers/entries in the old system. This reveals edge cases and transaction types that the client themselves may forget to mention during process understanding calls.</div></li>
<li><div><strong>Group transactions by module.</strong> Organise scenarios into Sales, Purchase, Banking, Journals, and any module-specific areas (Production, HR, etc.) for systematic coverage.</div></li>
<li><div><strong>For each transaction type, capture the variants.</strong> A "sales invoice" is not one scenario — it is multiple: domestic B2B, domestic B2C, export, SEZ, inter-company, different GST rates, credit sale vs. advance, milestone billing vs. monthly billing. Each variant must be a separate scenario.</div></li>
<li><div><strong>Get the client to review and add.</strong> Share the draft scenario list with the client SPOC for each module. Ask: "Is there any transaction type you post regularly that is not on this list?" Clients always find 2–3 more.</div></li>
<li><div><strong>Mark priority.</strong> P1 = high frequency or high value (must pass before go-live). P2 = medium frequency. P3 = rare but must work eventually.</div></li>
</ol>

<div class="divider"></div>
<h2>Scenario List Structure</h2>
<p>Each scenario must have these fields in the UAT tracker:</p>
<table class="raci-table"><thead><tr><th>Field</th><th>Description</th></tr></thead><tbody>
<tr><td><strong>Scenario ID</strong></td><td>Unique ID — e.g., SALES-001, PUR-003, BANK-002</td></tr>
<tr><td><strong>Module</strong></td><td>Sales / Purchase / Banking / Journals / Production / HR etc.</td></tr>
<tr><td><strong>Scenario Name</strong></td><td>Short descriptive name — e.g., "Domestic B2B Invoice with 18% GST"</td></tr>
<tr><td><strong>Description</strong></td><td>Full description of what is being tested including any variants or edge cases</td></tr>
<tr><td><strong>Test Data</strong></td><td>Actual data to use — real customer name, real amount, real GL codes from the TB</td></tr>
<tr><td><strong>Expected Result</strong></td><td>Exactly what the system should produce — GL entries, report output, GST treatment</td></tr>
<tr><td><strong>Actual Result</strong></td><td>What actually happened during testing (filled during UAT)</td></tr>
<tr><td><strong>Pass / Fail</strong></td><td>Clear pass or fail — no "partially passed"</td></tr>
<tr><td><strong>Tested by</strong></td><td>Name of client user who ran the scenario</td></tr>
<tr><td><strong>Remarks</strong></td><td>Issue details if failed — or notes for the tech partner to fix</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Standard Scenarios — By Module</h2>
<p>Use this as your baseline. Every ERP implementation must cover all of these. Add client-specific scenarios on top.</p>

<h3>💰 Sales</h3>
<table class="raci-table"><thead><tr><th>Scenario</th><th>What to Validate</th></tr></thead><tbody>
<tr><td>Domestic B2B sales invoice</td><td>Revenue GL, customer Sub-GL, CGST + SGST, e-invoice generation</td></tr>
<tr><td>Domestic B2C sales invoice</td><td>Revenue GL, no GSTIN needed, B2C reporting in GSTR-1</td></tr>
<tr><td>Export invoice (zero-rated)</td><td>IGST at 0%, LUT bond reference, correct GSTR-1 table</td></tr>
<tr><td>SEZ supply invoice</td><td>Zero-rated treatment, SEZ customer tagging</td></tr>
<tr><td>Inter-company invoice</td><td>Both entities' books updated, elimination on consolidation</td></tr>
<tr><td>Credit note against invoice</td><td>Revenue reversal, GST credit note, GSTR-1 amendment</td></tr>
<tr><td>Multiple GST rate items on one invoice</td><td>Each line item at correct rate, correct GL split</td></tr>
<tr><td>Advance receipt + invoice settlement</td><td>Advance liability cleared, correct revenue recognition timing</td></tr>
<tr><td>Milestone billing (Fixed Price project)</td><td>Unbilled revenue cleared, invoice raised at milestone</td></tr>
<tr><td>T&M billing</td><td>Hours/units × rate, correct revenue GL, unbilled accrual</td></tr>
</tbody></table>

<h3>🛒 Purchase</h3>
<table class="raci-table"><thead><tr><th>Scenario</th><th>What to Validate</th></tr></thead><tbody>
<tr><td>Domestic vendor invoice with ITC</td><td>Cost GL, vendor Sub-GL, Input CGST + SGST, ITC eligibility flag</td></tr>
<tr><td>Import purchase (with customs duty)</td><td>IGST on import, no ITC on customs duty, correct cost</td></tr>
<tr><td>Ineligible ITC purchase (e.g., food, cab)</td><td>Full cost expensed, no ITC claim</td></tr>
<tr><td>RCM vendor (e.g., GTA, advocate)</td><td>RCM GST liability created, input credit created on payment</td></tr>
<tr><td>Debit note to vendor</td><td>AP reduced, purchase return or price correction reflected</td></tr>
<tr><td>Vendor advance payment</td><td>Special GL indicator, advance asset created, cleared on invoice</td></tr>
<tr><td>Inter-company purchase</td><td>Both entities updated correctly</td></tr>
<tr><td>Dimension selection on purchase</td><td>Correct cost centre, project code, and department tagged</td></tr>
</tbody></table>

<h3>🏦 Banking</h3>
<table class="raci-table"><thead><tr><th>Scenario</th><th>What to Validate</th></tr></thead><tbody>
<tr><td>Vendor payment (full settlement)</td><td>AP cleared, bank reduced, TDS deducted at correct rate</td></tr>
<tr><td>Vendor payment (partial settlement)</td><td>AP partially cleared, correct invoice knocked off</td></tr>
<tr><td>Customer receipt (full)</td><td>AR cleared, bank increased, correct invoice knocked off</td></tr>
<tr><td>Customer receipt (on account)</td><td>Special GL indicator for advance, cleared on invoice later</td></tr>
<tr><td>Bank charges entry</td><td>Bank expense GL, correct bank account debited</td></tr>
<tr><td>Bank reconciliation</td><td>Ledger balance matches bank statement after reconciliation</td></tr>
<tr><td>Forex transaction (if applicable)</td><td>Exchange gain/loss GL, correct foreign currency treatment</td></tr>
</tbody></table>

<h3>📓 Journals</h3>
<table class="raci-table"><thead><tr><th>Scenario</th><th>What to Validate</th></tr></thead><tbody>
<tr><td>Expense provision</td><td>Provision GL created, reversed in the following month</td></tr>
<tr><td>Prepaid expense</td><td>Prepaid asset created, amortised monthly to expense GL</td></tr>
<tr><td>TDS adjustment journal</td><td>TDS payable reduced, correct section and challan reference</td></tr>
<tr><td>Month-end closure entries</td><td>All provisions booked, prepaids amortised, bank reconciled, GST reconciled</td></tr>
<tr><td>Depreciation journal</td><td>Correct asset GL debited, accumulated depreciation credited, correct rate</td></tr>
<tr><td>Inter-company recharge journal</td><td>Both entities updated, elimination entry prepared</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Common Mistakes in Scenario Listing</h2>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Too generic:</strong> "Test sales invoice" is not a scenario. "Domestic B2B invoice for Customer Raju Textiles, ₹1,00,000 + 18% GST, 30-day credit terms, with e-invoice generation" is a scenario.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Missing edge cases:</strong> The scenario list must include the unusual transactions too — credit notes, on-account advances, RCM entries, TDS at lower rate, forex. These are exactly the ones that break during go-live.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Not using real data:</strong> Scenarios must use actual client data — real customer names, real amounts from the TB, real GST rates used in their business. Generic "Customer A, ₹100" scenarios miss the nuances of the client's actual operations.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Skipping the "expected result":</strong> If you don't define what the correct output should be before testing, you can't tell if the test passed or failed. Define expected GL entries, expected report output, and expected GST treatment for every scenario before UAT begins.</div></div>`},

concept_rr:{icon:"👔",label:"Roles & Responsibility Document",parent:"concepts",render:()=>`

<h2>Why Clients Need an R&R Document</h2>
<div class="callout"><div class="callout-icon">💡</div><div>In most organisations we engage with, roles are understood informally — people know roughly what they do but nothing is written down. When things go wrong (a payment is delayed, a report is wrong, a compliance filing is missed), nobody knows whose fault it is. An R&R document fixes this permanently by making ownership explicit, measurable, and undeniable.</div></div>
<p>An R&R document is especially critical in these situations:</p>
<table class="raci-table"><thead><tr><th>Situation</th><th>Why R&R is Critical</th></tr></thead><tbody>
<tr><td>New ERP go-live</td><td>Every system action needs a named owner. Who creates vendors? Who approves payments? Who can unlock a period? Without R&R, the ERP becomes chaotic within weeks.</td></tr>
<tr><td>Rapid team growth</td><td>New joiners don't know what they own. R&R is the fastest onboarding document — it tells a new person exactly what they are responsible for.</td></tr>
<tr><td>Process improvement project</td><td>When redesigning processes, the R&R defines the to-be ownership — who will do each step in the new process, not just what the steps are.</td></tr>
<tr><td>Audit or compliance review</td><td>Auditors ask "who is responsible for X?" An R&R gives them a written, signed answer. Without it, the client scrambles to answer basic governance questions.</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>How to Prepare an R&R Document — Step by Step</h2>
<ol class="steps">
<li><div><strong>Identify all teams / functions in scope.</strong> Start by listing every team or function that will be covered. In the reference document, the three teams are: Resource Management Team (RMT), Project Management Office (PMO), and Master Data Management (MDM). For each client, these teams will be different — Finance, Operations, HR, IT, Sales, etc.</div></li>
<li><div><strong>For each team, define the Core Mandate first.</strong> One or two sentences that answer: "What is this team's primary purpose?" This is the anchor — everything else flows from it. Example from reference: <em>"The PMO provides decision-making and governance oversight for the entire project delivery lifecycle, from the initial sales opportunity to the final billing."</em></div></li>
<li><div><strong>List Key Responsibilities grouped by function area.</strong> Do not just list generic responsibilities — group them by specific functional areas. Each group has a sub-heading, and under each sub-heading are specific, actionable responsibilities. Example from reference: Under PMO, responsibilities are grouped as: Opportunity Approval, Customer PO/BR/Project Approval, Skill Approval, Leave Approval, Change Request Approval, Timesheet Unlock, Project Planning, Resource Requesting, Budget Tracking, Stakeholder Communication, Project Closure, Resume Approval.</div></li>
<li><div><strong>For each responsibility, add a "Why" statement.</strong> The reference document includes "Why the PMO handles this" for every responsibility area. This is critical — it explains the <em>purpose</em> behind the responsibility, not just the task. Without the "why", people follow R&R entries as checkbox compliance rather than understanding what they are protecting. Example: <em>"Why the PMO handles Change Requests: To protect the project's profitability and prevent scope creep. It is the single most important governance function for maintaining project health."</em></div></li>
<li><div><strong>Define how the team uses each system/tool.</strong> For each team, include a section called "How [Team] Uses [System]" — listing their primary workspace, what modules they own, what reports they run, and what workflows they manage. This connects the R&R to the operational reality of the tools the client uses.</div></li>
<li><div><strong>For Master Data teams — define responsibilities per data type.</strong> If the R&R covers a Master Data team, break down responsibilities per master type (COA, Customer, Vendor, Item/Service). Each master type has a different owner, different validation rules, and different compliance implications.</div></li>
<li><div><strong>Get sign-off from each team lead.</strong> The R&R document is only useful if the people in it have read and agreed to it. Each section must be reviewed and signed off by the relevant team head before the document is finalised.</div></li>
</ol>

<div class="divider"></div>
<h2>What Every R&R Document Must Include</h2>
<table class="raci-table"><thead><tr><th>Section</th><th>What to Write</th><th>Example from Reference Doc</th></tr></thead><tbody>
<tr><td><strong>Introduction / Overview</strong></td><td>Explain the relationship between the teams covered and how they interact. Set the context before defining individual roles.</td><td>"The RMT takes a portfolio-wide view optimising talent across all projects. The PMO takes a project-specific view focused on delivery. Both teams collaborate through Kytes."</td></tr>
<tr><td><strong>Core Mandate per Team</strong></td><td>1–2 sentence statement of primary purpose for each team.</td><td>"RMT: To maximise resource utilisation, manage capacity, and ensure the company's skill sets align with market and project demands."</td></tr>
<tr><td><strong>Key Responsibilities (grouped)</strong></td><td>Specific, actionable responsibilities grouped by functional area. Use sub-headings. No vague language.</td><td>PMO: "Customer PO Approval — Verify that the received PO matches the amount, terms, and scope in the signed contract. This is a critical financial control."</td></tr>
<tr><td><strong>Why Each Responsibility Exists</strong></td><td>Explain the purpose behind each responsibility — what risk it manages or what outcome it protects.</td><td>"Why PMO handles CR Approval: To protect profitability and prevent scope creep — the single most important governance function."</td></tr>
<tr><td><strong>System / Tool Usage</strong></td><td>How each team uses the primary system — which modules they own, what they run, what they approve.</td><td>"PMO Primary Workspace: Project Planning Module, Task Boards, and Gantt Charts. They initiate resource allocation by submitting requests to RMT."</td></tr>
<tr><td><strong>Per-Entity Responsibilities (MDM)</strong></td><td>For Master Data teams, define responsibilities for each master type: COA, Customer, Vendor, Item.</td><td>"Vendor Master — MDM is the gatekeeper for payments and compliance. Validates PAN, GSTIN, MSME status and enforces multi-step bank detail verification to prevent fraud."</td></tr>
<tr><td><strong>Data Quality Standards (MDM)</strong></td><td>Define the C-A-S-T standard: Consistent, Accurate, Secure, Timely. Include SLAs for each data request type.</td><td>"New vendor created within 48 hours of receiving all complete documentation."</td></tr>
<tr><td><strong>Sign-off Block</strong></td><td>Space for each team lead to sign and date — confirming they have read and accepted their team's responsibilities.</td><td>Team Name · Lead Name · Signature · Date</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Key Principles When Writing the Document</h2>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Be specific, not generic.</strong> "Manage the resource pool" is not a responsibility. "Create and maintain detailed profiles for every billable employee including role, skill sets, proficiency levels, cost rate, and billable rate — updated in real-time" is a responsibility.</div></div>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Name the system at every step.</strong> The reference document mentions Kytes (their PMO/project tool) in almost every responsibility. The R&R must tie every responsibility to the tool where it is executed — otherwise people know what to do but not where to do it.</div></div>

const tree=[{id:"hub",ch:[{id:"ground_rules"},{id:"laptop_checklist"},{id:"foldering"},{id:"pre_project"},{id:"welcome"},{id:"about"},{id:"sop_library",ch:[{id:"erp_impl",ch:[{id:"erp_impl_phase0"},{id:"erp_impl_phase1"},{id:"erp_impl_phase2"},{id:"erp_impl_phase3"},{id:"erp_impl_phase4"},{id:"erp_impl_phase5"},{id:"erp_impl_phase6"}]},{id:"automation",ch:[{id:"auto_phase0"},{id:"auto_phase1"},{id:"auto_phase2"},{id:"auto_phase3"},{id:"auto_phase4"}]},{id:"master_data",ch:[{id:"mdc_phase0"},{id:"mdc_phase1"},{id:"mdc_phase2"},{id:"mdc_phase3"},{id:"mdc_customer"},{id:"mdc_vendor"},{id:"mdc_item"},{id:"mdc_coa"},{id:"mdc_employee"},{id:"mdc_other"}]},{id:"sop_prep",ch:[{id:"sop_prep_phase0"},{id:"sop_prep_phase1"},{id:"sop_prep_phase2"},{id:"sop_prep_phase3"},{id:"sop_prep_phase4"}]},{id:"sop_erp_diag",ch:[{id:"phase0"},{id:"phase1",ch:[{id:"understanding_prep"}]},{id:"phase2"},{id:"phase3"},{id:"approach"}]}]},{id:"templates",ch:[{id:"kickoff_email"},{id:"project_plan_email"},{id:"cadence_slot_email"},{id:"cadence_ppt_email"},{id:"cadence_format"},{id:"prompts"},{id:"credentials"}]},{id:"lms"},{id:"concepts",ch:[{id:"concept_gl"},{id:"concept_enterprise"},{id:"concept_migration"},{id:"concept_coa"},{id:"concept_special_gl"},{id:"concept_revenue"},{id:"concept_gst"},{id:"concept_crp_uat"},{id:"concept_mrp"},{id:"concept_production"},{id:"concept_invoice"},{id:"concept_scenarios"},{id:"concept_rr"}]}]}];
let open=new Set(["hub","sop_library","templates"]);
let cur="hub";

function findNode(id,nodes){for(const n of nodes){if(n.id===id)return n;if(n.ch){const f=findNode(id,n.ch);if(f)return f;}}return null;}

function renderTree(nodes,d=0){
  return nodes.map(n=>{
    const p=pages[n.id];if(!p)return"";
    const hasC=n.ch&&n.ch.length>0;
    const isO=open.has(n.id);
    const cls="nav-item"+(d===1?" d1":d===2?" d2":d===3?" d3":"")+(n.id===cur?" active":"");
    let h=`<div class="${cls}" data-id="${n.id}" onclick="handleClick('${n.id}',event)">`;
    h+=hasC?`<div class="nav-toggle${isO?" open":""}">▶</div>`:`<div style="width:16px;flex-shrink:0"></div>`;
    h+=`<div class="nav-emoji">${p.icon}</div><div class="nav-label">${p.label}</div></div>`;
    if(hasC)h+=`<div class="nav-children${isO?" open":""}">${renderTree(n.ch,d+1)}</div>`;
    return h;
  }).join("");
}

function handleClick(id,e){
  const n=findNode(id,tree);
  if(n&&n.ch){
    const wasOpen=open.has(id);
    if(wasOpen){open.delete(id);}
    else{open.add(id);}
    nav(id);
    // After nav (which re-opens parents), if user was collapsing, re-collapse this node
    if(wasOpen){open.delete(id);}
    document.getElementById("navTree").innerHTML=renderTree(tree);
    return;
  }
  nav(id);
}

function nav(id){
  if(!pages[id])return;
  cur=id;
  // Only open parent chain, don't force-open the node itself (handleClick controls that)
  let pid=pages[id].parent;
  while(pid){open.add(pid);pid=pages[pid]?pages[pid].parent:null;}
  document.getElementById("navTree").innerHTML=renderTree(tree);
  document.getElementById("content").innerHTML=pages[id].render();
  document.getElementById("content").parentElement.scrollTop=0;
  const crumbs=[];let c=id;
  while(c){crumbs.unshift(c);c=pages[c]?pages[c].parent:null;}
  document.getElementById("breadcrumb").innerHTML=crumbs.map((c,i)=>
    i===crumbs.length-1?`<span class="bc-cur">${pages[c].label}</span>`
    :`<span class="bc-link" onclick="nav('${c}')">${pages[c].label}</span><span class="bc-sep"> / </span>`
  ).join("");
}

// ── Search ──────────────────────────────────────────────────────────────────
function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),50);
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='<div class="search-empty">Start typing to search all pages...</div>';
}
function closeSearchIfBg(e){if(e.target===document.getElementById('searchOverlay'))closeSearch();}

function getPageText(id){
  try{
    const p=pages[id];
    if(!p)return'';
    const tmp=document.createElement('div');
    tmp.innerHTML=p.render();
    return tmp.innerText||tmp.textContent||'';
  }catch(e){return'';}
}

function getPagePath(id){
  const crumbs=[];let c=id;
  while(c&&pages[c]){crumbs.unshift(pages[c].label);c=pages[c].parent;}
  return crumbs.join(' › ');
}

function highlight(text,q){
  if(!q)return text;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}

function doSearch(q){
  const res=document.getElementById('searchResults');
  if(!q||q.length<2){
    res.innerHTML='<div class="search-empty">Start typing to search all pages...</div>';
    return;
  }
  const ql=q.toLowerCase();
  const matches=[];
  Object.keys(pages).forEach(id=>{
    const p=pages[id];
    if(!p)return;
    const labelMatch=p.label.toLowerCase().includes(ql);
    let snippet='';
    let bodyMatch=false;
    const bodyText=getPageText(id);
    const bodyLow=bodyText.toLowerCase();
    const idx=bodyLow.indexOf(ql);
    if(idx>=0){
      bodyMatch=true;
      const start=Math.max(0,idx-40);
      const end=Math.min(bodyText.length,idx+q.length+60);
      snippet='...'+bodyText.slice(start,end).replace(/\s+/g,' ')+'...';
    }
    if(labelMatch||bodyMatch){
      matches.push({id,label:p.label,path:getPagePath(id),snippet,score:labelMatch?0:1});
    }
  });
  matches.sort((a,b)=>a.score-b.score);
  if(matches.length===0){
    res.innerHTML='<div class="search-empty">No results for "'+q+'"</div>';
    return;
  }
  res.innerHTML=matches.slice(0,15).map((m,i)=>{
  const snippetHtml=m.snippet?'<div class="sr-match">'+highlight(m.snippet,q)+'</div>':'';
  return '<div class="search-result-item" onclick="searchNav(\''+m.id+'\')" data-idx="'+i+'">'
    +'<div class="sr-icon">'+(pages[m.id]?pages[m.id].icon:'')+'</div>'
    +'<div class="sr-content">'
    +'<div class="sr-label">'+highlight(m.label,q)+'</div>'
    +'<div class="sr-path">'+m.path+'</div>'
    +snippetHtml
    +'</div></div>';
}).join('');;
}

function searchNav(id){
  closeSearch();
  setTimeout(()=>nav(id), 50);
}

// Keyboard shortcuts
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape'){closeSearch();}
  if(document.getElementById('searchOverlay').classList.contains('open')){
    const items=document.querySelectorAll('.search-result-item');
    let active=[...items].findIndex(el=>el.classList.contains('active'));
    if(e.key==='ArrowDown'){
      e.preventDefault();
      if(active>=0)items[active].classList.remove('active');
      active=Math.min(active+1,items.length-1);
      if(items[active]){items[active].classList.add('active');items[active].scrollIntoView({block:'nearest'});}
    }
    if(e.key==='ArrowUp'){
      e.preventDefault();
      if(active>=0)items[active].classList.remove('active');
      active=Math.max(active-1,0);
      if(items[active]){items[active].classList.add('active');items[active].scrollIntoView({block:'nearest'});}
    }
    if(e.key==='Enter'){
      const activeEl=document.querySelector('.search-result-item.active');
      if(activeEl)activeEl.click();
    }
  }
});

function copyCode(btn){
  const block = btn.parentElement;
  // Get text content excluding the button itself
  const text = Array.from(block.childNodes)
    .filter(n => n !== btn)
    .map(n => n.textContent || n.nodeValue || '')
    .join('').trim();
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(()=>{
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}
