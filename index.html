<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AltQuad Process Vertical Knowledge Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#191919;--bg-secondary:#232323;--bg-tertiary:#2c2c2c;
  --text-primary:#e8e8e5;--text-secondary:#9b9b97;--text-tertiary:#636360;
  --border-light:rgba(255,255,255,0.07);--border-mid:rgba(255,255,255,0.13);
  --accent:#529cca;--accent-bg:#1a2f3f;--radius:8px;
}
:root.light{
  --bg-primary:#ffffff;--bg-secondary:#f7f7f5;--bg-tertiary:#f1f0ec;
  --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#999;
  --border-light:rgba(0,0,0,0.08);--border-mid:rgba(0,0,0,0.15);
  --accent:#2383e2;--accent-bg:#e8f3fd;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg-primary);color:var(--text-primary);display:flex;height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.sidebar{width:240px;min-width:240px;background:var(--bg-secondary);border-right:1px solid var(--border-light);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width 0.22s ease,min-width 0.22s ease}.sidebar.collapsed{width:0;min-width:0;border-right:none}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border-light)}
.workspace-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;cursor:default}
.ws-icon{width:24px;height:24px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:5px;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;flex-shrink:0}
.sidebar-actions{padding:4px 8px;display:flex;flex-direction:column;gap:1px;border-bottom:1px solid var(--border-light);padding-bottom:8px}
.sa-btn{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:13px;color:var(--text-secondary)}
.sa-btn:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.sidebar-section{padding:12px 16px 4px;font-size:11px;font-weight:500;color:var(--text-tertiary);letter-spacing:0.06em;text-transform:uppercase}
.nav-tree{flex:1;overflow-y:auto;padding:0 8px 16px}
.nav-item{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;cursor:pointer;color:var(--text-secondary);font-size:13px;user-select:none;transition:background 0.1s}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.nav-item.active{background:var(--bg-tertiary);color:var(--text-primary);font-weight:500}
.nav-item.d1{padding-left:20px}
.nav-item.d2{padding-left:36px}
.nav-item.d3{padding-left:52px}
.nav-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-tertiary);transition:transform 0.15s;flex-shrink:0}
.nav-toggle.open{transform:rotate(90deg)}
.nav-emoji{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.nav-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-children{display:none}
.nav-children.open{display:block}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{height:44px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--border-light);gap:6px;flex-shrink:0;background:var(--bg-primary)}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary)}
.bc-link{cursor:pointer;color:var(--text-secondary)}
.bc-link:hover{color:var(--text-primary)}
.bc-cur{color:var(--text-primary);font-weight:500}
.bc-sep{opacity:0.4;font-size:12px}
.content-wrap{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:0 0 40px}
.content{padding:40px 80px 80px;max-width:860px;width:100%}
@media(max-width:900px){.content{padding:32px 32px 60px}}
.page-icon{font-size:48px;margin-bottom:8px;line-height:1}
.page-title{font-size:36px;font-weight:700;line-height:1.2;margin-bottom:24px;color:var(--text-primary)}
.page-desc{font-size:15px;color:var(--text-secondary);line-height:1.7;margin-bottom:28px;padding:12px 16px;background:var(--bg-secondary);border-left:3px solid #d0d0d0;border-radius:0 6px 6px 0}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.card:hover{border-color:var(--border-mid);background:var(--bg-secondary)}
.card-icon{font-size:22px;margin-bottom:8px}
.card-title{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--text-primary)}
.card-sub{font-size:12px;color:var(--text-secondary);line-height:1.5}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;margin-top:8px}
.badge-green{background:#1a3a25;color:#6fcf97}
.badge-orange{background:#3a2e10;color:#f2c94c}
.badge-blue{background:#0e2a38;color:#56ccf2}
.light .badge-green{background:#d4edda;color:#155724}
.light .badge-orange{background:#fff3cd;color:#856404}
.light .badge-blue{background:#d1ecf1;color:#0c5460}
h2{font-size:20px;font-weight:600;margin:32px 0 12px;color:var(--text-primary)}
h3{font-size:16px;font-weight:600;margin:20px 0 8px;color:var(--text-primary)}
p{font-size:14px;line-height:1.7;color:var(--text-secondary);margin-bottom:12px}
.divider{height:1px;background:var(--border-light);margin:28px 0}
.callout{display:flex;gap:12px;padding:12px 16px;background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:12px;font-size:13px;line-height:1.6;color:var(--text-secondary)}
.callout-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.callout strong{color:var(--text-primary)}
.raci-table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:13px}
.raci-table th{background:var(--bg-secondary);padding:8px 12px;text-align:left;font-weight:600;border:1px solid var(--border-light);font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em}
.raci-table td{padding:8px 12px;border:1px solid var(--border-light);color:var(--text-primary)}
.raci-table tbody tr:hover{background:var(--bg-secondary)}
ol.steps{list-style:none;counter-reset:step;margin:8px 0 16px}
ol.steps li{counter-increment:step;display:flex;gap:12px;margin-bottom:12px;font-size:14px;line-height:1.6;color:var(--text-secondary)}
ol.steps li::before{content:counter(step);min-width:22px;height:22px;background:var(--bg-secondary);border:1px solid var(--border-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--text-secondary)}
.sub-steps{list-style:none;margin:8px 0 4px 34px}
.sub-steps li{display:flex;gap:8px;margin-bottom:6px;font-size:13px;color:var(--text-secondary);line-height:1.5}
.sub-steps li::before{content:"•";color:var(--text-tertiary);flex-shrink:0}
.ilink{color:var(--accent);cursor:pointer;border-bottom:1px solid transparent;transition:border-color 0.1s}
.ilink:hover{border-bottom-color:var(--accent)}
code{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;background:var(--bg-secondary);padding:2px 6px;border-radius:4px;color:var(--text-primary);border:1px solid var(--border-light)}
.code-block{background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:var(--radius);padding:14px 16px;font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word;color:var(--text-primary);margin:12px 0 20px}
.section-tag{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:3px 10px;border-radius:4px;margin-bottom:20px;background:var(--accent-bg);color:#56ccf2;border:1px solid rgba(82,156,202,0.25)}
.light .section-tag{color:#0c5460;border-color:#bee5eb}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-bottom:24px;padding:4px 0}
.back-btn:hover{color:var(--text-primary)}

.theme-toggle{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--bg-tertiary);border:1px solid var(--border-mid);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;z-index:100;transition:background 0.2s}
.theme-toggle:hover{background:var(--bg-secondary)}
.logo-area{padding:12px 16px 8px;border-bottom:1px solid var(--border-light);display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.logo-img{height:32px;width:auto;object-fit:contain}
.logo-tagline{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);font-weight:500;padding-left:2px}

.sidebar-toggle{position:fixed;top:10px;left:10px;width:32px;height:32px;border-radius:6px;background:var(--bg-tertiary);border:1px solid var(--border-mid);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;transition:background 0.15s,left 0.22s ease;flex-direction:column;gap:4px}
.sidebar-toggle:hover{background:var(--bg-secondary)}
.sidebar-toggle span{display:block;width:14px;height:1.5px;background:var(--text-secondary);border-radius:2px;transition:background 0.15s}
.topbar{padding-left:52px;transition:padding-left 0.22s ease}
.topbar.sidebar-open{padding-left:24px}

.search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:flex-start;justify-content:center;padding-top:80px}
.search-overlay.open{display:flex}
.search-box{background:var(--bg-primary);border-radius:10px;width:560px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.3);overflow:hidden}
.search-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border-light)}
.search-input-wrap span{font-size:18px;opacity:0.5}
#searchInput{flex:1;border:none;outline:none;font-size:15px;background:transparent;color:var(--text-primary);font-family:inherit}
.search-results{max-height:400px;overflow-y:auto}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:0.5px solid var(--border-light);font-size:13px}
.search-result-item:hover{background:var(--bg-secondary)}
.search-result-item:last-child{border-bottom:none}
.sr-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sr-content{flex:1;min-width:0}
.sr-label{font-weight:500;color:var(--text-primary);margin-bottom:2px}
.sr-path{font-size:11px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-match{font-size:12px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
mark{background:rgba(255,200,0,0.35);color:inherit;border-radius:2px;padding:0 1px}
.search-empty{padding:32px 16px;text-align:center;color:var(--text-tertiary);font-size:13px}
.search-shortcut{padding:8px 16px;font-size:11px;color:var(--text-tertiary);border-top:1px solid var(--border-light);display:flex;gap:16px}
.search-shortcut kbd{background:var(--bg-secondary);border:1px solid var(--border-mid);border-radius:3px;padding:1px 5px;font-family:inherit;font-size:10px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}
*{scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}

.hub-cover{padding:32px 0 0;margin-bottom:8px;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.hub-cover-logo{width:52px;height:52px;border-radius:50%;object-fit:cover;margin-bottom:8px}
.path-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.path-card{background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:10px;padding:18px 18px 16px;cursor:pointer;transition:border-color 0.15s,background 0.15s;display:flex;flex-direction:column;gap:8px}
.path-card:hover{border-color:var(--border-mid);background:var(--bg-tertiary)}
.path-card-btn{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:5px;border:0.5px solid var(--border-mid);color:var(--text-secondary);background:var(--bg-primary);margin-bottom:4px;width:fit-content}
.path-card-icon{font-size:22px}
.path-card-title{font-size:15px;font-weight:600;color:var(--text-primary)}
.path-card-sub{font-size:12px;color:var(--text-secondary);line-height:1.6;font-style:italic}
.path-card-audience{font-size:12px;color:var(--text-secondary);margin-top:4px}
.path-card-audience strong{color:var(--text-primary)}
.path-badge-live{font-size:11px;font-weight:600;letter-spacing:0.03em;color:#27ae60}
.path-badge-soon{font-size:11px;font-weight:600;letter-spacing:0.03em;color:var(--text-tertiary)}

.code-block{position:relative}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--bg-tertiary);border:1px solid var(--border-mid);color:var(--text-secondary);border-radius:5px;padding:3px 10px;font-size:11px;cursor:pointer;opacity:0;transition:opacity 0.15s,background 0.15s;font-family:inherit;line-height:1.5}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.code-block:hover .copy-btn{opacity:1}
.copy-btn.copied{background:#27ae60;color:#fff;border-color:#27ae60;opacity:1}
</style>
</head>

<div class="search-overlay" id="searchOverlay" onclick="closeSearchIfBg(event)">
  <div class="search-box">
    <div class="search-input-wrap">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search pages and content..." oninput="doSearch(this.value)" autocomplete="off" />
    </div>
    <div class="search-results" id="searchResults">
      <div class="search-empty">Start typing to search all pages...</div>
    </div>
    <div class="search-shortcut"><span><kbd>↑</kbd><kbd>↓</kbd> navigate</span><span><kbd>Enter</kbd> open</span><span><kbd>Esc</kbd> close</span></div>
  </div>
</div>

<div id="searchOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;align-items:flex-start;justify-content:center;padding-top:80px" onclick="if(event.target===this)closeSearch()">
  <div style="background:var(--bg-primary);border:1px solid var(--border-mid);border-radius:10px;width:560px;max-width:90vw;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3)">
    <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border-light)">
      <span style="color:var(--text-tertiary);font-size:16px">🔍</span>
      <input id="searchInput" type="text" placeholder="Search pages, tasks, templates..." autocomplete="off"
        style="flex:1;border:none;outline:none;font-size:15px;background:transparent;color:var(--text-primary)"
        oninput="doSearch(this.value)" onkeydown="searchKeydown(event)"/>
      <span onclick="closeSearch()" style="cursor:pointer;color:var(--text-tertiary);font-size:18px;line-height:1">×</span>
    </div>
    <div id="searchResults" style="max-height:400px;overflow-y:auto;padding:8px 0"></div>

</div>

<h1 class="page-title">About AltQuad Global LLP</h1>
<h2>Who We Are</h2>
<p>AltQuad Global LLP is a premium offshore services provider built by Chartered Accountants, exclusively for accounting firms. Founded in 2022 and based in Mumbai, AltQuad transforms accounting practices through three pillars: <strong>Trust, Technology, and Talent.</strong></p>
<p>Unlike budget offshoring providers, AltQuad delivers premium solutions that protect client reputation while driving growth. Serving firms across the USA, Canada, UK, Australia, and beyond.</p>
<h2>Meet Our Founders</h2>
<div class="card-grid">
  <div class="card"><div class="card-icon">👤</div><div class="card-title">CA Rushabh Deliwala</div><div class="card-sub">Co-founder, Head — Process Vertical<br><br>Chartered Accountant · 10+ years industry experience</div></div>
  <div class="card"><div class="card-icon">👤</div><div class="card-title">CA Hansal Bavishi</div><div class="card-sub">Co-founder, Head — KPO Vertical<br><br>CA · CFA L2 Cleared · 10+ years industry experience</div></div>
</div>
<h2>Two Verticals, One Mission</h2>
<div class="card-grid">
  <div class="card"><div class="card-icon">📊</div><div class="card-title">Offshore Accounting Services</div><div class="card-sub">Bookkeeping, AP/AR, payroll, tax, and analytics — allowing firms to scale seamlessly.</div></div>
  <div class="card" onclick="nav('sop_library')"><div class="card-icon">⚙️</div><div class="card-title">Process Excellence</div><div class="card-sub">ERP Implementation, ERP Diagnostics, Automation Projects, SOP Preparation.</div></div>
</div>`},

phase0:{icon:"0️⃣",label:"Phase 0: Kick-off",parent:"sop_erp_diag",render:()=>`
<div class="back-btn" onclick="nav('sop_erp_diag')">← ERP Diagnostics SOP</div>
<div class="section-tag">Phase 0 · ERP Diagnostic</div>
<div class="page-icon">0️⃣</div>
<h1 class="page-title">Phase 0: Project Kick-off</h1>
<p>Everything done when a new project starts — from the first email to the project plan and cadence deck setup.</p>

<h2>Task 0.1 — Start Kick-off Tasks</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Send a welcome email to the client to set the context and agenda, aligning all stakeholders at the outset.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> As soon as the project starts.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> The kick-off email, approved by the Project Manager, is shared with the client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Open Outlook and compose a new email with the following format:<ul class="sub-steps"><li>To: All stakeholders from the client team</li><li>CC: CPL Team including Product Team (chitraparameswaran@contetra.com)</li><li>Subject: Use the <span class="ilink" onclick="nav('kickoff_email')">Kick-off Email Subject Line →</span></li><li>Body: Use the <span class="ilink" onclick="nav('kickoff_email')">Kick-off Email Body template →</span></li></ul></div></li>
<li><div>Review all details for accuracy before sending.</div></li>
<li><div>The email must be sent from the <strong>Project Manager's email ID</strong>.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.2 — Prepare Questionnaire</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Be prepared with the concepts, client's business context, and questions before starting process understanding calls.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> At the start of the project, or before any call with the client.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> An exhaustive list of questions in Excel is prepared and approved by the Project Manager.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Before creating a questionnaire from scratch, first check if an existing questionnaire for that industry is available. If yes, use it as the base.</div></li>
<li><div>If no existing questionnaire is available, generate one using the <span class="ilink" onclick="nav('prompts')">Questionnaire Prompt (Prompt 1) →</span></div></li>
<li><div>Download the standard Questionnaire Excel template and strictly follow that format.</div></li>
<li><div>After generating with AI, manually review: remove redundant questions and add any additional ones if needed.</div></li>
<li><div>Get reviewed by the Project Manager and approved by the Senior Manager before use.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.3 — Prepare Project Plan</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Create a complete project plan defining scope, timelines, milestones, responsibilities, and assumptions.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Start of every project. Update before each cadence meeting if changes occur. Share baseline with client during or right after kickoff.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Project plan is prepared, approved by Senior Manager, and shared with the client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head / CEO</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Use the standard Excel project plan template. Refer to previous project plans for guidance.</div></li>
<li><div>Submit to Senior Manager for approval. Incorporate any changes suggested.</div></li>
<li><div>Share with the client using the <span class="ilink" onclick="nav('project_plan_email')">Project Plan Email template →</span></div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.4 — Prepare Cadence Deck</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Prepare the weekly cadence deck (PPT) for client progress updates.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Weekly (or bi-weekly) throughout the project duration.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Cadence slot is blocked, PPT is prepared and reviewed, and meeting is conducted.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Confirm a cadence slot with the client using the <span class="ilink" onclick="nav('cadence_slot_email')">Cadence Slot Confirmation Email →</span></div></li>
<li><div>Once confirmed, schedule a recurring MS Teams meeting named: <code>Weekly Check-in | &lt;client&gt; x Contetra</code></div></li>
<li><div>Prepare the cadence deck using the agreed PPT template. Do not deviate from the standard format.</div></li>
<li><div>Get the PPT reviewed by the Project Manager.</div></li>
<li><div>Send the PPT to the client the day before the meeting using the <span class="ilink" onclick="nav('cadence_ppt_email')">Cadence PPT Pre-Read Email →</span></div></li>
<li><div>After the meeting, send the MoM per <span class="ilink" onclick="nav('phase1')">Task 1.4 — Write Meeting Minutes →</span> and attach the deck as a PDF.</div></li>
</ol>`},

phase1:{icon:"1️⃣",label:"Phase 1: Process Understanding",parent:"sop_erp_diag",render:()=>`
<div class="back-btn" onclick="nav('sop_erp_diag')">← ERP Diagnostics SOP</div>
<div class="section-tag">Phase 1 · ERP Diagnostic</div>
<div class="page-icon">1️⃣</div>
<h1 class="page-title">Phase 1: Process Understanding</h1>
<p>Scheduling and conducting process understanding calls with the client, plus all post-meeting documentation tasks.</p>

<h2>Task 1.1 — Schedule Meeting for Process Understanding</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Schedule a meeting to begin process understanding calls with the client.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Before any call with the client.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> The meeting invite has been scheduled and sent to the client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>—</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Once the meeting slot is received from the client, open Microsoft Teams.</div></li>
<li><div>Create the meeting with these details:<ul class="sub-steps"><li>Title: <code>&lt;process&gt; Understanding | &lt;client&gt; x Contetra</code></li><li>Attendees: All concerned people from client + our team. Add Senior Manager as optional.</li><li>Enable auto-record. If unavailable, start recording manually at the start.</li><li>Double-check all details and save.</li></ul></div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.2 — Conduct Process Understanding Call</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Understand the existing business process per the questionnaire prepared in <span class="ilink" onclick="nav('phase0')">Task 0.2 →</span></div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> When a process understanding call is conducted.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> The call is completed and all questionnaire items are addressed.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + Project Manager</td><td>—</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Start with this opening script:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Hi everyone. So, I will just set the context of the call. This call is mainly to understand the process of &lt;process name&gt;. You can basically walk us through the process that you follow and in case we have any questions we would ask you."</div></div></li>
<li><div>Use the <span class="ilink" onclick="nav('phase0')">questionnaire from Task 0.2 →</span> throughout. Ensure all questions are answered by the end of the call.</div></li>
<li><div>Once all questions are covered, ask this closing question:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Would you like to highlight any problems you are facing currently — like doing something manual, something repetitive that can be automated?"</div></div></li>
<li><div>Feel free to ask even the most basic questions about their business. Take detailed notes throughout.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.3 — Start Post-Meeting Rituals</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Ensure meeting records are properly stored and accessible for future analysis.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> As soon as any meeting is concluded.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Recording is saved in OneDrive and uploaded to NotebookLM.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Save the meeting recording to OneDrive.</div></li>
<li><div>Download the recording from MS Teams:<ul class="sub-steps"><li>Go to the Teams chat containing the recording.</li><li>Click the arrow icon in the top-right corner of the recording.</li><li>Click Download. If unavailable, ask the meeting scheduler for Edit Access.</li></ul></div></li>
<li><div>Go to <a href="https://www.freeconvert.com/" target="_blank">freeconvert.com</a> and convert the file from MP4 to MP3. Download the converted file.</div></li>
<li><div>Upload the MP3 to <a href="https://notebooklm.google.com/" target="_blank">NotebookLM</a>:<ul class="sub-steps"><li>Upload to the existing client notebook. If none exists, create one.</li><li>All recordings for a single client must be stored in the same notebook.</li></ul></div></li>
<li><div>Proceed to <span class="ilink" onclick="nav('phase1')">Task 1.4 — Write Meeting Minutes →</span> immediately after.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.4 — Write Meeting Minutes (MoM)</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Document everything discussed in writing via email, to avoid future disputes.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Within 24 hours of any meeting.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Meeting minutes are sent to all parties via email.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Confirm recording is in OneDrive (see <span class="ilink" onclick="nav('phase1')">Task 1.3 →</span> if not done).</div></li>
<li><div>In NotebookLM, open the client notebook, select the relevant recording, and use the <span class="ilink" onclick="nav('prompts')">Detailed Meeting Notes Prompt (Prompt 2) →</span><br><em>Note: Ensure only the relevant recording is selected. Maintain one notebook per client.</em></div></li>
<li><div>Paste the generated notes into the MoM Generator tool (HTML file — open in browser). It will auto-generate meeting minutes.</div></li>
<li><div>Manually review the minutes once for accuracy.</div></li>
<li><div>Send the MoM via email:<ul class="sub-steps"><li>To: All members from the client team</li><li>CC: our team (including ramanujam.narayan@contetra.com)</li><li>Subject: <code>Meeting Minutes - &lt;topic&gt; - &lt;client&gt; x Contetra</code></li><li>Body: Paste content from the MoM Tool</li></ul></div></li>
</ol>`},

phase2:{icon:"2️⃣",label:"Phase 2: Analysis",parent:"sop_erp_diag",render:()=>`
<div class="back-btn" onclick="nav('sop_erp_diag')">← ERP Diagnostics SOP</div>
<div class="section-tag">Phase 2 · ERP Diagnostic</div>
<div class="page-icon">2️⃣</div>
<h1 class="page-title">Phase 2: Analysis & Flowcharting</h1>
<p>Mapping the as-is process, identifying issues and solutioning, and preparing the to-be flowchart.</p>

<h2>Task 2.1 — As-Is Flowchart Preparation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Map the flowchart of the existing process as understood from the process understanding calls.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Once all process understanding calls for a particular process are completed.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> The as-is flowchart is completed and approved by the Project Manager.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Log in to Miro using the <span class="ilink" onclick="nav('credentials')">shared credentials →</span></div></li>
<li><div>In NotebookLM, open the client notebook, select the relevant recordings, and use the <span class="ilink" onclick="nav('prompts')">Process Detail Prompt (Prompt 3) →</span></div></li>
<li><div>Paste the NotebookLM output into ChatGPT and use the <span class="ilink" onclick="nav('prompts')">Flowchart Content Prompt (Prompt 4) →</span></div></li>
<li><div>Prepare the flowchart in Miro:<ul class="sub-steps"><li>Create a new board.</li><li>Import template: AltQuad Ops Template → click Use.</li><li>Use template boxes, colours, and fonts. Replace all placeholders with actual data.</li><li>Duplicate blocks with Ctrl+D to maintain consistency.</li></ul></div></li>
<li><div>Map the entire process. Watch recordings multiple times if needed.</div></li>
<li><div>Submit the completed flowchart to the Project Manager for review.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 2.2 — Issue Analysis and Solutioning</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Collate and analyse all issues from the process understanding calls and develop solutions.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> After all process understanding calls are completed.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> An Excel sheet in the agreed format is completed and approved by the Project Manager.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive, Project Manager</td><td>Solution Architect</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>In NotebookLM with all client recordings selected, use the <span class="ilink" onclick="nav('prompts')">Issue Extraction Prompt (Prompt 5) →</span> to get the full issue list.</div></li>
<li><div>Note: Some issues may not be explicitly captured in recordings — add these manually to the list.</div></li>
<li><div>Paste the issue list into ChatGPT along with the <span class="ilink" onclick="nav('prompts')">Issue Analysis Tabular Prompt (Prompt 6) →</span> to generate the structured table.</div></li>
<li><div>Paste the output into the Issue Analysis Excel template.</div></li>
<li><div>Review and edit the Excel with the Project Manager. Add additional points before submitting to the Solution Architect.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 2.3 — To-Be Flowchart Preparation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Visualize the benchmark (ideal) process once all gaps are identified and solutioned.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> After the as-is flowchart and issue analysis are both ready.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> The to-be flowchart is completed and reviewed by the client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Log in to Miro using the <span class="ilink" onclick="nav('credentials')">shared credentials →</span></div></li>
<li><div>Use the resolved issue list and <span class="ilink" onclick="nav('prompts')">Flowchart Content Prompt (Prompt 4) →</span> in ChatGPT to generate to-be flowchart content.</div></li>
<li><div>Build the to-be flowchart in Miro following the same template and style as the <span class="ilink" onclick="nav('phase2')">as-is flowchart in Task 2.1 →</span></div></li>
<li><div>Submit for Project Manager review, then share with the client.</div></li>
</ol>`},

phase3:{icon:"3️⃣",label:"Phase 3: Report",parent:"sop_erp_diag",render:()=>`
<div class="back-btn" onclick="nav('sop_erp_diag')">← ERP Diagnostics SOP</div>
<div class="section-tag">Phase 3 · ERP Diagnostic</div>
<div class="page-icon">3️⃣</div>
<h1 class="page-title">Phase 3: Report Preparation</h1>

<h2>Task 3.1 — Report Preparation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Prepare a comprehensive report documenting all issues and proposed solutions.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Once issue analysis (<span class="ilink" onclick="nav('phase2')">Task 2.2 →</span>) is completed and reviewed by the Solution Architect.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> The report is approved by the Senior Manager / Vertical Head.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive, Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Compile the finalized issue list and solutions from <span class="ilink" onclick="nav('phase2')">Task 2.2 →</span> into the report format.</div></li>
<li><div>Structure the report across these sections:<ul class="sub-steps">
<li>Executive summary — key findings and headline recommendations</li>
<li>As-is process documentation — flowcharts and process descriptions validated by client</li>
<li>Gap analysis — all issues classified as Process, System, or People gaps</li>
<li>Quantified impact — volume, value, or delay days attached to each gap</li>
<li>Industry benchmark comparison — how client metrics compare to sector standards</li>
<li>To-be process recommendations — proposed improved process flows</li>
<li>Solution strategy — specific, actionable recommendations per gap with effort and cost indication</li>
<li>Proposed digital landscape and enterprise structure (where applicable)</li>
</ul></div></li>
<li><div>Ensure all facts and observations are <strong>validated with the client SPOC</strong> before finalising.</div></li>
<li><div>Submit draft to the Senior Manager and incorporate all feedback.</div></li>
<li><div>Get final approval from the Vertical Head before sharing with the client.</div></li>
</ol>`},

kickoff_email:{icon:"✉️",label:"Kick-off Email Templates",parent:"templates",render:()=>`
<div class="back-btn" onclick="nav('templates')">← Templates</div>
<div class="page-icon">✉️</div>
<h1 class="page-title">Kick-off Email Templates</h1>
<p>Used in <span class="ilink" onclick="nav('phase0')">Task 0.1 — Start Kick-off Tasks →</span></p>
<h2>Subject Line</h2>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Project Kick-off  |  &lt;client&gt; &lt;&gt; Contetra  |  Process Diagnostic</div>
<h2>Email Body</h2>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Dear Team,

I hope this email finds you well.

This message is to formally kick off our Process Diagnostic project. The primary goal of this initiative is to thoroughly analyze our current workflows, identify opportunities for improvement, and collaboratively develop solutions to enhance efficiency and effectiveness.

To ensure we align on the project's objectives, scope, and timeline, I would like to schedule a brief 30-minute kick-off call. The key items on our agenda will be:

- Project Goals & Scope: A quick review of what we aim to achieve.
- Methodology: How we will conduct the diagnostic.
- Key Stakeholders & Roles: Clarifying everyone's involvement.
- Basic Understanding about the business.

cadence_ppt_email:{icon:"📊",label:"Cadence PPT Email",parent:"templates",render:()=>`

<h1 class="page-title">Cadence PPT Pre-Read Email</h1>

<div class="callout"><div class="callout-icon">📌</div><div>Send this email <strong>24 hours before</strong> every weekly cadence call. It must include a summary of project status, escalations, red flags, and delays — so all stakeholders come to the call prepared, not surprised.</div></div>
<h2>Email Template</h2>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>SUBJECT: Pre-read | Cadence Deck - &lt;date&gt; | &lt;client&gt; x AltQuad

Hello Team,

Our weekly check-in is scheduled for tomorrow, [Day], [Date] at [Time, e.g., 4:00 PM IST] on &lt;Microsoft Teams / in-person&gt;.

Please find the cadence deck attached. Here is a quick summary before the call:

--- PROJECT STATUS ---
[One line overall status: On Track / At Risk / Delayed]

--- PROGRESS THIS WEEK ---
- [Task completed / milestone achieved]
- [Task completed / milestone achieved]

--- IN PROGRESS ---
- [Task currently being worked on — owner — expected completion]
- [Task currently being worked on — owner — expected completion]

--- RED FLAGS / ESCALATIONS ---
[If none: No escalations this week.]
[If any: Clearly state the issue, its impact, and what decision or action is needed from the client]

--- DELAYS ---
[If none: No delays to report.]
[If any: State the delayed item, original deadline, revised deadline, and reason for delay]

--- PENDING FROM CLIENT ---
[List any data, approvals, or access pending from the client — include ask date and how many days overdue]

--- PLAN FOR NEXT WEEK ---
- [Upcoming task — owner]
- [Upcoming task — owner]

Please review the deck before the call so we can use the time efficiently.

Best regards,</div>
<h2>Filling Guidelines</h2>
<table class="raci-table"><thead><tr><th>Section</th><th>How to Fill</th><th>If Nothing to Report</th></tr></thead><tbody>
<tr><td><strong>Project Status</strong></td><td>On Track = all milestones within timeline. At Risk = a milestone may slip but not confirmed. Delayed = a milestone has already slipped.</td><td>—</td></tr>
<tr><td><strong>Red Flags / Escalations</strong></td><td>Anything that could derail the project — missing data, key SPOC unavailable, scope creep, budget overrun risk. State the issue, its impact, and the decision needed from the client.</td><td>Write: "No escalations this week."</td></tr>

prompts:{icon:"🤖",label:"AI Prompts",parent:"templates",render:()=>`
<div class="back-btn" onclick="nav('templates')">← Templates</div>
<div class="page-icon">🤖</div>
<h1 class="page-title">AI Prompts</h1>
<p>Use these prompts in Gemini or ChatGPT for consistent, high-quality outputs across all projects. Save the outputs as Word files in the Working folder with the names specified.</p>

<h2>Prompt A — Internal Kick-off Checklist</h2>
<p>Before beginning any project, ensure you have clarity on all of the following:</p>
<table class="raci-table"><thead><tr><th>#</th><th>Item</th></tr></thead><tbody>
<tr><td>1</td><td>Understanding of the scope (Internal Kick-off call done)</td></tr>
<tr><td>2</td><td>Basic understanding of the client's business</td></tr>
<tr><td>3</td><td>Expectations of the project timelines</td></tr>
<tr><td>4</td><td>Required team and budgeted hours</td></tr>
<tr><td>5</td><td>Billing milestones confirmed</td></tr>
<tr><td>6</td><td>Technical partner identified (if applicable)</td></tr>
<tr><td>7</td><td>Client SPOCs mapped per module</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Prompt B — Business Understanding</h2>
<p>Use this before the kick-off call to research the client's business. Save the output as <strong>"Business Understanding.docx"</strong> in the Working folder.</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>You are an expert business analyst. Analyze and explain the business model and operations of the following company:

Company Name: [Insert company name]

Cover these key aspects:

1. Overview: Basic details (founding year, HQ, ownership), industry, and main markets.
2. Operations: Core business areas, products/services, and target customer segments.
3. Revenue Model: Primary income sources and how the company monetizes its offerings.
4. Business Model: How the company creates and delivers value; value chain or operating model.
5. Industry Context: Main competitors, differentiators, and market positioning.
6. Scale: Size of operations (revenue, employee base, regions covered, major subsidiaries).
7. Key Study Areas: Critical aspects to analyze further (e.g., financials, market share, technology, supply chain, or risks).
8. Recent Developments: Notable updates like acquisitions, leadership changes, or strategic initiatives.

Present your analysis in a clear, structured, and insight-focused format.</div>

<div class="divider"></div>
<h2>Prompt C — Process Understanding (Deep Research)</h2>
<p>Use this to research ideal processes for the client's industry before process understanding calls. Save the output as <strong>"Process Understanding.docx"</strong> in the Working folder. This becomes the base for preparing to-be flowcharts.</p>
<div class="callout"><div class="callout-icon">⚠️</div><div>Based on the practicality of the client's situation, solutions are to be provided realistically — not just the textbook ideal. Use this as a baseline to identify gaps, not as a prescription.</div></div>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Explain in detail the ideal end-to-end business processes followed in the [industry name] industry — covering key functions such as operations, sales, finance, HR, procurement, and customer service. Describe how these processes interlink to deliver business outcomes efficiently. Then, outline the ideal organizational and team structure for a company in this industry, including key departments, leadership roles, reporting hierarchy, and approximate team size for small, medium, and large-scale businesses. Highlight best practices, efficiency enablers, and modern tools or technologies commonly used in this industry.</div>

<div class="divider"></div>
<h2>Prompt D — Questionnaire Generator</h2>
<p>Use this to generate a process-specific questionnaire before any process understanding call.</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Role: You are an expert business analyst and questionnaire designer specializing in enterprise operations, business models, and organizational structure analysis.

Objective: Design a comprehensive, structured questionnaire to understand the current [process name] process at [company name / industry].

The questionnaire should cover:
1. Process Overview: How the process currently works end-to-end
2. Inputs & Triggers: What starts the process, what data or documents are needed
3. Steps & Systems: Each step, who performs it, and which system or tool is used
4. Pain Points: What is slow, manual, error-prone, or frustrating in the current process
5. Exceptions: What happens when the normal flow breaks — escalation paths
6. Output & Recipients: What the final output is and who receives it
7. SLAs & Timelines: How long each step takes, any deadlines or SLAs
8. Improvement Wishes: What the team wishes the process could do better

Keep questions open-ended to encourage detailed responses. Group questions logically by topic.</div>

<div class="divider"></div>
<h2>Prompt E — Industry Benchmarks & Key Metrics</h2>
<p>Use this to research how the client's industry metrics compare to benchmarks — for use in diagnostic reports and gap analysis.</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>You are an expert business analyst. Analyze and explain the key performance metrics and industry benchmarks for the [industry name] industry.

Cover:
1. Most important operational KPIs tracked in this industry
2. Industry benchmark ranges for each KPI (e.g., DSO, inventory turnover, gross margin %)
3. Common inefficiencies and gaps seen in this industry
4. How top-performing companies in this industry differentiate themselves operationally

Present in a structured format with benchmark ranges clearly stated.</div>`},

approach:{icon:"🧭",label:"Diagnostic Approach",parent:"sop_erp_diag",render:()=>`
<div class="back-btn" onclick="nav('sop_erp_diag')">← ERP Diagnostics SOP</div>
<div class="page-icon">🧭</div>
<h1 class="page-title">Diagnostic Approach</h1>
<div class="page-desc">The end-to-end thinking framework used across every ERP Diagnostic engagement. Read this before starting any project.</div>

<ol class="steps">
<li><div>Understand in depth <strong>how the client's business works</strong>.</div></li>
<li><div>Identify their <strong>top 5–10 problem areas</strong> where the majority of pain lies.</div></li>
<li><div>Ask <strong>"Why?" at least 4 times</strong> to uncover the root cause of each issue.<br><br>
<em>Example: "I don't get accurate invoice-wise customer ageing from the system."</em><br>
Why? → Finance team not knocking off invoices against receipts.<br>
Why? → They don't know which invoices the money was received against.<br>
Why? → Payment advices not being forwarded from Sales to Finance.<br>
Why? → Sales doesn't receive advices from the customer — possibly due to a missing vendor registration step.</div></li>
<li><div><strong>Quantify the root causes</strong> in terms of volume, value, or delay days. The analysis must clearly show the cost or revenue loss associated with the gap.<br><br>
<em>Example metrics to track:</em>
<ul class="sub-steps"><li>Count of monthly invoices shared</li><li>Count of receipts booked in a month</li><li>Invoices knocked off vs. kept open</li><li>Days between receipt booking and invoice knock-off</li></ul></div></li>
<li><div><strong>Compare with industry benchmarks</strong> (use Gemini for research).<br><em>Example: Credit note count as % of invoices is 10% — industry benchmark is 2–3%.</em></div></li>
<li><div><strong>Document as-is processes</strong> in detail and get them validated by the respective client SPOCs.</div></li>
<li><div><strong>Compare with standard processes</strong> and note all gaps and observations.</div></li>
<li><div>Classify all gaps into <strong>3 categories:</strong>
<ul class="sub-steps"><li><strong>Process</strong> — the process either doesn't exist or is inefficient</li><li><strong>System</strong> — the system lacks capability, or the client isn't using it to its potential</li><li><strong>People</strong> — process and system exist, but a missing validation allows workarounds</li></ul></div></li>
<li><div>Plot <strong>solutions against each gap</strong>:
<ul class="sub-steps"><li>System not used to potential → change management + additional configuration</li><li>System lacks capability → customisation (BRD + cost) or workaround (lower cost, may not be 100% effective)</li><li>People problems → validation check in system, or change management + retraining</li><li>Process problems → define new processes based on client maturity; drive change management</li></ul></div></li>
<li><div>The <strong>proposed digital landscape and enterprise structure</strong> are key inputs to all solutions.</div></li>
</ol>`},

cadence_format:{icon:"📊",label:"Cadence Deck Format",parent:"templates",render:()=>`
<div class="back-btn" onclick="nav('templates')">← Templates</div>
<div class="page-icon">📊</div>
<h1 class="page-title">Cadence Deck — Standard Format</h1>
<div class="page-desc">Every cadence deck must follow this exact slide-by-slide structure. No deviation. This format is what the client sees every week — consistency builds trust.</div>

<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Non-negotiable rules:</strong> Deck must be shared <strong>24 hours before</strong> the meeting. Every section must be filled — if there is nothing to report under a section, write "Nil — no items this week" rather than leaving it blank. RAG status must be updated honestly.</div></div>

<div class="divider"></div>
<h2>Slide Structure</h2>

<table class="raci-table"><thead><tr><th>Slide</th><th>Section</th><th>What to Include</th><th>Who Fills It</th></tr></thead><tbody>
<tr><td><strong>1</strong></td><td>Cover Slide</td><td>Project name, client name, date, week number (e.g., Week 4 of 8), prepared by</td><td>Executive</td></tr>
<tr><td><strong>2</strong></td><td>A — Scope Reminder</td><td>One-line summary of what is in scope and what is out of scope. Copy from the signed scope document. This reminds both teams of boundaries every week.</td><td>Executive (static — update only if scope changes)</td></tr>
<tr><td><strong>3</strong></td><td>B — Project Status Summary</td><td>Overall RAG status (🟢 Green / 🟡 Amber / 🔴 Red) with a 2–3 line explanation of why. Example: "🟡 Amber — data from client pending since Week 2, impacting flowchart timelines."</td><td>Project Manager</td></tr>
<tr><td><strong>4</strong></td><td>C — Tasks Completed This Week</td><td>Itemised bullet list of everything delivered since the last cadence. Be specific — not "worked on process understanding" but "Completed O2C and P2P process understanding calls. MoMs sent on 12-Mar."</td><td>Executive</td></tr>
<tr><td><strong>5</strong></td><td>D — Plan for Next Week</td><td>Itemised list of what will be delivered before the next cadence. This becomes the checklist to verify against in the following week's "Tasks Completed" section.</td><td>Project Manager</td></tr>
<tr><td><strong>6</strong></td><td>E — Key Gaps / Observations</td><td>Any process gaps, misalignments, or observations noted this week. Frame as: Gap / Observation → Impact → Proposed action.</td><td>Exec + PM</td></tr>
<tr><td><strong>7</strong></td><td>F — Data & Input Pendencies</td><td>Table of all data or inputs still awaited from the client. Columns: Item, Requested on, Expected by, Days pending, Owner on client side. Highlight anything overdue in red.</td><td>Executive</td></tr>
<tr><td><strong>8</strong></td><td>G — Risks & Escalations</td><td>Any risk to project timelines, budget, or quality — and any matter requiring client management's attention or decision. Be direct. Do not bury escalations in vague language.</td><td>Project Manager</td></tr>
<tr><td><strong>9</strong></td><td>H — Upcoming Billing Milestones</td><td>Table of all upcoming billing milestones. Columns: Milestone name, Linked deliverable, Amount (₹), Expected invoice date, Status (On Track / At Risk / Raised). Flag any milestone at risk due to project delays — do not let billing surprises happen at month-end.</td><td>Project Manager</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>RAG Status Guide</h2>
<table class="raci-table"><thead><tr><th>Status</th><th>Meaning</th><th>Example Situation</th></tr></thead><tbody>
<tr><td><strong style="color:#27ae60">🟢 Green</strong></td><td>On track — no issues</td><td>All milestones on schedule, client responsive, no blockers</td></tr>
<tr><td><strong style="color:#f39c12">🟡 Amber</strong></td><td>At risk — action needed</td><td>Data pending for 5+ days, one milestone delayed, minor scope disagreement</td></tr>
<tr><td><strong style="color:#e74c3c">🔴 Red</strong></td><td>Off track — escalation required</td><td>Critical milestone missed, client unresponsive for 10+ days, scope conflict unresolved</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Data Pendencies Table Format</h2>
<table class="raci-table"><thead><tr><th>Sr.</th><th>Item Requested</th><th>Requested On</th><th>Expected By</th><th>Days Pending</th><th>Client Owner</th><th>Status</th></tr></thead><tbody>
<tr><td>1</td><td>Customer Master export from ERP</td><td>10-Mar</td><td>12-Mar</td><td style="color:#e74c3c"><strong>9 days</strong></td><td>Rahul Shah (Finance)</td><td>🔴 Overdue</td></tr>
<tr><td>2</td><td>Last 3 years Trial Balance</td><td>12-Mar</td><td>15-Mar</td><td>6 days</td><td>Priya Nair (CFO)</td><td>🟡 Pending</td></tr>
</tbody></table>`},

erp_impl_phase0:{icon:"0️⃣",label:"Phase 0: Initiation & Kick-off",parent:"erp_impl",render:()=>`
<div class="back-btn" onclick="nav('erp_impl')">← ERP Implementation SOP</div>
<div class="section-tag">Phase 0 · ERP Implementation</div>
<div class="page-icon">0️⃣</div>
<h1 class="page-title">Phase 0: Initiation & Kick-off</h1>
<p>Everything that must be done before the first client-facing call — project setup, communication, planning, and foldering.</p>

<h2>Task 0.1 — Kick-off Email</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Formally introduce the team, set context, and initiate the engagement with all client stakeholders.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> On the day the project starts, before any calls.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Email sent from the Project Manager's ID, approved by Senior Manager.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Open Outlook and compose a new email:<ul class="sub-steps">
<li>To: All client stakeholders</li>
<li>CC: CPL Team including Chitra (chitraparameswaran@contetra.com)</li>
<li>Subject: <code>Project Kick-off | &lt;Client&gt; &lt;&gt; Contetra | ERP Implementation</code></li>
</ul></div></li>
<li><div>Use the following email body:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Dear Team,

I hope this email finds you well.

This message is to formally kick off our ERP Implementation project. The primary goal of this engagement is to implement a robust ERP system that streamlines your operations, improves visibility across functions, and enables data-driven decision-making.

To ensure we align on the project objectives, scope, and approach, we would like to schedule a kick-off call covering:

- Project Goals & Scope: What is in and out of scope.
- Implementation Approach: Phases and methodology.
- Key Stakeholders & Roles: SPOCs per module.
- Timeline & Milestones: Project plan walkthrough.
- Data & Access Requirements: What we will need from your team.

Could you please share your availability for a 60-minute kick-off call?

In the meantime, please share the following:
- Audited Financial Statements for the previous FY
- Current Chart of Accounts from existing system
- Sample Trial Balance
- View-only access to the existing ERP / accounting system
- Org chart and list of key users per module

We look forward to working with your team.

Best regards,</div></div></li>
<li><div>Review all details and send from the Project Manager's email ID.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.2 — Kick-off Call</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Conduct an introductory call — explain the project, methodology, and get a basic business understanding. Align on scope, timelines, and SPOCs.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Call completed, MoM sent, scope understood internally.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Schedule on MS Teams: <code>Kick-off Call | &lt;Client&gt; x Contetra</code>. Add all stakeholders. Enable auto-record.</div></li>
<li><div>Start with this script:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Hello everyone — good [morning/afternoon]. Thank you for joining.
From today, we are starting the ERP Implementation engagement. We will first understand your current processes, then design and configure the new ERP to solve those gaps.
Today: a short deck on scope and approach, followed by a business overview so we can plan module-wise workshops.
Shall I start?"</div></div></li>
<li><div>Cover during the call:<ul class="sub-steps">
<li>SPOC per module (CRM, O2C, P2P, Finance, HR, etc.)</li>
<li>Decision-making authority</li>
<li>Known constraints (timelines, blackout dates, system limitations)</li>
<li>High-level current pain points</li>
</ul></div></li>
<li><div>Send MoM within 24 hours per <span class="ilink" onclick="nav('phase1')">Task 1.4 — Write MoM →</span></div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.3 — Project Plan Preparation & Sharing</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Create a detailed project plan covering all phases, assign owners, and align client on timelines.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Plan approved by Senior Manager and shared with client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head / CEO</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Use the standard ERP Implementation Excel project plan template. Phases to cover:<ul class="sub-steps">
<li>Phase A: Initiation & Business Understanding</li>
<li>Phase B: Process Understanding & Validations</li>
<li>Phase C: Data Collection & Analysis</li>
<li>Phase D: Process Gaps & Observations</li>
<li>Phase E: CRP Configuration</li>
<li>Phase F: Training</li>
<li>Phase G: UAT</li>
<li>Phase H: Go-live</li>
<li>Phase I: Hypercare & Support</li>
</ul></div></li>
<li><div>Populate for each task: dependency, responsible team, start date, end date, days required.</div></li>
<li><div>Get approved by Senior Manager. Incorporate changes.</div></li>
<li><div>Share with client using the <span class="ilink" onclick="nav('project_plan_email')">Project Plan Email template →</span> (update subject to say ERP Implementation).</div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.4 — Client SPOC List & Foldering Setup</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Map all client SPOCs per module and set up the shared OneDrive folder structure before any work begins.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare a SPOC mapping doc: Name, Role, Module, Email, Phone, Decision authority.</div></li>
<li><div>Set up OneDrive folders per the <span class="ilink" onclick="nav('foldering')">Foldering Structure →</span></div></li>
<li><div>Share folder with all stakeholders (client + internal team).</div></li>
</ol>`},

erp_impl_phase1:{icon:"1️⃣",label:"Phase 1: Process Understanding",parent:"erp_impl",render:()=>`
<div class="back-btn" onclick="nav('erp_impl')">← ERP Implementation SOP</div>
<div class="section-tag">Phase 1 · ERP Implementation</div>
<div class="page-icon">1️⃣</div>
<h1 class="page-title">Phase 1: Process Understanding & Validations</h1>
<p>Covers business understanding, module-wise process calls, as-is flowchart preparation, data collection, and client sign-off.</p>

<h2>Task 1.1 — Pre-call Preparation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Ensure the team is fully prepared before any client call — research done, questionnaire ready.</div></div>
<p>Complete the full <span class="ilink" onclick="nav('understanding_prep')">Pre-call Preparation Checklist →</span> before beginning any process understanding session.</p>

<div class="divider"></div>
<h2>Task 1.2 — Business Understanding Call</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Get a deep understanding of the client's business — model, revenue, operations, and pain points.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Call completed, notes captured, MoM sent within 24 hours.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Schedule on MS Teams: <code>&lt;Business Understanding&gt; | &lt;Client&gt; x Contetra</code>. Enable auto-record.</div></li>
<li><div>Cover during call:<ul class="sub-steps">
<li>Business model — revenue, key products/services</li>
<li>Organisation structure — departments, locations, headcount</li>
<li>Current ERP / systems landscape</li>
<li>Top 5–10 pain points in current operations</li>
<li>Expectations from the new ERP</li>
<li>Timeline constraints (financial year end, audits, peak seasons)</li>
</ul></div></li>
<li><div>Save recording to OneDrive + upload to NotebookLM. See <span class="ilink" onclick="nav('phase1')">Post-meeting Rituals →</span></div></li>
<li><div>Send MoM within 24 hours.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.3 — Module-wise Process Understanding Calls</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Understand the existing (as-is) process for each module as actually followed on the ground.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>Modules to cover:</strong> CRM · O2C · P2P · Finance & R2R · Production · Inventory · PMO · HR/H2R · Others as applicable</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>For each module, schedule a dedicated MS Teams call: <code>&lt;Module&gt; Understanding | &lt;Client&gt; x Contetra</code>. Invite the relevant client SPOC only. Enable auto-record.</div></li>
<li><div>Start every call with:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Hi everyone. This call is to understand the process of [module name] as you follow it today. Please walk us through your end-to-end process and we will ask questions along the way."</div></div></li>
<li><div>Use the questionnaire from <span class="ilink" onclick="nav('understanding_prep')">Pre-call Preparation →</span> throughout. Cover all questions.</div></li>
<li><div>End every call with:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Are there any pain points, manual workarounds, or repetitive tasks in this process that you'd like the new ERP to solve?"</div></div></li>
<li><div>After each call: save recording, upload to NotebookLM (same client notebook), send MoM within 24 hours.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.4 — As-Is Flowchart Preparation & Client Sign-off</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Map every process into a visual flowchart — validated and signed off by client before moving to configuration.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Client has reviewed, approved, and given written sign-off on all as-is flowcharts.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Client SPOC</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Extract process detail from NotebookLM using the <span class="ilink" onclick="nav('prompts')">Process Detail Prompt →</span></div></li>
<li><div>Prepare as-is flowchart in Miro using <span class="ilink" onclick="nav('credentials')">shared credentials →</span> and AltQuad Ops Template.</div></li>
<li><div>Share Miro board link with client SPOC for review. Allow 2 working days for feedback.</div></li>
<li><div>Incorporate all client changes. Run a follow-up call for significant additions.</div></li>
<li><div>Get written sign-off (email confirmation) from client SPOC per module before proceeding to CRP.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.5 — Data Collection & Analysis</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Collect and analyse client data to quantify gaps, inform configuration decisions, and prepare for migration.</div></div>
<div class="callout"><div class="callout-icon">❓</div><div><strong>When:</strong> Runs in parallel with process understanding calls.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive, PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Communicate data requirements early. Typical data needed:<ul class="sub-steps">
<li>Trial Balance (last 2–3 years)</li>
<li>Customer Master, Vendor Master, Item Master lists</li>
<li>Open AR (invoice-wise with ageing)</li>
<li>Open AP (invoice-wise with ageing)</li>
<li>Inventory balance (item-wise)</li>
<li>Fixed Asset register</li>
<li>Chart of Accounts from current system</li>
</ul></div></li>
<li><div>Track all data requests in the <strong>Data Tracker</strong>: Sr. No., Area, Data required, SPOC, Ask date, Delays, Status, File path.</div></li>
<li><div>Analyse received data — identify master data quality issues (duplicates, missing fields).</div></li>
<li><div>Present analysis to client for validation before using in configuration.</div></li>
</ol>`},

erp_impl_phase2:{icon:"2️⃣",label:"Phase 2: CRP Configuration",parent:"erp_impl",render:()=>`
<div class="back-btn" onclick="nav('erp_impl')">← ERP Implementation SOP</div>
<div class="section-tag">Phase 2 · ERP Implementation</div>
<div class="page-icon">2️⃣</div>
<h1 class="page-title">Phase 2: CRP Configuration</h1>
<p>CRP (Conference Room Pilot) is where the ERP is configured as per the to-be processes and demonstrated to the client before UAT.</p>

<h2>What is CRP?</h2>
<div class="callout"><div class="callout-icon">💡</div><div>A <strong>Conference Room Pilot</strong> is a controlled simulation of the client's business processes in the newly configured ERP. It is conducted with key client stakeholders to validate that the system behaves as expected before handing over to end users for UAT. Think of it as a "dress rehearsal" before the actual show.</div></div>

<div class="divider"></div>
<h2>Task 2.1 — Enterprise Structure Definition</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Define how the client's business is structured in the ERP — the cuts and slices in which management wants to see profitability.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Enterprise structure approved by client and technical partner, ready for configuration.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Vertical Head</td><td>Client Management</td></tr></table>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Cost Centre:</strong> Area that incurs cost but generates no direct revenue. Combination of Department + Location. Example: "HR + Mumbai".</div></div>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Profit Centre:</strong> Area that generates revenue directly. Example: Process Vertical — it generates revenue directly.</div></div>
<div class="callout"><div class="callout-icon">📌</div><div><strong>Thumb Rule:</strong> Minimise user inputs for dimensions — capture at Master level (Project Master, Customer Master) not at transaction level. Reduces errors significantly.</div></div>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Understand what management wants to see in profitability reports — by vertical, project, customer, customer industry, location, or department.</div></li>
<li><div>Map each dimension to a Master (Project Master captures vertical + category; Customer Master captures industry; Location + Department via user ID).</div></li>
<li><div>Document and get written approval from client management before configuration begins.</div></li>
<li><div>Share with the technical partner for ERP setup.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 2.2 — Master Data Preparation & Cleanup</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Clean, validate, and prepare all master data for upload into the new ERP.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Client SPOC</td></tr></table>
<h3>Customer Master Checklist</h3>
<ol class="steps">
<li><div>Duplication check on PAN</div></li>
<li><div>State, City, and PIN code are mandatory</div></li>
<li><div>Customers with multiple locations under same PAN — add locations, do not create new codes</div></li>
<li><div>GSTIN duplication check + map state code to GSTIN</div></li>
<li><div>Capture Customer Industry and Customer Group at master level</div></li>
<li><div>Mark Domestic / International / SEZ customers</div></li>
<li><div>International customers — capture country tax number</div></li>
<li><div>Set credit limits and payment terms</div></li>
<li><div>Add customer contacts and GL taggings</div></li>
</ol>
<h3>Vendor Master Checklist</h3>
<ol class="steps">
<li><div>Duplication check on PAN and GSTIN</div></li>
<li><div>Multiple locations under same PAN — add locations, not new codes</div></li>
<li><div>MSME check — flag MSME vendors</div></li>
<li><div>Bank details — account number and IFSC code mandatory</div></li>
<li><div>Vendor groupings: sub-contractors, service providers, employees, one-time vendors</div></li>
<li><div>Domestic / International classification</div></li>
<li><div>TDS tagging + lower rate — link to TDS Tax Master</div></li>
<li><div>Set credit limits, payment terms, and vendor contacts</div></li>
<li><div>GL taggings</div></li>
</ol>

<div class="divider"></div>
<h2>Task 2.3 — CRP (Conference Room Pilot)</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Configure the ERP and conduct a module-wise demo to validate system behaviour before UAT.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All modules demonstrated, all gaps resolved, CRP sign-off from client obtained.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>PM + Technical Partner</td><td>Senior Manager</td><td>Client Management</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Technical partner completes system configuration based on signed-off as-is flows and enterprise structure.</div></li>
<li><div>Prepare CRP test scenarios per module using actual client data where possible.</div></li>
<li><div>Conduct module-wise CRP sessions with key client SPOCs:<ul class="sub-steps">
<li>Walk through end-to-end transactions per module</li>
<li>Demonstrate integrations (e.g., sales order → invoice → receipt)</li>
<li>Show reporting outputs (GL, AR ageing, P&L by dimension)</li>
</ul></div></li>
<li><div>Log all issues and change requests from CRP in a tracker.</div></li>
<li><div>Resolve with technical partner. Conduct re-demo for critical changes.</div></li>
<li><div>Obtain CRP sign-off email from client before proceeding to Training and UAT.</div></li>
</ol>`},

erp_impl_phase3:{icon:"3️⃣",label:"Phase 3: Training",parent:"erp_impl",render:()=>`
<div class="back-btn" onclick="nav('erp_impl')">← ERP Implementation SOP</div>
<div class="section-tag">Phase 3 · ERP Implementation</div>
<div class="page-icon">3️⃣</div>
<h1 class="page-title">Phase 3: Training</h1>
<p>User training ensures all end users are comfortable operating the new ERP before UAT and Go-live.</p>

<h2>Task 3.1 — Training Plan Preparation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Plan who gets trained on what, when, and by whom — so no user is left unprepared at Go-live.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Client Management</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare a training schedule: Module, Trainer, Trainees, Date, Duration, Mode (online/in-person).</div></li>
<li><div>Every user who will operate the system post Go-live must be covered.</div></li>
<li><div>Confirm schedule with client at least one week in advance.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 3.2 — Conduct Training Sessions</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Equip end users to independently operate the ERP for their role.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All sessions completed, attendance recorded, feedback collected.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Conduct module-wise sessions per the training plan. Cover:<ul class="sub-steps">
<li>System navigation</li>
<li>Step-by-step walkthrough of all transactions for that user's role</li>
<li>Common errors and how to handle them</li>
<li>Approval workflows and notifications</li>
</ul></div></li>
<li><div>Record all training sessions and save to the client's OneDrive folder.</div></li>
<li><div>Collect attendance sign-off from all trainees.</div></li>
<li><div>Distribute training notes / user manuals after each session.</div></li>
<li><div>Collect feedback to identify users needing re-training before UAT.</div></li>
</ol>`},

erp_impl_phase4:{icon:"4️⃣",label:"Phase 4: UAT",parent:"erp_impl",render:()=>`
<div class="back-btn" onclick="nav('erp_impl')">← ERP Implementation SOP</div>
<div class="section-tag">Phase 4 · ERP Implementation</div>
<div class="page-icon">4️⃣</div>
<h1 class="page-title">Phase 4: UAT — User Acceptance Testing</h1>
<p>UAT is where <strong>client users</strong> test the configured ERP using real-world scenarios to confirm it meets requirements before Go-live.</p>

<h2>What is UAT?</h2>
<div class="callout"><div class="callout-icon">💡</div><div><strong>User Acceptance Testing (UAT)</strong> is the final testing phase before Go-live. Unlike CRP (done by the implementation team), UAT is performed by actual end users. It confirms the ERP works for real business scenarios. A formal client sign-off is mandatory before Go-live.</div></div>

<div class="divider"></div>
<h2>Task 4.1 — Scenario Listing</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Build an exhaustive list of real business scenarios to test in UAT — derived from the client's actual transactions.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Client SPOC</td></tr></table>
