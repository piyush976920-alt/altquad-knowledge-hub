<li><div>Run all format validations one final time — PAN (10 chars), GSTIN (15 chars), PIN (6 digits), IFSC (11 chars), Aadhaar (12 digits).</div></li>
<li><div>Confirm total record count: cleaned file should have ≤ records than raw file (merges and blocks reduce count — additions should be explained).</div></li>
<li><div>Verify no new duplicates were introduced during cleanup.</div></li>
<li><div>Cross-check a sample of 20–30 records between the cleaned file and the original to confirm no unintended changes.</div></li>
<li><div>Verify that all <strong>high-severity issues</strong> from the issue log have been resolved or explicitly deferred with client sign-off.</div></li>
<li><div>Get PM sign-off on the final cleaned file before sending to client for upload approval.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 3.2 — Upload / Update in ERP</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Apply the signed-off changes to the live ERP system — either directly or by providing a structured upload file for the client's IT/ERP team.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Critical:</strong> Always take a full backup of the master data in ERP before making any changes. Confirm with the client's IT team that a restore point exists.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + Client IT</td><td>Project Manager</td><td>Client Management</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Confirm ERP backup exists before any changes.</div></li>
<li><div>Apply changes in this recommended order:<ul class="sub-steps">
<li>Step 1: COA cleanup first — all other masters reference GL codes</li>
<li>Step 2: Customer Master and Vendor Master</li>
<li>Step 3: Item / Product Master</li>
<li>Step 4: Employee Master</li>
<li>Step 5: Other supporting masters (cost centres, payment terms, tax codes)</li>
</ul></div></li>
<li><div>For each master type, apply changes in this order: corrections first → enrichments → merges → blocks (never delete).</div></li>
<li><div>After each master upload — immediately run the reconciliation check in Task 3.3 before moving to the next master.</div></li>
<li><div>Maintain a <strong>Change Log</strong> throughout: Record ID, Field changed, Old value, New value, Changed by, Date.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 3.3 — Post-Cleanup Reconciliation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Verify that the data in the ERP after cleanup matches the signed-off cleaned file — and that no existing transactions, balances, or reports have been broken by the changes.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Reconciliation report completed, all variances explained, PM and client sign off on reconciliation.</div></div>
<h3>Reconciliation Checks by Master Type</h3>
<table class="raci-table"><thead><tr><th>Master</th><th>What to Reconcile</th></tr></thead><tbody>
<tr><td><strong>Customer</strong></td><td>Total open AR balance before vs. after cleanup must match exactly. Merged customers — open invoices must have transferred to the retained code. GST returns: customer count in last return vs. current master count (explain differences).</td></tr>
<tr><td><strong>Vendor</strong></td><td>Total open AP balance before vs. after must match. TDS liability must not have changed due to master changes. Merged vendors — verify open POs and invoices transferred correctly.</td></tr>
<tr><td><strong>Item</strong></td><td>Total inventory value before vs. after must match. Merged items — stock quantity transferred to retained item code. GST rates: sample 10 invoices, verify correct rate is now being applied.</td></tr>
<tr><td><strong>COA</strong></td><td>Trial Balance total must be identical before and after. Merged GLs — balances transferred to retained GL code. Financial statements (P&L, Balance Sheet) must still foot and cross-foot.</td></tr>
<tr><td><strong>Employee</strong></td><td>Payroll headcount matches HR records. TDS liability for current month unaffected. Merged employees — YTD salary and TDS transferred to retained code.</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Task 3.4 — Project Closure</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Formally close the project, document what was cleaned, and provide the client with a record of all changes made.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Closure report signed, feedback collected, all files archived.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare the Project Closure Report:<ul class="sub-steps">
<li>Total records audited per master type</li>
<li>Issues found vs. issues resolved (with counts)</li>
<li>Summary of all changes made (by category)</li>
<li>Items deferred by client with reasons</li>
<li>Recommendations to maintain data quality going forward (governance suggestions)</li>
<li>Timesheet summary — hours per master type</li>
</ul></div></li>
<li><div>Recommendations to include for the client:<ul class="sub-steps">
<li>Set up a new vendor / customer creation checklist with mandatory field validation</li>
<li>Assign a data steward for each master type responsible for ongoing quality</li>
<li>Run an annual master data audit (same process, lighter version)</li>
<li>Block any master that has had no transaction in 3 years</li>
</ul></div></li>
<li><div>Conduct a closure call with the client. Collect feedback.</div></li>
<li><div>Get the client to fill the <span class="ilink" onclick="nav('templates')">Feedback Form →</span></div></li>
<li><div>Archive all files: raw extracts, issue log, cleaned files, change log, reconciliation report, client sign-offs, closure report.</div></li>
</ol>`},

mdc_customer:{icon:"👥",label:"Customer Master — Detail",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Customer Master · Detail Guide</div>
<div class="page-icon">👥</div>
<h1 class="page-title">Customer Master — Complete Cleanup Guide</h1>

<h2>PAN Validation</h2>
<div class="callout"><div class="callout-icon">📌</div><div>PAN format: 5 uppercase letters + 4 digits + 1 uppercase letter (e.g., ABCDE1234F). The 4th character indicates entity type: P = Individual, C = Company, H = HUF, F = Firm, B = BOI, A = AOP, T = Trust, G = Government.</div></div>
<ol class="steps">
<li><div>Extract all customer PANs. Run a COUNTIF to find PANs that appear more than once.</div></li>
<li><div>For each duplicate PAN group — confirm with client whether these are the same entity (merge) or genuinely different entities (e.g., different branches — add as locations under one code).</div></li>
<li><div>Validate PAN format using Excel: <code>=AND(LEN(A2)=10, EXACT(A2,UPPER(A2)))</code></div></li>
<li><div>Customers without PAN — check if they are individuals below the GST threshold or foreign entities (different compliance treatment).</div></li>
</ol>

<h2>GSTIN Validation</h2>
<div class="callout"><div class="callout-icon">📌</div><div>GSTIN format: 2-digit state code + 10-digit PAN + 1-digit entity number + Z + 1 check digit (total 15 characters). The first 2 digits are the state code — must match the registered state of the customer.</div></div>
<ol class="steps">
<li><div>Validate length: all GSTINs must be exactly 15 characters.</div></li>
<li><div>Extract state code (first 2 digits) and compare with the state in the address. If they don't match — either the address is wrong or the GSTIN is wrong.</div></li>
<li><div>Check PAN embedded in GSTIN (characters 3–12) — must match the customer's PAN on record.</div></li>
<li><div>For customers with multiple GSTINs (multi-state operations) — each GSTIN is a separate billing location. Create location-wise entries under the same customer code, not separate customer codes.</div></li>
<li><div>Unregistered customers (no GSTIN) — tag as "URD" (Unregistered Dealer). Different GST treatment applies — B2C invoicing rules.</div></li>
</ol>

<h2>Address Validation</h2>
<ol class="steps">
<li><div>PIN code must be exactly 6 digits. Cross-reference against India Post's PIN code database to verify city and state.</div></li>
<li><div>City must match the PIN code's actual taluka/city. Common error: PIN code of one city with the name of another city.</div></li>
<li><div>State must be spelled consistently and match the GSTIN state code.</div></li>
<li><div>Remove PO Box-only addresses where a physical address is required (e.g., for e-invoice delivery address validation).</div></li>
</ol>

<h2>Customer Classification</h2>
<ol class="steps">
<li><div><strong>Industry:</strong> Classify each customer by industry (Manufacturing, IT Services, Real Estate, FMCG, etc.). Needed for customer-wise P&L by industry dimension in ERP.</div></li>
<li><div><strong>Customer Group:</strong> Tag group companies together (e.g., all Tata group companies under "Tata"). Enables group-level credit exposure tracking.</div></li>
<li><div><strong>Domestic / International / SEZ:</strong><ul class="sub-steps">
<li>Has valid GSTIN → Domestic Registered</li>
<li>No GSTIN, Indian address → Domestic Unregistered</li>
<li>Foreign address → International (zero-rated for GST)</li>
<li>SEZ unit certificate → SEZ (zero-rated supply)</li>
</ul></div></li>
</ol>`},

mdc_vendor:{icon:"🏭",label:"Vendor Master — Detail",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Vendor Master · Detail Guide</div>
<div class="page-icon">🏭</div>
<h1 class="page-title">Vendor Master — Complete Cleanup Guide</h1>

<h2>PAN & GSTIN Validation</h2>
<p>Same validation logic as Customer Master. See <span class="ilink" onclick="nav('mdc_customer')">Customer Master →</span> for PAN and GSTIN format rules. For vendors, incorrect PAN has an additional risk: wrong TDS deduction and 26AS mismatch.</p>

<h2>MSME Validation</h2>
<div class="callout"><div class="callout-icon">⚠️</div><div>MSME (Micro, Small & Medium Enterprises) vendors have special legal protections. Under MSMED Act, payment to MSME vendors must be made within 45 days of invoice. Failure attracts compound interest at 3x RBI lending rate. Non-compliance must also be disclosed in the financial statements. This makes MSME tagging a compliance issue, not just a master data hygiene issue.</div></div>
<ol class="steps">
<li><div>For each vendor, check MSME status on the <strong>Udyam Registration Portal</strong> (udyamregistration.gov.in) using the vendor's PAN or Udyam Registration Number.</div></li>
<li><div>Tag vendors as: Micro / Small / Medium / Not MSME.</div></li>
<li><div>Update payment terms for MSME vendors to max 45 days in the ERP.</div></li>
<li><div>Flag any MSME vendor where current payment terms exceed 45 days — client must correct before year-end.</div></li>
</ol>

<h2>Bank Details Validation</h2>
<ol class="steps">
<li><div>IFSC code: exactly 11 characters. First 4 = bank code, 5th = 0 (reserved), last 6 = branch code. Validate against RBI's IFSC master list.</div></li>
<li><div>Bank account number: minimum 9 digits, no letters or special characters. Cross-check with the bank's expected account number length (SBI = 11 digits, HDFC = 14 digits, etc.).</div></li>
<li><div>For vendors with multiple bank accounts — confirm which is the primary account for payments.</div></li>
<li><div>Flag any vendor receiving payments to an account not on record — security risk.</div></li>
</ol>

<h2>TDS Configuration</h2>
<div class="callout"><div class="callout-icon">📌</div><div>Common TDS sections for vendor payments: 194C (Contractors), 194J (Professional fees), 194H (Commission), 194I (Rent), 194Q (Purchase of goods above ₹50L threshold), 194A (Interest). Wrong section = wrong rate = short or excess deduction = demand from IT department.</div></div>
<ol class="steps">
<li><div>For each vendor, determine the applicable TDS section based on the nature of services/goods.</div></li>
<li><div>Check for lower deduction certificates (Form 13 / Form 15G/15H) — update rate and validity period in the system.</div></li>
<li><div>Vendors with PAN not available — TDS at 20% (higher rate). Flag these for PAN collection urgently.</div></li>
<li><div>Cross-check TDS configuration against the last 26AS/Form 16A for the vendor to identify any past mismatches.</div></li>
</ol>`},

mdc_item:{icon:"📦",label:"Item Master — Detail",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Item Master · Detail Guide</div>
<div class="page-icon">📦</div>
<h1 class="page-title">Item / Product Master — Complete Cleanup Guide</h1>

<h2>HSN / SAC Code Validation</h2>
<div class="callout"><div class="callout-icon">📌</div><div>HSN (Harmonised System of Nomenclature) for goods, SAC (Service Accounting Code) for services. Mandatory on invoices above ₹5 crore turnover (and on all e-invoices). Wrong HSN = wrong GST rate on invoice = GST liability mismatch and potential show cause notice.</div></div>
<ol class="steps">
<li><div>Every item must have either an HSN code (4/6/8 digit depending on turnover) or SAC code.</div></li>
<li><div>Cross-reference each HSN against the GST Council's HSN-rate schedule to verify the GST rate in the system matches the rate applicable to that HSN.</div></li>
<li><div>Common errors:<ul class="sub-steps">
<li>HSN 9988 (manufacturing services) vs 9987 (maintenance services) — different rates</li>
<li>HSN 8471 (computers) at 18% vs incorrectly coded under 8473 (parts) at 18% — same rate but different classification for customs/DGFT purposes</li>
<li>Services incorrectly given an HSN instead of SAC</li>
</ul></div></li>
</ol>

<h2>UOM Standardisation</h2>
<ol class="steps">
<li><div>Identify all UOM values in use. Common inconsistencies: Kg / KGS / KILO / kgs for the same unit.</div></li>
<li><div>Standardise to a single UOM master list. Define the standard and apply it consistently across all items of the same type.</div></li>
<li><div>Where items need multiple UOMs (purchase in MT, sell in KG) — set up UOM conversion ratios, not separate item codes.</div></li>
</ol>

<h2>GL Determination Mapping</h2>
<ol class="steps">
<li><div>Each item or item category must be linked to the correct GL accounts for:<ul class="sub-steps">
<li>Revenue GL (when sold)</li>
<li>Expense / COGS GL (when purchased / consumed)</li>
<li>Inventory GL (when stocked)</li>
<li>GST input / output GL (determined by HSN rate)</li>
</ul></div></li>
<li><div>Test GL determination by running a dummy transaction in UAT environment — verify the correct GL is hit before updating Production.</div></li>
</ol>`},

mdc_coa:{icon:"📒",label:"Chart of Accounts — Detail",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Chart of Accounts · Detail Guide</div>
<div class="page-icon">📒</div>
<h1 class="page-title">Chart of Accounts — Complete Cleanup Guide</h1>

<h2>COA Rationalisation Approach</h2>
<div class="callout"><div class="callout-icon">💡</div><div>The goal of COA cleanup is not to reduce the number of GLs for its own sake — it's to ensure every GL has a clear, single purpose and that management can get the P&L and Balance Sheet slices they need without resorting to manual Excel workings. Use ERP dimensions (cost centre, project, customer industry) to replace GLs that were created purely for reporting segmentation.</div></div>
<ol class="steps">
<li><div>Export the full GL list with last transaction date and balance.</div></li>
<li><div>Flag all GLs with zero balance and no transactions in the last 3 years — candidates for blocking.</div></li>
<li><div>Identify GLs that are identical in purpose (e.g., "Telephone Expenses" + "Phone Expenses" + "Communication Charges") — merge into one.</div></li>
<li><div>Check every GL is correctly mapped to: Balance Sheet or P&L, and the correct financial statement line item.</div></li>
<li><div>Ensure all Sub-GL control accounts exist and are correctly mapped:<ul class="sub-steps">
<li>Trade Receivables → AR Control Account</li>
<li>Trade Payables → AP Control Account</li>
<li>Inventory → Inventory Control Account</li>
<li>Fixed Assets → each asset category has its own GL + accumulated depreciation GL</li>
</ul></div></li>
</ol>

<h2>GST Ledger Checklist</h2>
<p>Standard GST ledgers that must exist under Current Liabilities — Duties and Taxes:</p>
<table class="raci-table"><thead><tr><th>Ledger Name</th><th>Nature</th></tr></thead><tbody>
<tr><td>Output IGST</td><td>Liability — Inter-state sales GST collected</td></tr>
<tr><td>Output CGST</td><td>Liability — Intra-state sales CGST collected</td></tr>
<tr><td>Output SGST</td><td>Liability — Intra-state sales SGST collected</td></tr>
<tr><td>Input IGST</td><td>Asset — ITC on inter-state purchases</td></tr>
<tr><td>Input CGST</td><td>Asset — ITC on intra-state purchases</td></tr>
<tr><td>Input SGST</td><td>Asset — ITC on intra-state purchases</td></tr>
<tr><td>RCM IGST / CGST / SGST</td><td>Liability + Asset — Reverse Charge Mechanism</td></tr>
<tr><td>IGST / CGST / SGST Payable</td><td>Net liability after ITC set-off</td></tr>
</tbody></table>`},

mdc_employee:{icon:"🪪",label:"Employee Master — Detail",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Employee Master · Detail Guide</div>
<div class="page-icon">🪪</div>
<h1 class="page-title">Employee Master — Complete Cleanup Guide</h1>

<h2>Statutory Compliance Fields</h2>
<div class="callout"><div class="callout-icon">⚠️</div><div>Employee master errors have direct payroll and compliance consequences. Wrong PAN = wrong TDS deduction = 26AS mismatch = employee income tax notice. Wrong PF number = wrong PF filing = EPFO demand. These are not hygiene issues — they are compliance risks.</div></div>
<table class="raci-table"><thead><tr><th>Field</th><th>Format</th><th>Compliance Impact if Wrong</th></tr></thead><tbody>
<tr><td><strong>PAN</strong></td><td>10 chars (AAAAA9999A)</td><td>TDS under 192 deducted at 20% if PAN missing. 26AS mismatch if wrong.</td></tr>
<tr><td><strong>Aadhaar</strong></td><td>12 digits</td><td>PF e-nomination and ESI registration require Aadhaar seeding.</td></tr>
<tr><td><strong>UAN (PF)</strong></td><td>12 digits</td><td>PF contributions filed against UAN. Wrong UAN = contribution going to wrong account.</td></tr>
<tr><td><strong>ESI Number</strong></td><td>17 digits</td><td>ESI claims rejected if number is incorrect or not seeded with Aadhaar.</td></tr>
<tr><td><strong>Bank Account</strong></td><td>Varies by bank</td><td>Salary disbursement failure. Must match the employee's own account (not spouse/family).</td></tr>
</tbody></table>

<h2>PF / ESI Applicability</h2>
<ol class="steps">
<li><div><strong>PF:</strong> Applicable if employee's Basic + DA ≤ ₹15,000/month. Employee contribution: 12% of Basic+DA. Employer contribution: 12% (3.67% to PF + 8.33% to EPS).</div></li>
<li><div><strong>ESI:</strong> Applicable if employee's Gross Salary ≤ ₹21,000/month. Employee contribution: 0.75% of gross. Employer contribution: 3.25% of gross.</div></li>
<li><div>Employees above the threshold can opt to continue PF voluntarily — confirm their preference and update the system accordingly.</div></li>
<li><div>Once PF is started for an employee, it cannot be stopped as long as they are employed — even if salary crosses ₹15,000 later.</div></li>
</ol>

<h2>Exit / Resigned Employee Cleanup</h2>
<ol class="steps">
<li><div>Cross-check the active employee list in ERP against the current HR headcount. Any mismatch = ex-employee still active in system.</div></li>
<li><div>For each identified ex-employee: verify final settlement is complete (Full and Final), then block the record in ERP.</div></li>
<li><div>Do not delete — retain for 8 years for audit and statutory compliance history.</div></li>
<li><div>Revoke all system access immediately upon identification — security risk if ex-employees retain ERP access.</div></li>
</ol>`},

mdc_other:{icon:"🗂️",label:"Other Masters — Detail",parent:"master_data",render:()=>`
<div class="back-btn" onclick="nav('master_data')">← Master Data Cleanup SOP</div>
<div class="section-tag">Other Masters · Detail Guide</div>
<div class="page-icon">🗂️</div>
<h1 class="page-title">Other Masters — Complete Cleanup Guide</h1>

<h2>Cost Centre Master</h2>
<ol class="steps">
<li><div>Verify every cost centre maps to a real department + location combination. Remove phantom cost centres with no transactions.</div></li>
<li><div>Ensure the naming convention is consistent: [Department] - [Location] (e.g., "Finance - Mumbai", "HR - Bangalore").</div></li>
<li><div>Check that every active employee and vendor is mapped to a valid cost centre — untagged transactions distort departmental P&L.</div></li>
<li><div>Block obsolete cost centres (closed departments, old locations) — do not delete.</div></li>
</ol>

<h2>Payment Terms Master</h2>
<ol class="steps">
<li><div>List all payment terms in use. Common bloat: Net 30, N30, 30 Days, 30D, Due in 30 — all meaning the same thing but set up as separate codes.</div></li>
<li><div>Rationalise to a standard set. Recommended naming: <code>NET-07, NET-15, NET-30, NET-45, NET-60, ADVANCE, COD</code>.</div></li>
<li><div>Ensure MSME vendors are not assigned payment terms exceeding 45 days.</div></li>
<li><div>Check that early payment discount terms (e.g., "2/10 Net 30") are set up correctly with the discount rate and window.</div></li>
</ol>

<h2>Tax Code / TDS Code Master</h2>
<ol class="steps">
<li><div>Verify all TDS codes in use are mapped to the correct section (194C, 194J, 194H, etc.) and applicable rate.</div></li>
<li><div>Remove duplicate TDS codes for the same section and rate — e.g., "194C-1%" and "TDS-Contractor-1%" doing the same thing.</div></li>
<li><div>Check GST tax codes: each rate (5%, 12%, 18%, 28%) should have three variants — IGST, CGST+SGST, CGST+UTGST. Verify all six codes exist and are mapped to the correct GL accounts.</div></li>
<li><div>Check RCM tax codes exist separately from forward charge codes — they carry different GL determination logic.</div></li>
</ol>

<h2>Unit of Measure (UOM) Master</h2>
<ol class="steps">
<li><div>Extract the full UOM list. Flag all variants of the same unit (Kg, KGS, kilo, KILOGRAM).</div></li>
<li><div>Agree on a standard UOM list with the client. Keep it simple — use standard abbreviations (KG, MT, L, ML, NOS, SQM, RMT, HRS, DAY).</div></li>
<li><div>Merge all variant codes into the standard code. Verify that item masters and open purchase orders are updated to the new standard UOM.</div></li>
<li><div>Set up UOM conversion ratios for items that need multiple units (e.g., 1 MT = 1000 KG).</div></li>
</ol>`},


sop_prep:{icon:"📄",label:"SOP — SOP Preparation",parent:"sop_library",render:()=>`
<div class="back-btn" onclick="nav('sop_library')">← SOP Library</div>
<div class="section-tag">Project Type: SOP Preparation</div>
<div class="page-icon">📄</div>
<h1 class="page-title">SOP — SOP Preparation</h1>
<p>An SOP (Standard Operating Procedure) Preparation project involves understanding a client's existing processes, identifying gaps and inefficiencies, designing the ideal future-state process, and documenting it as a structured, usable SOP that the client's team can actually follow — independently, consistently, every time.</p>

<h2>What Makes a Good SOP?</h2>
<div class="card-grid" style="grid-template-columns:repeat(3,1fr)">
  <div class="card"><div class="card-icon">🎯</div><div class="card-title">Clear Purpose</div><div class="card-sub">Every SOP answers: why does this task exist, who does it, and what does "done" look like?</div></div>
  <div class="card"><div class="card-icon">🔢</div><div class="card-title">Numbered Steps</div><div class="card-sub">Steps are actionable, sequential, and specific enough that a new joiner can follow them independently.</div></div>
  <div class="card"><div class="card-icon">✅</div><div class="card-title">Clear Outputs</div><div class="card-sub">Every SOP has a defined "Definition of Done" — a condition that confirms the task is complete.</div></div>
  <div class="card"><div class="card-icon">👥</div><div class="card-title">RACI Defined</div><div class="card-sub">Who executes, who reviews, and who approves — no ambiguity on ownership.</div></div>
  <div class="card"><div class="card-icon">🔗</div><div class="card-title">Linked Templates</div><div class="card-sub">Every SOP references the templates, tools, and resources needed to complete the task.</div></div>
  <div class="card"><div class="card-icon">📏</div><div class="card-title">Right Level of Detail</div><div class="card-sub">Not too high-level (useless) and not over-engineered. Matches the maturity and complexity of the team.</div></div>
</div>

<h2>Standard SOP Structure (Every SOP Must Have This)</h2>
<table class="raci-table"><thead><tr><th>Section</th><th>Content</th><th>Why It Matters</th></tr></thead><tbody>
<tr><td><strong>1. Purpose</strong></td><td>Why does this task/process exist?</td><td>Gives context — without this people follow steps blindly</td></tr>
<tr><td><strong>2. Scope</strong></td><td>What is covered and what is not</td><td>Prevents scope creep and confusion</td></tr>
<tr><td><strong>3. Trigger / When</strong></td><td>What event starts this process?</td><td>Tells people when to use the SOP</td></tr>
<tr><td><strong>4. Definition of Done</strong></td><td>What does completion look like?</td><td>Removes ambiguity about when to stop</td></tr>
<tr><td><strong>5. Roles & Responsibilities (RACI)</strong></td><td>Who executes, reviews, approves</td><td>Ensures accountability</td></tr>
<tr><td><strong>6. Steps to Follow</strong></td><td>Numbered, sequential, actionable steps</td><td>The core of the SOP</td></tr>
<tr><td><strong>7. Templates & References</strong></td><td>Links to tools, templates, examples</td><td>Makes the SOP self-contained</td></tr>
<tr><td><strong>8. Exceptions & Edge Cases</strong></td><td>What to do when the normal flow breaks</td><td>Prevents escalations for predictable situations</td></tr>
<tr><td><strong>9. Version History</strong></td><td>Date, author, what changed</td><td>Tracks how the SOP has evolved</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Project Phases</h2>
<div class="card-grid" style="grid-template-columns:repeat(4,1fr)">
  <div class="card" onclick="nav('sop_prep_phase0')"><div class="card-icon">0️⃣</div><div class="card-title">Phase 0</div><div class="card-sub">Scoping & Kick-off</div></div>
  <div class="card" onclick="nav('sop_prep_phase1')"><div class="card-icon">1️⃣</div><div class="card-title">Phase 1</div><div class="card-sub">Process Understanding</div></div>
  <div class="card" onclick="nav('sop_prep_phase2')"><div class="card-icon">2️⃣</div><div class="card-title">Phase 2</div><div class="card-sub">Gap Analysis & To-Be Design</div></div>
  <div class="card" onclick="nav('sop_prep_phase3')"><div class="card-icon">3️⃣</div><div class="card-title">Phase 3</div><div class="card-sub">SOP Writing & Review</div></div>
  <div class="card" onclick="nav('sop_prep_phase4')"><div class="card-icon">4️⃣</div><div class="card-title">Phase 4</div><div class="card-sub">Training & Handover</div></div>
</div>

<div class="divider"></div>
<h2>All Tasks at a Glance</h2>
<table class="raci-table"><thead><tr><th>Phase</th><th>Task</th><th>Output</th><th>Owner</th><th>Approver</th></tr></thead><tbody>
<tr><td>0</td><td><span class="ilink" onclick="nav('sop_prep_phase0')">Kick-off email & call</span></td><td>Scope list, process inventory</td><td>Executive</td><td>PM</td></tr>
<tr><td>0</td><td><span class="ilink" onclick="nav('sop_prep_phase0')">Process inventory & prioritisation</span></td><td>Prioritised SOP list</td><td>PM</td><td>Client</td></tr>
<tr><td>0</td><td><span class="ilink" onclick="nav('sop_prep_phase0')">Project plan</span></td><td>Plan shared with client</td><td>PM</td><td>SM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('sop_prep_phase1')">Pre-call research</span></td><td>Process research + questionnaire</td><td>Executive</td><td>PM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('sop_prep_phase1')">Process understanding calls</span></td><td>Recordings + MoMs</td><td>Exec + PM</td><td>SM</td></tr>
<tr><td>1</td><td><span class="ilink" onclick="nav('sop_prep_phase1')">As-is process documentation</span></td><td>Validated as-is flowcharts / tables</td><td>Executive</td><td>PM</td></tr>
<tr><td>2</td><td><span class="ilink" onclick="nav('sop_prep_phase2')">Gap analysis</span></td><td>Gap list classified by type</td><td>Exec + PM</td><td>SM</td></tr>
<tr><td>2</td><td><span class="ilink" onclick="nav('sop_prep_phase2')">To-be process design</span></td><td>Approved to-be flowcharts</td><td>PM</td><td>Client</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('sop_prep_phase3')">SOP writing</span></td><td>Draft SOPs per process</td><td>Executive</td><td>PM</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('sop_prep_phase3')">Internal review & quality check</span></td><td>QC-cleared SOPs</td><td>PM</td><td>SM</td></tr>
<tr><td>3</td><td><span class="ilink" onclick="nav('sop_prep_phase3')">Client review & sign-off</span></td><td>Signed-off final SOPs</td><td>PM</td><td>Client</td></tr>
<tr><td>4</td><td><span class="ilink" onclick="nav('sop_prep_phase4')">SOP walkthrough & training</span></td><td>Trained team</td><td>Exec + PM</td><td>—</td></tr>
<tr><td>4</td><td><span class="ilink" onclick="nav('sop_prep_phase4')">SOP repository setup</span></td><td>Accessible SOP library</td><td>Executive</td><td>PM</td></tr>
<tr><td>4</td><td><span class="ilink" onclick="nav('sop_prep_phase4')">Project closure</span></td><td>Closure report signed</td><td>PM</td><td>VH</td></tr>
</tbody></table>`},

sop_prep_phase0:{icon:"0️⃣",label:"Phase 0: Scoping & Kick-off",parent:"sop_prep",render:()=>`
<div class="back-btn" onclick="nav('sop_prep')">← SOP Preparation SOP</div>
<div class="section-tag">Phase 0 · SOP Preparation</div>
<div class="page-icon">0️⃣</div>
<h1 class="page-title">Phase 0: Scoping & Kick-off</h1>
<p>Define which processes need SOPs, why they need them, and in what order to tackle them — before a single call with a process owner is scheduled.</p>

<h2>Task 0.1 — Kick-off Email</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Initiate the engagement and get the client thinking about their process landscape before the first call.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Send the kick-off email:<ul class="sub-steps">
<li>Subject: <code>Project Kick-off | &lt;Client&gt; &lt;&gt; Contetra | SOP Preparation</code></li>
<li>To: All client stakeholders | CC: CPL Team</li>
</ul></div></li>
<li><div>Email body:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>Dear Team,

This message formally kicks off our SOP Preparation engagement.

The goal is to document your key business processes as clear, usable Standard Operating Procedures — so your team can execute work consistently, onboard new members faster, and reduce dependency on tribal knowledge.

To prepare for our kick-off call, could you please share the following before the call:

1. A list of all departments / functions in your organisation
2. For each department — a rough list of recurring tasks or processes (even informal, just bullet points)
3. Any existing process documents, checklists, or training materials (even if outdated or incomplete)
4. An org chart, if available

This will help us prioritise the right processes and structure our work effectively.

We look forward to working with your team.

Best regards,</div></div></li>
</ol>

<div class="divider"></div>
<h2>Task 0.2 — Kick-off Call & Process Inventory</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Build a complete inventory of all processes in scope, understand the business context, and agree on the prioritisation order.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Process inventory built, prioritised list agreed with client, MoM sent.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Key Questions to Cover During the Call</h3>
<ol class="steps">
<li><div>What is the trigger for this SOP project? (New ERP go-live, rapid team expansion, audit finding, quality failures, new regulatory requirement?)</div></li>
<li><div>Which departments are in scope? Which are explicitly out of scope?</div></li>
<li><div>For in-scope departments — what are the 5 most critical processes that, if done incorrectly, cause the most problems?</div></li>
<li><div>Do any existing SOPs, checklists, or process documents exist? Even informal ones?</div></li>
<li><div>What is the target format for the SOPs? (Word document, online wiki, printed manual, integrated into an existing tool?)</div></li>
<li><div>Who are the process owners for each function? These are the people who will be interviewed in Phase 1.</div></li>
<li><div>What is the expected outcome — are these SOPs for internal training, ISO/audit compliance, onboarding, or day-to-day reference?</div></li>
</ol>

<h3>Process Inventory Template</h3>
<p>Build this during and after the kick-off call. This becomes the master list for the entire project:</p>
<table class="raci-table"><thead><tr><th>Sr.</th><th>Department</th><th>Process Name</th><th>Process Owner</th><th>Frequency</th><th>Priority</th><th>Existing Doc?</th><th>Status</th></tr></thead><tbody>
<tr><td>1</td><td>Finance</td><td>Month-end closure</td><td>CFO / Finance Manager</td><td>Monthly</td><td>High</td><td>No</td><td>To be done</td></tr>
<tr><td>2</td><td>Finance</td><td>Vendor payment processing</td><td>AP Manager</td><td>Weekly</td><td>High</td><td>Partial</td><td>To be done</td></tr>
<tr><td>3</td><td>HR</td><td>Employee onboarding</td><td>HR Manager</td><td>As needed</td><td>Medium</td><td>No</td><td>To be done</td></tr>
<tr><td colspan="8" style="text-align:center;color:var(--text-tertiary);font-style:italic">… and so on for every process in scope</td></tr>
</tbody></table>

<div class="divider"></div>
<h2>Task 0.3 — Prioritisation & Project Plan</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Sequence the SOP work in the right order — high-impact, high-risk processes first. Confirm with client and plan the project accordingly.</div></div>
<h3>Prioritisation Framework</h3>
<table class="raci-table"><thead><tr><th>Priority</th><th>Criteria</th><th>Examples</th></tr></thead><tbody>
<tr><td><strong>P1 — Critical</strong></td><td>Process failures here cause financial loss, compliance breach, or customer impact</td><td>Payment processing, invoice generation, payroll, tax filings</td></tr>
<tr><td><strong>P2 — High</strong></td><td>Process done differently by different people; frequent errors or rework</td><td>Vendor onboarding, month-end close, inventory reconciliation</td></tr>
<tr><td><strong>P3 — Medium</strong></td><td>Important but currently managed through informal knowledge sharing</td><td>Employee onboarding, MIS reporting, customer follow-up</td></tr>
<tr><td><strong>P4 — Low</strong></td><td>Rarely done, low risk, or highly stable and well-understood</td><td>Annual audit preparation, infrequent regulatory filings</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Present the process inventory to the client. Walk through the prioritisation framework together.</div></li>
<li><div>Agree on the P1 → P4 classification for each process. Client's view of priority overrides our assessment — document disagreements but defer to client.</div></li>
<li><div>Prepare the project plan: sequence P1 processes first, batch similar-department processes together to reduce context switching.</div></li>
<li><div>Share with client using the <span class="ilink" onclick="nav('project_plan_email')">Project Plan Email template →</span></div></li>
</ol>`},

sop_prep_phase1:{icon:"1️⃣",label:"Phase 1: Process Understanding",parent:"sop_prep",render:()=>`
<div class="back-btn" onclick="nav('sop_prep')">← SOP Preparation SOP</div>
<div class="section-tag">Phase 1 · SOP Preparation</div>
<div class="page-icon">1️⃣</div>
<h1 class="page-title">Phase 1: Process Understanding</h1>
<p>Understand each process deeply — as it is actually done today, not as management thinks it is done. This is the foundation everything else is built on. If the understanding is wrong, the SOP will be wrong.</p>

<h2>Task 1.1 — Pre-call Research</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Research how each process should ideally work before speaking to the client — so you can identify deviations, ask better questions, and contribute to the conversation rather than just transcribing what the client says.</div></div>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>For each process in scope, use the <span class="ilink" onclick="nav('understanding_prep')">Process Understanding Prompt →</span> in Gemini to research the ideal end-to-end process for that function in the client's industry.</div></li>
<li><div>Review any existing documents shared by the client (even outdated ones — they reveal how the process was intended to work).</div></li>
<li><div>Prepare a process-specific questionnaire. Key questions for every process:<ul class="sub-steps">
<li>What triggers this process to start?</li>
<li>Who initiates it and who else is involved?</li>
<li>What inputs are needed (data, approvals, documents)?</li>
<li>Walk me through every step — in the order you actually do them</li>
<li>What system or tool is used at each step?</li>
<li>What are the checks or validations done along the way?</li>
<li>What is the final output and who receives it?</li>
<li>What happens when something goes wrong — what are the exception paths?</li>
<li>How long does this process take end-to-end?</li>
<li>What are the pain points — what slows you down or causes errors?</li>
</ul></div></li>
<li><div>Request the client to share any sample inputs/outputs for the process (e.g., a sample invoice, a sample MIS report, a payment run file) — seeing the real documents is more informative than any description.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.2 — Process Understanding Calls</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Interview the actual process owner — the person who does the work every day — to understand the real process, not the official version.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Important:</strong> Always interview the doer, not just the manager. Managers describe how the process should work. Doers tell you how it actually works — including every workaround, shortcut, and manual step that never made it into any document.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All steps of the process captured end-to-end, pain points documented, MoM sent within 24 hours.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Schedule on MS Teams: <code>&lt;Process Name&gt; Understanding | &lt;Client&gt; x Contetra</code>. Enable auto-record. Invite the process owner — not the manager unless both are necessary.</div></li>
<li><div>Start with this script:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Hi [name]. Thank you for joining. This call is to understand the [process name] process as you carry it out day-to-day. Please walk us through it from the very beginning — what kicks it off, every step you take, and what the final output looks like. Don't worry about whether the process is right or wrong — we want to understand how it actually happens today."</div></div></li>
<li><div>Use your questionnaire from Task 1.1. Do not just read questions — use them to guide the conversation. The process owner's narration is more valuable than your questionnaire.</div></li>
<li><div>Ask "walk me through your screen" for any system-based steps — verbal descriptions of system workflows are unreliable. Ask them to share their screen and demonstrate if possible.</div></li>
<li><div>Probe every manual step:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"You mentioned you copy this data manually into Excel. How often does this happen? How long does it take? Has it ever caused an error?"</div></div></li>
<li><div>Probe every exception:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"What happens if the approval doesn't come in time? What do you do when the data from the other team is wrong or late?"</div></div></li>
<li><div>End with:<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>"Is there anything in this process that you feel should be done differently, is unnecessarily manual, or causes problems that we haven't discussed yet?"</div></div></li>
<li><div>After the call: save recording, upload to NotebookLM. Send MoM within 24 hours.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 1.3 — As-Is Process Documentation</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Convert the understanding from the calls into a clear, structured as-is document — validated by the process owner before gap analysis begins.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> As-is documentation reviewed and confirmed accurate by the client process owner.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Client Process Owner</td></tr></table>
<h3>Format Selection</h3>
<table class="raci-table"><thead><tr><th>Process Type</th><th>Format</th><th>When to Use</th></tr></thead><tbody>
<tr><td>Linear, sequential</td><td>Step table (Excel)</td><td>Process has clear start → end with few branches. E.g., payroll run, month-end checklist.</td></tr>
<tr><td>Branching / decision-heavy</td><td>Miro flowchart</td><td>Process has multiple paths, approvals, or conditional logic. E.g., purchase approval, customer credit check.</td></tr>
<tr><td>Cross-functional</td><td>Swim-lane Miro flowchart</td><td>Process involves 3+ departments/roles. E.g., invoice to payment, order to delivery.</td></tr>
</tbody></table>
<h3>Step Table Format (for linear processes)</h3>
<table class="raci-table"><thead><tr><th>Step #</th><th>Step Name</th><th>Who Does It</th><th>How (System / Tool)</th><th>Input Required</th><th>Output Produced</th><th>Time Taken</th><th>Pain Points</th></tr></thead><tbody>
<tr><td colspan="8" style="text-align:center;color:var(--text-tertiary);font-style:italic">Fill one row per step. Keep step names as action verbs: "Prepare", "Send", "Review", "Approve", "Upload"</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Use NotebookLM with the <span class="ilink" onclick="nav('prompts')">Process Detail Prompt →</span> to extract the full process from the recording.</div></li>
<li><div>Structure the as-is in the chosen format (step table or Miro flowchart).</div></li>
<li><div>Be precise about systems — "they enter it in the system" is not good enough. Document: which system, which module, which screen, which field.</div></li>
<li><div>Capture time taken at each step — this becomes the baseline for measuring improvement after the to-be is implemented.</div></li>
<li><div>Share with the process owner for validation. Give them 2 working days to review. Ask specifically: "Is there any step we have missed or misrepresented?"</div></li>
<li><div>Conduct a 30-minute walkthrough call to review the as-is together if the process is complex. Do not just email and wait.</div></li>
<li><div>Get written confirmation (email) that the as-is is accurate before proceeding to Phase 2.</div></li>
</ol>`},

sop_prep_phase2:{icon:"2️⃣",label:"Phase 2: Gap Analysis & To-Be Design",parent:"sop_prep",render:()=>`
<div class="back-btn" onclick="nav('sop_prep')">← SOP Preparation SOP</div>
<div class="section-tag">Phase 2 · SOP Preparation</div>
<div class="page-icon">2️⃣</div>
<h1 class="page-title">Phase 2: Gap Analysis & To-Be Design</h1>
<p>Identify what is broken or suboptimal in the current process, design the ideal future-state, and get the client to sign off on it — before writing a single SOP.</p>

<h2>Task 2.1 — Gap Analysis</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Identify every gap, inefficiency, risk, and missing control in the current process — classified by type so the right solution can be designed for each.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> Gap list completed, reviewed by PM, presented to and acknowledged by client.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Gap Classification Framework</h3>
<table class="raci-table"><thead><tr><th>Type</th><th>Definition</th><th>SOP Response</th></tr></thead><tbody>
<tr><td><strong>Missing Process</strong></td><td>A task happens but with no defined steps — done differently every time</td><td>Define the process from scratch in the to-be</td></tr>
<tr><td><strong>Missing Control</strong></td><td>A step exists but has no check, validation, or approval — errors go undetected</td><td>Add a control / maker-checker step in the to-be</td></tr>
<tr><td><strong>Missing Ownership</strong></td><td>Nobody knows who is responsible for a step — it falls through the cracks</td><td>Assign clear ownership in the RACI</td></tr>
<tr><td><strong>Inefficient Step</strong></td><td>Step is done manually when it could be automated or eliminated</td><td>Redesign the step; flag for Automation project if needed</td></tr>
<tr><td><strong>Workaround</strong></td><td>Team has invented a workaround because the official process doesn't work</td><td>Either fix the root cause or officialise the workaround if it is actually better</td></tr>
<tr><td><strong>Compliance Gap</strong></td><td>Process doesn't meet a legal, regulatory, or audit requirement</td><td>Mandatory fix — highest priority regardless of effort</td></tr>
<tr><td><strong>Knowledge Dependency</strong></td><td>Process only works because one person knows it — if they leave, it breaks</td><td>Document explicitly; do not rely on the individual's knowledge</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Compare the as-is process against the ideal process researched in Phase 1 preparation. Every deviation is a potential gap.</div></li>
<li><div>Go through the pain points captured during the understanding calls — each pain point maps to at least one gap.</div></li>
<li><div>Ask "Why?" at least 4 times for each gap to find the root cause. See the <span class="ilink" onclick="nav('approach')">Diagnostic Approach →</span></div></li>
<li><div>Classify every gap using the framework above. Prioritise compliance gaps as P1 — non-negotiable fixes.</div></li>
<li><div>Quantify each gap where possible: how often does it happen, what is the time/cost/risk impact?</div></li>
<li><div>Present the gap list to the client. Some gaps will be disputed — document the disagreement and the client's decision. If they choose not to fix a known gap, that is their decision to make, not ours to impose.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 2.2 — To-Be Process Design</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Design the ideal future-state process — incorporating all gap fixes, new controls, and efficiency improvements — calibrated to the client's actual maturity level. The to-be is the blueprint from which every SOP is written.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div><strong>Critical:</strong> The to-be must be realistic for the client's team size, systems, and capabilities. A theoretically perfect process that the client cannot execute is worse than a pragmatic process they will actually follow. Match the solution to the client's maturity.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> To-be flowcharts/tables completed, reviewed by PM and SM, approved by client in writing. No SOP writing begins without this approval.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>Client Management</td></tr></table>
<h3>Design Principles</h3>
<ol class="steps">
<li><div><strong>Fix the root cause, not the symptom.</strong> If invoices are entered wrong because there is no checklist, the solution is a checklist — not a post-entry audit step.</div></li>
<li><div><strong>Build in maker-checker wherever money or compliance is involved.</strong> No single person should be able to both create and approve a payment, journal entry, or vendor record.</div></li>
<li><div><strong>Define the exception path explicitly.</strong> Every process has exceptions — the to-be must address what happens when the normal flow breaks. If exception handling is left undefined, the exception becomes the norm.</div></li>
<li><div><strong>Set clear SLAs for every handoff.</strong> "Send it to the next team" is not a step — "Send to Finance team by 12 PM on the last working day of the month" is a step.</div></li>
<li><div><strong>Minimise human touch for repetitive steps.</strong> Flag automation candidates. If a step should be automated, note it in the to-be and raise a separate Automation project flag for the client.</div></li>
</ol>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>For each gap, design the fix. Document the to-be process using the same format as the as-is (step table or Miro flowchart).</div></li>
<li><div>Use Miro swim-lane flowcharts for cross-functional processes — it makes the handoffs and responsibilities visually clear.</div></li>
<li><div>Present the to-be in a dedicated client call. Walk through each change and explain <em>why</em> each gap is being fixed the way it is.</div></li>
<li><div>Specifically address any process step that is being <em>removed</em> or <em>reassigned</em> — these will face resistance. Acknowledge it directly.</div></li>
<li><div>Get written sign-off from client management on the to-be design before beginning SOP writing.</div></li>
</ol>`},

sop_prep_phase3:{icon:"3️⃣",label:"Phase 3: SOP Writing & Review",parent:"sop_prep",render:()=>`
<div class="back-btn" onclick="nav('sop_prep')">← SOP Preparation SOP</div>
<div class="section-tag">Phase 3 · SOP Preparation</div>
<div class="page-icon">3️⃣</div>
<h1 class="page-title">Phase 3: SOP Writing & Review</h1>
<p>Convert the approved to-be design into polished, usable SOP documents — reviewed internally for quality and then signed off by the client.</p>

<h2>Task 3.1 — SOP Writing</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Write each SOP to the standard structure so that a new team member can pick it up and execute the process correctly without needing to ask anyone.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All SOPs written per the standard structure, in the agreed format, ready for internal QC review.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>Senior Manager</td></tr></table>
<h3>SOP Writing Rules</h3>
<ol class="steps">
<li><div><strong>One SOP per process.</strong> Do not combine two different processes into one SOP — it creates confusion about when to use it.</div></li>
<li><div><strong>Write for the doer, not the manager.</strong> Use "you" language. "You open the vendor master" not "the employee opens the vendor master."</div></li>
<li><div><strong>Action verbs for every step.</strong> Every step must start with a verb: Open, Enter, Click, Verify, Approve, Send, Save, Download, Upload, Confirm, Notify.</div></li>
<li><div><strong>One action per step.</strong> "Open the system, enter the data, and save" is three steps, not one. Split them.</div></li>
<li><div><strong>Be specific about systems.</strong> "Enter in the system" is not acceptable. "In Tally ERP → Gateway of Tally → Accounting Vouchers → F5: Payment" is a step.</div></li>
<li><div><strong>Screenshot every system step.</strong> For any ERP or software step — add a screenshot with arrows indicating exactly which field or button. Text alone is insufficient for system navigation.</div></li>
<li><div><strong>Define every term the first time it appears.</strong> Do not assume the reader knows what "GRN", "UTR", "COGS", or "CBWC" means.</div></li>
<li><div><strong>Write exceptions explicitly.</strong> "If the invoice is above ₹50,000, it requires additional approval from the Finance Head" — state it, do not leave it as tribal knowledge.</div></li>
<li><div><strong>Link every referenced template.</strong> Every time an SOP says "use the standard format", the standard format must be linked or attached. A reference without a link is useless.</div></li>
</ol>
<h3>SOP Format Checklist (use before submitting for QC)</h3>
<table class="raci-table"><thead><tr><th>Item</th><th>Check</th></tr></thead><tbody>
<tr><td>Title is specific and action-oriented</td><td>☐</td></tr>
<tr><td>Purpose clearly states why this process exists</td><td>☐</td></tr>
<tr><td>Scope states what is in AND what is out</td><td>☐</td></tr>
<tr><td>Trigger / When to use is defined</td><td>☐</td></tr>
<tr><td>Definition of Done is unambiguous</td><td>☐</td></tr>
<tr><td>RACI has named roles (not generic "team")</td><td>☐</td></tr>
<tr><td>All steps start with action verbs</td><td>☐</td></tr>
<tr><td>System steps include navigation path</td><td>☐</td></tr>
<tr><td>Screenshots added for every UI step</td><td>☐</td></tr>
<tr><td>Exception paths documented</td><td>☐</td></tr>
<tr><td>All templates/references are linked</td><td>☐</td></tr>
<tr><td>SLAs / deadlines stated where applicable</td><td>☐</td></tr>
<tr><td>Version number and date in footer</td><td>☐</td></tr>
</tbody></table>
<h3>AI-Assisted SOP Drafting</h3>
<p>Use this prompt in Gemini or ChatGPT to generate a first draft from your process notes, then refine manually:</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>You are an expert business process documentation specialist.

Based on the following process notes, write a complete SOP document in this structure:
1. Title
2. Purpose (2-3 sentences)
3. Scope (in scope and out of scope)
4. Trigger / When to Use
5. Definition of Done
6. Roles & Responsibilities (RACI table)
7. Steps to Follow (numbered, each starting with an action verb, one action per step)
8. Exception Handling (common exceptions and what to do)
9. Templates & References

Process notes:
[PASTE YOUR PROCESS NOTES / AS-IS DOCUMENTATION HERE]

Write it for the person who will execute this process — not their manager. Use clear, direct language. Be specific about systems and tools. If a system name is mentioned, include the navigation path.</div>
<div class="callout"><div class="callout-icon">⚠️</div><div>AI drafts are a starting point — not a final output. Every AI-generated SOP must be manually reviewed against the actual process, checked for accuracy against client's specific systems, and verified with the process owner before it goes to QC.</div></div>

<div class="divider"></div>
<h2>Task 3.2 — Internal Quality Check (QC)</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Catch errors, ambiguities, missing steps, and formatting inconsistencies before the SOP goes to the client — the client should never be the first to find a mistake.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>QC Checklist</h3>
<ol class="steps">
<li><div><strong>The stranger test:</strong> Give the SOP to someone who has never seen the process. Can they follow it without asking any questions? If they get stuck, the SOP has a gap.</div></li>
<li><div><strong>Completeness:</strong> Does the SOP cover the entire process — from the trigger to the final output? Nothing should be assumed as "obvious."</div></li>
<li><div><strong>Accuracy:</strong> Do the system steps match the client's actual ERP/software version? Navigation paths that are slightly wrong are worse than no navigation path.</div></li>
<li><div><strong>Consistency:</strong> Are role names, system names, and terminology used consistently across all SOPs? (e.g., don't call it "Finance Team" in one SOP and "Accounts Team" in another)</div></li>
<li><div><strong>Screenshots:</strong> Are all screenshots current? Are arrows/highlights pointing to the correct fields?</div></li>
<li><div><strong>Cross-references:</strong> Every SOP that references another SOP, template, or form — is the link working and pointing to the right document?</div></li>
<li><div><strong>Exceptions:</strong> Are the top 3 most common exceptions handled explicitly?</div></li>
</ol>

<div class="divider"></div>
<h2>Task 3.3 — Client Review & Sign-off</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Get the process owners and client management to review each SOP, confirm it is accurate and implementable, and give formal sign-off.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All SOPs signed off in writing by the authorised client representative.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Client Management</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Share SOPs in batches by department — do not share all SOPs at once. Review one department at a time.</div></li>
<li><div>Give process owners 3 working days to review each SOP. Follow up if no response on Day 3.</div></li>
<li><div>Conduct a review call for each department — walk through the SOPs screen-by-screen. Do not just wait for written comments.</div></li>
<li><div>Track all feedback in a review log: SOP name, Reviewer, Comment, Action taken, Status.</div></li>
<li><div>For every comment that changes a process step — re-check that the change doesn't conflict with another SOP or a compliance requirement.</div></li>
<li><div>Incorporate all feedback. Re-share only the changed sections for a final round of review — do not ask reviewers to re-read the entire SOP.</div></li>
<li><div>Obtain written sign-off (email or signed PDF) from the authorised client representative for each batch of SOPs.</div></li>
</ol>`},

sop_prep_phase4:{icon:"4️⃣",label:"Phase 4: Training & Handover",parent:"sop_prep",render:()=>`
<div class="back-btn" onclick="nav('sop_prep')">← SOP Preparation SOP</div>
<div class="section-tag">Phase 4 · SOP Preparation</div>
<div class="page-icon">4️⃣</div>
<h1 class="page-title">Phase 4: Training & Handover</h1>
<p>An SOP that no one reads is worthless. This phase ensures the SOPs are actually adopted — through structured training, an accessible repository, and a governance process to keep them current.</p>

<h2>Task 4.1 — SOP Walkthrough & Training</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Walk every person who will use a SOP through it — ensuring they understand it, can execute it, and know where to find it.</div></div>
<div class="callout"><div class="callout-icon">✅</div><div><strong>Done When:</strong> All relevant team members trained on their respective SOPs, attendance recorded.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive + PM</td><td>Senior Manager</td><td>—</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Conduct department-wise SOP walkthrough sessions — not a single all-hands session. Each session covers only the SOPs relevant to that department's team.</div></li>
<li><div>Structure each session:<ul class="sub-steps">
<li>Why these SOPs were created (context — what problem was being solved)</li>
<li>Walk through each SOP step by step on screen</li>
<li>Highlight the key changes from how it was done before</li>
<li>Show where the SOP is stored (the repository)</li>
<li>Q&A — address every question, no matter how basic</li>
</ul></div></li>
<li><div>After the walkthrough — have each attendee execute one task from the SOP themselves, while you observe. This confirms they can follow it, not just understand it.</div></li>
<li><div>Record the session and save to the client's OneDrive. Future joiners can watch the recording as part of their onboarding.</div></li>
<li><div>Collect attendance sign-off from all attendees.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.2 — SOP Repository Setup</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Set up an organised, accessible SOP library so team members can find the right SOP in under 30 seconds — anytime, from anywhere.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Executive</td><td>Project Manager</td><td>—</td></tr></table>
<h3>Repository Structure</h3>
<table class="raci-table"><thead><tr><th>Folder</th><th>Sub-folder</th><th>Contents</th></tr></thead><tbody>
<tr><td><strong>SOP Library</strong></td><td>Finance</td><td>All Finance SOPs (payments, month-end, reconciliation, etc.)</td></tr>
<tr><td></td><td>HR</td><td>All HR SOPs (onboarding, payroll, exit, leave)</td></tr>
<tr><td></td><td>Operations</td><td>All Ops SOPs (procurement, inventory, dispatch)</td></tr>
<tr><td></td><td>Sales</td><td>All Sales SOPs (lead, quote, order, collection)</td></tr>
<tr><td></td><td>IT / Admin</td><td>System access, IT setup, general admin SOPs</td></tr>
<tr><td><strong>Templates</strong></td><td>—</td><td>All templates referenced by the SOPs</td></tr>
<tr><td><strong>Archived</strong></td><td>—</td><td>Old versions of SOPs (never delete — move here)</td></tr>
<tr><td><strong>Index</strong></td><td>—</td><td>Master index file: SOP name, department, owner, version, last reviewed</td></tr>
</tbody></table>
<h3>SOP Index (Master File)</h3>
<p>Every SOP library must have a single index file. Every SOP entry must have:</p>
<table class="raci-table"><thead><tr><th>Field</th><th>Description</th></tr></thead><tbody>
<tr><td><strong>SOP Name</strong></td><td>Process name</td></tr>
<tr><td><strong>Department</strong></td><td>Which function owns it</td></tr>
<tr><td><strong>Process Owner</strong></td><td>Named individual responsible for keeping it current</td></tr>
<tr><td><strong>Version</strong></td><td>Current version number (v1.0, v1.1, v2.0)</td></tr>
<tr><td><strong>Last Reviewed</strong></td><td>Date of last review</td></tr>
<tr><td><strong>Next Review Due</strong></td><td>Scheduled next review date (recommend annual)</td></tr>
<tr><td><strong>Status</strong></td><td>Active / Under Review / Archived</td></tr>
<tr><td><strong>Link</strong></td><td>Direct link to the SOP file</td></tr>
</tbody></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Create the folder structure on the client's OneDrive or internal wiki (SharePoint, Notion, Confluence — wherever their team actually works).</div></li>
<li><div>Upload all signed-off SOPs in the correct department folders using a consistent naming convention: <code>[Department]_[Process Name]_v[Version]_[YYYYMMDD]</code></div></li>
<li><div>Create the SOP Index file and populate it for all SOPs delivered.</div></li>
<li><div>Set access permissions: all relevant team members should have at least read access. Process owners should have edit access.</div></li>
<li><div>Brief the nominated SOP custodian on their responsibility for maintaining the library going forward.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.3 — SOP Governance Handover</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Hand over the ongoing responsibility for SOP maintenance to the client — with a clear governance framework so the SOPs don't go stale within 6 months.</div></div>
<div class="callout"><div class="callout-icon">⚠️</div><div>SOPs decay fast. A system change, a process improvement, a new regulation, a team restructure — any of these can make an SOP outdated. Without a governance owner and a review schedule, the SOP library becomes a graveyard within a year.</div></div>
<h3>Governance Framework to Hand Over</h3>
<ol class="steps">
<li><div><strong>Appoint a SOP Custodian</strong> — one named person (typically the Quality Manager, Head of Operations, or Finance Controller) responsible for the health of the SOP library. Not a committee — one person, clear accountability.</div></li>
<li><div><strong>Annual review cycle</strong> — every SOP must be reviewed at least once a year. The SOP custodian schedules this and is responsible for completing it. Add to the SOP Index as "Next Review Due."</div></li>
<li><div><strong>Trigger-based updates</strong> — any of these events must trigger an immediate SOP update:<ul class="sub-steps">
<li>System change or ERP upgrade</li>
<li>Regulatory / tax law change</li>
<li>Organisational restructure (role changes, new departments)</li>
<li>Process failure or significant error that was caused by a gap in the SOP</li>
<li>New tool or automation introduced</li>
</ul></div></li>
<li><div><strong>Version control</strong> — every change to an SOP must increment the version number. Old versions move to the Archive folder — never deleted.</div></li>
<li><div><strong>New joiner protocol</strong> — every new team member must read and sign off on the SOPs for their role within their first week.</div></li>
</ol>

<div class="divider"></div>
<h2>Task 4.4 — Project Closure</h2>
<div class="callout"><div class="callout-icon">🎯</div><div><strong>Purpose:</strong> Formally close the project with a complete record of what was delivered and documented learnings for future SOP projects.</div></div>
<h3>Roles & Responsibilities</h3>
<table class="raci-table"><tr><th>Execution</th><th>Review</th><th>Approval</th></tr><tr><td>Project Manager</td><td>Senior Manager</td><td>Vertical Head</td></tr></table>
<h3>Steps to Follow</h3>
<ol class="steps">
<li><div>Prepare the Project Closure Report:<ul class="sub-steps">
<li>Total SOPs delivered vs. originally scoped</li>
<li>SOPs deferred and reasons</li>
<li>Summary of key gaps fixed across all processes</li>
<li>Key challenges and how they were resolved</li>
<li>Automation candidates identified during the project (flag for follow-up)</li>
<li>Governance recommendations handed over</li>
<li>Timesheet summary — hours per department / per SOP</li>
<li>Team learnings and recommendations for future SOP projects</li>
</ul></div></li>
<li><div>Conduct a closure call with the client. Walk through the report and collect feedback.</div></li>
<li><div>Get the client to fill the <span class="ilink" onclick="nav('templates')">Feedback Form →</span></div></li>
<li><div>Archive all project files in OneDrive: recordings, MoMs, as-is docs, to-be designs, gap analysis, draft SOPs, review logs, sign-off emails, final SOPs, training recordings, closure report.</div></li>
<li><div>File the closure report internally with: industry, number of SOPs delivered, departments covered, key learnings — for future reference on similar projects.</div></li>
</ol>`},
